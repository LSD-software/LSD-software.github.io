<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="data_cg/logo.png">
  <title>LSD Card Game — Reset Password</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css_cg/auth.css">
</head>
<body>
  <div id="authWrapper">
    <div id="authLogo">
      <img src="data_cg/logo.png" alt="LSD Card Game">
      <h1>RESET PASSWORD</h1>
    </div>

    <form id="resetForm" class="auth-form">
      <p class="form-info">Choose a new password for your account.</p>
      <div class="field">
        <label>New Password <span class="hint">(min 8 characters)</span></label>
        <div class="pw-wrap">
          <input type="password" id="newPassword" placeholder="••••••••" required minlength="8">
          <button type="button" class="pw-toggle" data-target="newPassword">👁</button>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="confirmPassword" placeholder="••••••••" required>
          <button type="button" class="pw-toggle" data-target="confirmPassword">👁</button>
        </div>
      </div>
      <div id="resetError"   class="form-error   hidden"></div>
      <div id="resetSuccess" class="form-success hidden"></div>
      <button type="submit" class="auth-btn" id="resetBtn">SET NEW PASSWORD</button>
    </form>
  </div>

  <script src="js_cg/api.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const token  = params.get("token");

      if (!token) {
        document.getElementById("resetError").textContent = "Invalid reset link.";
        document.getElementById("resetError").classList.remove("hidden");
        document.getElementById("resetBtn").disabled = true;
      }

      // Password toggle
      document.querySelectorAll(".pw-toggle").forEach(btn => {
        btn.addEventListener("click", () => {
          const inp = document.getElementById(btn.dataset.target);
          inp.type = inp.type === "password" ? "text" : "password";
          btn.textContent = inp.type === "password" ? "👁" : "🙈";
        });
      });

      document.getElementById("resetForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const newPassword  = document.getElementById("newPassword").value;
        const confirmPass  = document.getElementById("confirmPassword").value;
        const btn          = document.getElementById("resetBtn");
        const errEl        = document.getElementById("resetError");
        const okEl         = document.getElementById("resetSuccess");

        errEl.classList.add("hidden");
        okEl.classList.add("hidden");

        if (newPassword !== confirmPass) {
          errEl.textContent = "Passwords do not match.";
          errEl.classList.remove("hidden");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> Saving…`;

        try {
          await Api.resetPassword(token, newPassword);
          okEl.textContent = "Password updated! Redirecting to sign in…";
          okEl.classList.remove("hidden");
          setTimeout(() => window.location.href = "auth.html", 2500);
        } catch (err) {
          errEl.textContent = err.message;
          errEl.classList.remove("hidden");
          btn.disabled = false;
          btn.textContent = "SET NEW PASSWORD";
        }
      });
    });
  </script>
</body>
</html>
