<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LSD Console</title>
<meta name="description" content="LSD Console — 6 games in one: LSD Attack Force UE, Target Shooting, Nation Builder, Attack of Zombies, Ball, Artist Maker.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://lsd-software.github.io/lsdConsole/">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;}

/* Force landscape on mobile */
@media screen and (max-width:768px) and (orientation:portrait){
  #rotateMsg{display:flex!important;}
  #canvas,#gamepad,#mobileMenu{display:none!important;}
}
#rotateMsg{display:none;position:fixed;inset:0;background:#000;z-index:99999;flex-direction:column;align-items:center;justify-content:center;gap:20px;font-family:'Courier New',monospace;}
#rotateMsg .arrow{font-size:80px;animation:spin 2s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#rotateMsg p{color:#baa701;font-size:1.2rem;text-align:center;padding:0 20px;}

#canvas{display:block;position:fixed;top:0;left:0;cursor:none;}

/* Fullscreen prompt */
#fsPrompt{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;gap:16px;font-family:'Courier New',monospace;}
#fsPrompt h1{font-size:clamp(24px,5vw,58px);color:#a10000;letter-spacing:6px;text-shadow:0 0 30px rgba(161,0,0,0.5);}
#fsPrompt p{color:#ccc;font-size:clamp(12px,2vw,18px);text-align:center;padding:0 24px;}
#fsBtn{background:#a10000;color:#baa701;border:2px solid #baa701;padding:14px 48px;font-size:clamp(14px,2vw,22px);cursor:pointer;letter-spacing:3px;font-family:inherit;transition:all 0.2s;}
#fsBtn:hover{background:#c00;box-shadow:0 0 20px rgba(161,0,0,0.6);}

/* Auth overlay */
#authOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:8000;}
#authOverlay.show{display:flex;}
#authBox{background:#0d0d0d;border:2px solid #baa701;border-radius:14px;padding:32px 36px;width:min(420px,94vw);display:flex;flex-direction:column;gap:12px;font-family:'Courier New',monospace;}
#authBox h2{color:#a10000;font-size:1.5rem;letter-spacing:4px;text-align:center;}
#authBox input{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:11px 14px;color:#fff;font-family:inherit;font-size:1rem;width:100%;transition:border 0.2s;}
#authBox input:focus{outline:none;border-color:#baa701;}
.auth-btn{background:#a10000;color:#baa701;border:none;padding:12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:1rem;letter-spacing:1px;width:100%;transition:background 0.2s;}
.auth-btn:hover{background:#c00;}
.auth-btn.secondary{background:#1a1a1a;border:1px solid #444;color:#888;}
.auth-tabs{display:flex;gap:8px;}
.auth-tab{flex:1;padding:9px 4px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#666;cursor:pointer;font-family:inherit;font-size:0.82rem;letter-spacing:1px;transition:all 0.2s;text-align:center;}
.auth-tab.active{border-color:#baa701;color:#baa701;background:#111;}
#authMsg{font-size:0.85rem;text-align:center;min-height:18px;color:#ff6666;}

/* Legend overlay */
#legendOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;z-index:7000;}
#legendOverlay.show{display:flex;}
#legendBox{background:#0d0d0d;border:2px solid #baa701;border-radius:14px;padding:28px 36px;width:min(600px,94vw);max-height:80vh;overflow-y:auto;font-family:'Courier New',monospace;}
#legendBox h2{color:#baa701;font-size:1.3rem;letter-spacing:3px;text-align:center;margin-bottom:16px;}
#legendBox .legend-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
#legendBox .legend-item{background:#111;border:1px solid #333;border-radius:8px;padding:10px 14px;}
#legendBox .legend-item .key{color:#a10000;font-weight:700;font-size:0.9rem;}
#legendBox .legend-item .desc{color:#ccc;font-size:0.82rem;margin-top:4px;}
#legendClose{background:#a10000;color:#baa701;border:none;padding:11px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.95rem;letter-spacing:2px;width:100%;margin-top:16px;}

/* Mobile gamepad */
#gamepad{display:none;position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:100;}
#gamepad.show{display:block;}
.dpad{position:absolute;bottom:14px;left:14px;width:160px;height:160px;pointer-events:all;}
.dpad-btn{position:absolute;width:50px;height:50px;background:rgba(0,0,0,0.5);border:2px solid rgba(186,167,1,0.5);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#baa701;font-size:22px;touch-action:none;cursor:pointer;backdrop-filter:blur(4px);}
.dpad-btn.pressed{background:rgba(161,0,0,0.8);border-color:#baa701;}
#dUp{top:0;left:50%;transform:translateX(-50%);}#dDown{bottom:0;left:50%;transform:translateX(-50%);}
#dLeft{left:0;top:50%;transform:translateY(-50%);}#dRight{right:0;top:50%;transform:translateY(-50%);}
.action-btns{position:absolute;bottom:14px;right:14px;width:180px;height:160px;pointer-events:all;}
.act-btn{position:absolute;width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid #baa701;color:#baa701;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:pointer;backdrop-filter:blur(4px);}
.act-btn.pressed{background:rgba(161,0,0,0.9);}
#bQ{top:28px;left:0;}#bW{top:0;left:62px;}#bE{top:28px;right:0;}#bS{top:70px;left:62px;}#bC{bottom:0;left:62px;background:rgba(0,50,160,0.6);}

/* Mobile charge button for target */
#chargeBtn{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:150;pointer-events:all;
  background:rgba(0,100,0,0.85);border:3px solid #4EC600;color:#fff;border-radius:50%;
  width:100px;height:100px;font-size:13px;font-weight:700;text-align:center;
  font-family:'Courier New',monospace;touch-action:none;cursor:pointer;
  display:none;align-items:center;justify-content:center;flex-direction:column;
  backdrop-filter:blur(4px);}
#chargeBtn.show{display:flex;}
#chargeBtn.charging{background:rgba(200,0,0,0.85);border-color:#ff4444;}

#mobileMenu{display:none;position:fixed;top:12px;right:12px;z-index:500;
  background:rgba(161,0,0,0.9);border:2px solid #baa701;color:#baa701;font-size:22px;
  width:48px;height:48px;border-radius:10px;align-items:center;justify-content:center;cursor:pointer;}
#mobileMenu.show{display:flex;}

/* Custom cursor */
#customCursor{position:fixed;pointer-events:none;z-index:9999;width:24px;height:24px;transform:translate(-50%,-50%);display:none;}
</style>
</head>
<body>

<!-- Rotate prompt for portrait mobile -->
<div id="rotateMsg">
  <div class="arrow">📱</div>
  <p>Please rotate your device<br>to landscape mode to play</p>
</div>

<!-- Fullscreen prompt -->
<div id="fsPrompt">
  <h1>⚡ LSD CONSOLE ⚡</h1>
  <p>6 games — Fight online, Build nations, Shoot targets, and more.<br>Best experienced in fullscreen.</p>
  <button id="fsBtn" onclick="enterFullscreen()">▶ PLAY FULLSCREEN</button>
  <p style="font-size:11px;opacity:0.35;margin-top:4px;">Or press any key to continue</p>
</div>

<!-- Auth overlay -->
<div id="authOverlay">
  <div id="authBox">
    <h2>LSD Console</h2>
    <p id="authUserInfo" style="color:#888;font-size:0.8rem;text-align:center;"></p>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="setAuthTab('login')">LOGIN</div>
      <div class="auth-tab" onclick="setAuthTab('register')">REGISTER</div>
      <div class="auth-tab" onclick="setAuthTab('guest')">GUEST</div>
    </div>
    <div id="authFields"></div>
    <div id="authMsg"></div>
    <button class="auth-btn secondary" onclick="closeAuth()" style="margin-top:4px;">✕ CLOSE</button>
  </div>
</div>

<!-- Legend overlay -->
<div id="legendOverlay">
  <div id="legendBox">
    <h2 id="legendTitle">HOW TO PLAY</h2>
    <div id="legendGrid" class="legend-grid"></div>
    <button id="legendClose" onclick="closeLegend()">▶ GOT IT — START PLAYING</button>
  </div>
</div>

<canvas id="canvas"></canvas>
<svg id="customCursor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <circle cx="12" cy="12" r="8" fill="none" stroke="#baa701" stroke-width="1.5"/>
  <line x1="12" y1="2" x2="12" y2="7" stroke="#baa701" stroke-width="1.5"/>
  <line x1="12" y1="17" x2="12" y2="22" stroke="#baa701" stroke-width="1.5"/>
  <line x1="2" y1="12" x2="7" y2="12" stroke="#baa701" stroke-width="1.5"/>
  <line x1="17" y1="12" x2="22" y2="12" stroke="#baa701" stroke-width="1.5"/>
  <circle cx="12" cy="12" r="2" fill="#a10000"/>
</svg>

<!-- Mobile controls -->
<div id="mobileMenu">☰</div>
<div id="gamepad">
  <div class="dpad">
    <div class="dpad-btn" id="dLeft">◀</div>
    <div class="dpad-btn" id="dRight">▶</div>
    <div class="dpad-btn" id="dUp">▲</div>
    <div class="dpad-btn" id="dDown">▼</div>
  </div>
  <div class="action-btns">
    <div class="act-btn" id="bQ">Q</div>
    <div class="act-btn" id="bW">W</div>
    <div class="act-btn" id="bE">E</div>
    <div class="act-btn" id="bS">S</div>
    <div class="act-btn" id="bC">C</div>
  </div>
</div>
<div id="chargeBtn">
  <span style="font-size:28px;">🏹</span>
  <span>HOLD</span>
  <span style="font-size:10px;">to charge</span>
</div>

<script>
// ============================================================
//  LSD CONSOLE  v4 — Full rewrite with all fixes
// ============================================================

const API_URL  = "https://lsd-backend-4phu.onrender.com";
const SITE_URL = "https://lsd-software.github.io";

// Google Drive direct video URLs
const VIDEO_GRAX = "https://drive.google.com/uc?export=download&id=1GYqXF27B4AzGFswmmGiBqJnFt2c-YqP_";
const VIDEO_YUKE = "https://drive.google.com/uc?export=download&id=195yjrgxtN_OdGZSKU3Wo3HtE4wCoE4Bb";

// ── Canvas & Scale ──────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
let W=0,H=0,scale=1;
// Virtual resolution — slightly zoomed up from 1920×1080
const BASE_W=1600, BASE_H=900;

function enterFullscreen() {
  document.getElementById("fsPrompt").style.display="none";
  const el=document.documentElement;
  (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen)?.call(el).catch(()=>{});
  resizeCanvas(); startGame();
}
document.addEventListener("keydown",function onFirst(){
  if(document.getElementById("fsPrompt").style.display!=="none"){enterFullscreen();}
  document.removeEventListener("keydown",onFirst);
});
setTimeout(()=>{if(document.getElementById("fsPrompt").style.display!=="none")enterFullscreen();},7000);

function resizeCanvas(){
  W=window.innerWidth; H=window.innerHeight;
  canvas.width=W; canvas.height=H;
  // Fill screen completely — zoom to fill, not fit
  scale=Math.max(W/BASE_W, H/BASE_H)*0.98;
  if(scale<0.5)scale=0.5;
}
window.addEventListener("resize",()=>{resizeCanvas();});
document.addEventListener("fullscreenchange",resizeCanvas);
document.addEventListener("webkitfullscreenchange",resizeCanvas);
resizeCanvas();

function sx(x){return x*scale+(W-BASE_W*scale)/2;}
function sy(y){return y*scale+(H-BASE_H*scale)/2;}
function ss(s){return s*scale;}

// ── Orientation lock ────────────────────────────────────────
function checkOrientation(){
  const rm=document.getElementById("rotateMsg");
  if(window.innerWidth<window.innerHeight&&window.innerWidth<900){rm.style.display="flex";}
  else{rm.style.display="none";}
}
window.addEventListener("resize",checkOrientation);
window.addEventListener("orientationchange",checkOrientation);
checkOrientation();

// ── Custom cursor ───────────────────────────────────────────
const cursor=document.getElementById("customCursor");
const isMobile=/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)||window.innerWidth<900;
if(!isMobile){
  cursor.style.display="block";
  document.body.style.cursor="none";
  document.addEventListener("mousemove",e=>{cursor.style.left=e.clientX+"px";cursor.style.top=e.clientY+"px";});
}

// ── Assets ──────────────────────────────────────────────────
const images={},videos={};
function loadImg(key,src){const img=new Image();img.src=src;images[key]=img;return img;}
function loadVid(key,src){const v=document.createElement("video");v.src=src;v.preload="metadata";v.loop=false;v.muted=false;v.playsInline=true;videos[key]=v;return v;}

function loadAllAssets(){
  loadImg("logo","data/loghi/LSDlogo.png");loadImg("logoLSD","data/logoLSD.png");
  loadImg("btn_info","data/bottoni/info.png");loadImg("btn_exit","data/bottoni/uscita.png");
  loadImg("btn_lib","data/bottoni/libreria.png");loadImg("btn_desc","data/bottoni/descrizioni.png");
  ["lsdafue","target","nation","zombies","ball","draw"].forEach(k=>loadImg("cover_"+k,"data/copertineGiochi/"+{lsdafue:"LSDAFUE",target:"targetShooting",nation:"nationBuilder",zombies:"zombies",ball:"ball",draw:"draw"}[k]+".png"));
  loadImg("bg_fight","data/LSD_Attack_Force/sfondo/backgroundLSDAFUE.png");
  loadImg("bg_fight_menu","data/LSD_Attack_Force/sfondo_LSDAFUE.png");
  loadImg("icon_grax","data/LSD_Attack_Force/icone/GraxIcon.png");
  loadImg("icon_yuke","data/LSD_Attack_Force/icone/YukeIcon.png");
  for(let i=0;i<14;i++){loadImg(`grax_r_${i}`,`data/LSD_Attack_Force/grax/${i}.png`);loadImg(`grax_l_${i}`,`data/LSD_Attack_Force/grax/Specchiato/${i}.png`);}
  for(let i=0;i<13;i++){loadImg(`yuke_r_${i}`,`data/LSD_Attack_Force/yuke/${i}.png`);loadImg(`yuke_l_${i}`,`data/LSD_Attack_Force/yuke/Specchiato/${i}.png`);}
  loadImg("yuke_proj_r","data/LSD_Attack_Force/yuke/proiettileYq.png");
  loadImg("yuke_meteora_r","data/LSD_Attack_Force/yuke/meteora.png");
  loadImg("yuke_proj_l","data/LSD_Attack_Force/yuke/Specchiato/proiettileYq.png");
  loadImg("yuke_meteora_l","data/LSD_Attack_Force/yuke/Specchiato/meteora.png");
  ["ranged","punch","kick","special"].forEach(m=>loadImg("move_"+m,"data/LSD_Attack_Force/mosse/"+m+".png"));
  loadImg("bg_zombies","data/LSD_Attack_of_Zombies/sfondo.png");
  for(let i=0;i<6;i++) loadImg(`zombie_${i}`,`data/LSD_Attack_of_Zombies/${i}.png`);
  loadImg("nb_menu1","data/LSD_Nation_Builder/menuLSDnb.png");
  loadImg("gomma","data/Artist Maker/gomma.png");
  loadImg("medagliere","data/Libreria/medagliere.png");
  ["nulla","bronzo","argento","oro"].forEach(t=>loadImg("medal_"+t,"data/Libreria/medaglia"+t.charAt(0).toUpperCase()+t.slice(1)+".png"));
  for(let i=1;i<=14;i++) loadImg(`trofeo_${i}`,`data/Libreria/o${i}.png`);
  loadVid("grax_ultimate", VIDEO_GRAX);
  loadVid("yuke_ultimate", VIDEO_YUKE);
}

// ── Input ───────────────────────────────────────────────────
const keys={};
let mouseX=0,mouseY=0,mousePressed=false,_clickConsumed=false;
function consumeClick(){_clickConsumed=true;}
function clickAvail(){return mousePressed&&!_clickConsumed;}

canvas.addEventListener("mousemove",e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=((e.clientX-r.left)-(W-BASE_W*scale)/2)/scale;
  mouseY=((e.clientY-r.top)-(H-BASE_H*scale)/2)/scale;
});
canvas.addEventListener("mousedown",()=>{mousePressed=true;_clickConsumed=false;});
canvas.addEventListener("mouseup",()=>{mousePressed=false;_clickConsumed=false;});
canvas.addEventListener("contextmenu",e=>e.preventDefault());
function onTouch(e){
  e.preventDefault();
  const t=e.touches[0]||e.changedTouches[0];
  if(!t)return;
  const r=canvas.getBoundingClientRect();
  mouseX=((t.clientX-r.left)-(W-BASE_W*scale)/2)/scale;
  mouseY=((t.clientY-r.top)-(H-BASE_H*scale)/2)/scale;
}
canvas.addEventListener("touchstart",e=>{onTouch(e);mousePressed=true;_clickConsumed=false;},{passive:false});
canvas.addEventListener("touchmove",e=>{onTouch(e);},{passive:false});
canvas.addEventListener("touchend",e=>{mousePressed=false;_clickConsumed=false;},{passive:false});

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){e.preventDefault();if(game)game.handleEsc();return;}
  keys[e.key]=true;keys[e.key.toLowerCase()]=true;
  if(game)game.handleKeyPress(e.key);
});
document.addEventListener("keyup",e=>{
  keys[e.key]=false;keys[e.key.toLowerCase()]=false;
  if(game)game.handleKeyRelease(e.key);
});

// ── Gamepad visibility control ──────────────────────────────
// Shows D-pad+actions only for AFUE and Zombies, charge btn only for Target
const GAMES_WITH_DPAD    = [1,4];        // AFUE, Zombies
const GAMES_WITH_CHARGE  = [2];          // Target
function updateGamepad(screenNum){
  const gp=document.getElementById("gamepad");
  const cb=document.getElementById("chargeBtn");
  if(!isMobile){gp.classList.remove("show");cb.classList.remove("show");return;}
  if(GAMES_WITH_DPAD.includes(screenNum)){gp.classList.add("show");cb.classList.remove("show");}
  else if(GAMES_WITH_CHARGE.includes(screenNum)){gp.classList.remove("show");cb.classList.add("show");}
  else{gp.classList.remove("show");cb.classList.remove("show");}
}
function setupMobilePad(){
  if(!isMobile)return;
  document.getElementById("mobileMenu").classList.add("show");
  const map=(id,key)=>{
    const el=document.getElementById(id);
    const dn=e=>{e.preventDefault();keys[key]=true;keys[key.toLowerCase()]=true;el.classList.add("pressed");if(game)game.handleKeyPress(key);};
    const up=e=>{e.preventDefault();keys[key]=false;keys[key.toLowerCase()]=false;el.classList.remove("pressed");if(game)game.handleKeyRelease(key);};
    el.addEventListener("touchstart",dn,{passive:false});el.addEventListener("touchend",up,{passive:false});
    el.addEventListener("mousedown",dn);el.addEventListener("mouseup",up);
  };
  map("dLeft","a");map("dRight","d");map("dUp","w");map("dDown","s");
  map("bQ","q");map("bW","w");map("bE","e");map("bS","s");map("bC","c");
  document.getElementById("mobileMenu").addEventListener("click",()=>{if(game)game.handleEsc();});

  // Charge button for target
  const cb=document.getElementById("chargeBtn");
  cb.addEventListener("touchstart",e=>{e.preventDefault();keys["b"]=true;cb.classList.add("charging");},{passive:false});
  cb.addEventListener("touchend",e=>{e.preventDefault();keys["b"]=false;cb.classList.remove("charging");},{passive:false});
  cb.addEventListener("mousedown",()=>{keys["b"]=true;cb.classList.add("charging");});
  cb.addEventListener("mouseup",()=>{keys["b"]=false;cb.classList.remove("charging");});
}

// ── Auth ────────────────────────────────────────────────────
const Auth={
  token:null,user:null,
  init(){this.token=localStorage.getItem("lsd_token");try{this.user=JSON.parse(localStorage.getItem("lsd_user")||"null");}catch{}},
  save(t,u){this.token=t;this.user=u;localStorage.setItem("lsd_token",t);localStorage.setItem("lsd_user",JSON.stringify(u));},
  clear(){this.token=null;this.user=null;localStorage.removeItem("lsd_token");localStorage.removeItem("lsd_user");},
  isGuest(){return!this.user||this.user.isGuest;},
  username(){return this.user?.username||"Guest"},
  async req(path,method="GET",body=null){
    const h={"Content-Type":"application/json"};if(this.token)h["Authorization"]="Bearer "+this.token;
    const opts={method,headers:h};if(body)opts.body=JSON.stringify(body);
    const r=await fetch(API_URL+path,opts);const d=await r.json();if(!r.ok)throw new Error(d.error||"Error");return d;
  },
  async submitScore(gameName,score){if(!this.token||this.isGuest())return;try{await this.req("/console/score","POST",{game:gameName,score});}catch(e){console.warn(e);}},
  async submitAFUE(wins,losses){if(!this.token||this.isGuest())return;try{await this.req("/console/score","POST",{game:"afue",wins,losses});}catch(e){console.warn(e);}},
  async saveTrophies(t){if(!this.token||this.isGuest())return;try{await this.req("/console/trophies","POST",{trophies:t});}catch(e){console.warn(e);}},
  async loadTrophies(){if(!this.token||this.isGuest())return null;try{const d=await this.req("/console/trophies");return d.trophies;}catch{return null;}},
  async getLeaderboard(g){try{return await this.req("/console/leaderboard/"+g);}catch{return{leaderboard:[],myRank:null};}}
};
Auth.init();

// ── Auth UI ──────────────────────────────────────────────────
let _authTab="login";
function setAuthTab(tab){
  _authTab=tab;
  document.querySelectorAll(".auth-tab").forEach((el,i)=>el.classList.toggle("active",["login","register","guest"][i]===tab));
  document.getElementById("authMsg").textContent="";
  const f=document.getElementById("authFields");
  if(tab==="login") f.innerHTML=`<input id="ai_id" placeholder="Username or Email" autocomplete="username"><input id="ai_pw" placeholder="Password" type="password" autocomplete="current-password"><button class="auth-btn" onclick="doAuth()">LOGIN</button>`;
  else if(tab==="register") f.innerHTML=`<input id="ai_un" placeholder="Username (3-20 chars)"><input id="ai_em" placeholder="Email" type="email"><input id="ai_pw" placeholder="Password (min 8)" type="password"><button class="auth-btn" onclick="doAuth()">REGISTER</button>`;
  else f.innerHTML=`<input id="ai_guest" placeholder="Your nickname"><button class="auth-btn" onclick="doAuth()">PLAY AS GUEST</button><p style="color:#555;font-size:0.78rem;text-align:center">Scores won't be saved to server</p>`;
}
function showAuth(){document.getElementById("authOverlay").classList.add("show");document.getElementById("authUserInfo").textContent=Auth.user?"Logged in as: "+Auth.username():"Sign in to save scores & trophies";setAuthTab("login");}
function closeAuth(){document.getElementById("authOverlay").classList.remove("show");}
async function doAuth(){
  const msg=document.getElementById("authMsg");msg.style.color="#ff6666";msg.textContent="Loading...";
  try{
    if(_authTab==="login"){
      const d=await Auth.req("/auth/login","POST",{identifier:document.getElementById("ai_id")?.value.trim(),password:document.getElementById("ai_pw")?.value});
      Auth.save(d.token,d.user);msg.style.color="#4EC600";msg.textContent="Welcome back, "+d.user.username+"!";
      if(game){const t=await Auth.loadTrophies();if(t)game.trophies=t;}
      setTimeout(closeAuth,1100);
    }else if(_authTab==="register"){
      const d=await Auth.req("/auth/register","POST",{username:document.getElementById("ai_un")?.value.trim(),email:document.getElementById("ai_em")?.value.trim(),password:document.getElementById("ai_pw")?.value});
      Auth.save(d.token,d.user);msg.style.color="#4EC600";msg.textContent="Welcome, "+d.user.username+"!";setTimeout(closeAuth,1100);
    }else{
      const nick=document.getElementById("ai_guest")?.value.trim()||"Guest";
      try{const d=await Auth.req("/auth/guest","POST");d.user.username=nick;Auth.save(d.token,d.user);}catch{Auth.user={username:nick,isGuest:true};Auth.token=null;}
      msg.style.color="#baa701";msg.textContent="Playing as guest: "+nick;setTimeout(closeAuth,900);
    }
  }catch(e){msg.style.color="#ff6666";msg.textContent=e.message||"Error";}
}

// ── Draw Helpers ────────────────────────────────────────────
function drawImg(img,x,y,w,h){
  if(!img||!img.complete||!img.naturalWidth)return;
  ctx.save();ctx.translate(sx(x),sy(y));
  const iw=w||(img.naturalWidth*scale),ih=h||(img.naturalHeight*scale);
  ctx.drawImage(img,-iw/2,-ih/2,iw,ih);
  ctx.restore();
}
function drawImgSized(img,x,y,w,h){if(!img||!img.complete||!img.naturalWidth)return;ctx.save();ctx.drawImage(img,sx(x),sy(y),ss(w),ss(h));ctx.restore();}

const fontFace=new FontFace("LSDFont","url(font/font.otf)");
fontFace.load().then(f=>document.fonts.add(f)).catch(()=>{});

function setFont(sz,align="center"){ctx.font=`${ss(sz)}px LSDFont,monospace`;ctx.textAlign=align;ctx.textBaseline="middle";}
function txt(text,x,y,col="#fff",sz=28,align="center"){setFont(sz,align);ctx.fillStyle=col;ctx.fillText(text,sx(x),sy(y));}

function btn(label,x,y,w,h,col="#a10000",textCol="#baa701"){
  const hov=mouseX>x-w/2&&mouseX<x+w/2&&mouseY>y-h/2&&mouseY<y+h/2;
  const bw=hov?w*1.08:w,bh=hov?h*1.08:h;
  ctx.save();
  ctx.fillStyle=hov?"#c00":col;
  ctx.shadowColor="rgba(161,0,0,0.4)";ctx.shadowBlur=hov?ss(15):0;
  ctx.beginPath();ctx.roundRect(sx(x-bw/2),sy(y-bh/2),ss(bw),ss(bh),ss(10));ctx.fill();
  ctx.shadowBlur=0;
  setFont(Math.min(22,h*0.45));ctx.fillStyle=textCol;ctx.fillText(label,sx(x),sy(y));
  ctx.restore();
}
function isBtnPressed(x,y,w,h){if(clickAvail()&&mouseX>x-w/2&&mouseX<x+w/2&&mouseY>y-h/2&&mouseY<y+h/2){consumeClick();return true;}return false;}
function isHov(x,y,w,h){return mouseX>x-w/2&&mouseX<x+w/2&&mouseY>y-h/2&&mouseY<y+h/2;}
function fillR(x,y,w,h,col,alpha=1,r=0){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(sx(x),sy(y),ss(w),ss(h),ss(r));ctx.fill();ctx.restore();}
function strokeR(x,y,w,h,col,lw=2,r=0){ctx.save();ctx.strokeStyle=col;ctx.lineWidth=ss(lw);ctx.beginPath();ctx.roundRect(sx(x),sy(y),ss(w),ss(h),ss(r));ctx.stroke();ctx.restore();}
function circle(x,y,r,col,alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=col;ctx.beginPath();ctx.arc(sx(x),sy(y),ss(r),0,Math.PI*2);ctx.fill();ctx.restore();}
function hpBar(x,y,w,h,val,max,col="#4EC600"){
  fillR(x,y,w,h,"#222",1,4);
  fillR(x,y,w*(val/max),h,col,1,4);
  strokeR(x,y,w,h,"#555",1.5,4);
}

class LSDConsole{
  constructor(){
    this.screen=0;
    this.sidePanelOpen=false;
    this.trophies=TrophyStore.load();
    this.lsdafue=new LSDAttackForceUE();
    this.target=new TargetShooting();
    this.nation=new NationBuilder();
    this.zombies=new AttackOfZombies();
    this.ball=new BallGame();
    this.artist=new ArtistMaker();
    this.loadTime=millis();
    this._lbData=null;_lbGame=null;this._lbLoading=false;
    this._prevScreen=0;
    this._trophySyncTimer=0;
    // Load server trophies if logged in
    Auth.loadTrophies().then(t=>{if(t){this.trophies=t;TrophyStore.save(t);}});
  }
  setScreen(s){
    this._prevScreen=this.screen;
    this.screen=s;
    updateGamepad(s);
    this.sidePanelOpen=false;
  }
  handleEsc(){
    if(this.screen===0)return;
    if(this.screen===7||this.screen===8||this.screen===9){this.setScreen(0);return;}
    this.sidePanelOpen=!this.sidePanelOpen;
  }
  handleKeyPress(k){
    if(this.screen===1)this.lsdafue.keyPress(k);
    if(this.screen===2)this.target.keyPress(k);
    if(this.screen===3)this.nation.keyPress(k);
    if(this.screen===4)this.zombies.keyPress(k);
    if(this.screen===1&&this.lsdafue.menuPhase==="enterCode")this.lsdafue.handleCodeKey(k);
  }
  handleKeyRelease(k){
    if(this.screen===1)this.lsdafue.keyRelease(k);
    if(this.screen===2)this.target.keyRelease(k);
    if(this.screen===4)this.zombies.keyRelease(k);
  }
  updateTrophies(){
    const T=this.trophies;
    if(this.lsdafue.voltaGrax>=1)T[0]=true;
    if(this.lsdafue.voltaYuke>=1)T[1]=true;
    if(this.lsdafue.usedBot)T[2]=true;
    if(this.nation.builtCity)T[3]=true;
    if(this.zombies.killedZombie)T[4]=true;
    if(this.target.TSo>=1)T[5]=true;
    if(this.ball.bounced)T[6]=true;
    if(this.lsdafue.voltaGrax>=5)T[7]=true;
    if(this.lsdafue.voltaYuke>=5)T[8]=true;
    if(this.nation.money>=10000)T[9]=true;
    if(this.target.TSo>=5)T[10]=true;
    if(this.zombies.completedAllRounds)T[11]=true;
    if(this.lsdafue.usedUltra)T[12]=true;
    if(this.lsdafue.wonWithUltra)T[13]=true;
    // Sync to server every 30s
    if(millis()-this._trophySyncTimer>30000){
      this._trophySyncTimer=millis();
      TrophyStore.save(T);
      Auth.saveTrophies(T);
    }
  }

  draw(){
    if(millis()-this.loadTime<2800){
      ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
      drawImg(images.logoLSD,BASE_W/2,BASE_H/2);
      const p=Math.min(1,(millis()-this.loadTime)/2800);

      txt("LOADING...",BASE_W/2,BASE_H-30,"#444",18);

    }
    this.updateTrophies();
    switch(this.screen){
      case 0:this.drawMenu();break;
      case 1:this.lsdafue.draw();break;
      case 2:this.target.draw();break;
      case 3:this.nation.draw();break;
      case 4:this.zombies.draw();break;
      case 5:this.ball.draw();break;
      case 6:this.artist.draw();break;
      case 7:this.drawInfo();break;
      case 8:this.drawLibrary();break;
      case 9:this.drawLeaderboard();break;
    }

class LSDAttackForceUE{

  keyRelease(k){if(this.fighter1)this.fighter1.keyRelease(k);if(this.fighter2&&this.mode==="local")this.fighter2.keyRelease(k);}
  handleCodeKey(k){
    if(document.getElementById("authOverlay").classList.contains("show"))return;
    if(k==="Enter"&&this._codeInput.length===6){this.joinRoom(this._codeInput);return;}
    if(k==="Backspace"){this._codeInput=this._codeInput.slice(0,-1);return;}
    if(/^\d$/.test(k)&&this._codeInput.length<6)this._codeInput+=k;
  }
  connectSocket(){
    if(this.socket)return;
    this.socket=io(API_URL+"/afue",{auth:{token:Auth.token,username:Auth.username()},transports:["websocket","polling"]});
    this.socket.on("room_created",d=>{this.roomCode=d.code;this.playerIndex=0;this.waitingOpponent=true;});
    this.socket.on("opponent_joined",d=>{this.waitingOpponent=false;this.opponentInfo=d;});
    this.socket.on("room_joined",d=>{this.roomCode=d.code;this.playerIndex=1;this.opponentInfo={username:d.opponentUsername,char:d.opponentChar};});
    this.socket.on("game_start",d=>{this._setupOnlineFight(d);});
    this.socket.on("opponent_input",d=>{if(this.fighter2)this.fighter2.applyRemoteInput(d);});
    this.socket.on("opponent_left",()=>{this.onlineMsg="Opponent disconnected.";setTimeout(()=>this.reset(),2500);});
    this.socket.on("error",d=>{this.onlineMsg=d.msg||"Error";});
  }
  _setupOnlineFight(data){
    const myChar=this.playerIndex===0?data.p0.char:data.p1.char;
    const opChar=this.playerIndex===0?data.p1.char:data.p0.char;
    this.p1Char=myChar;this.p2Char=opChar;
    this._buildFighters();this.menuPhase="fight";
    if(myChar==="grax")this.voltaGrax++;else this.voltaYuke++;
  }
  createRoom(){this.connectSocket();this.socket.emit("create_room",{char:this.p1Char});}
  joinRoom(code){this.connectSocket();this.socket.emit("join_room",{code,char:this.p1Char});}
  _buildFighters(){
    const p1=this.p1Char,p2=this.p2Char;
    const frames=(ch,n)=>Array.from({length:n},(_,i)=>({r:images[`${ch}_r_${i}`],l:images[`${ch}_l_${i}`]}));
    const n1=p1==="grax"?14:13,n2=p2==="grax"?14:13;
    this.fighter1=new Fighter(frames(p1,n1),180,750,p1,1,this.mode);
    this.fighter2=new Fighter(frames(p2,n2),BASE_W-180,750,p2,2,this.mode==="cpu"?"cpu":this.mode);
    if(this.mode==="cpu")this.fighter2.cpuDiff=this.cpuDiff;
  }

// ============================================================
//  FIGHTER CLASS v4 — proper facing, multi-combo ultra,
//  smooth animation, hit-flash, CPU AI 3 levels
// ============================================================

// Multiple valid ultra combos per player (any of these works)
const ULT_COMBOS_P1 = [
  ["w","s","e","q"],   // original
  ["q","w","s","e"],   // rotated
  ["e","q","w","s"],   // rotated
];
const ULT_COMBOS_P2 = [
  ["i","k","o","u"],
  ["u","i","k","o"],
  ["o","u","i","k"],
];

class Fighter{
  constructor(frames,x,y,name,playerNum,mode){
    this.frames=frames; this.x=x; this.y=y; this.name=name;
    this.playerNum=playerNum; this.mode=mode;
    this.hp=100; this.frame=0;
    // Facing is ALWAYS computed from enemy position each frame
    // P1 starts left→faces right; P2 starts right→faces left
    this.facing=playerNum===1?1:-1;
    this.blocking=false;
    this.cd1=0;this.cd2=0;this.cd3=0;this.cd4=0;
    this.anim=null;
    this.projX=x;this.projDir=1;this.projActive=false;this.proj2Active=false;
    // Ultra combo tracking — check against all combos simultaneously
    this.ultCombos=playerNum===1?ULT_COMBOS_P1.map(c=>[...c]):ULT_COMBOS_P2.map(c=>[...c]);
    this.ultProgress=this.ultCombos.map(()=>0); // progress index per combo
    this.ultActive=false; this.ultKill=false; this.ultKillUsed=false;
    this.ultVideo=null;
    this.ultFlash=0; // flash effect timer when ult activates
    this.hitFlash=0; // red flash when hit
    this.cpuDiff="medium";
    this._init=false;
    this._cpuState={action:null,thinkEnd:0,blockEnd:0};
    this._remoteInput={};
    this._velX=0; // smooth movement velocity
  }

  get ultIdx(){ return Math.max(...this.ultProgress); } // for HUD progress bar

  keyPress(k){
    const ku=k.toLowerCase();
    // Check each combo sequence
    let anyAdvanced=false;
    this.ultCombos.forEach((combo,ci)=>{
      if(ku===combo[this.ultProgress[ci]]){
        this.ultProgress[ci]++;
        anyAdvanced=true;
        if(this.ultProgress[ci]>=combo.length){
          // ULTRA ACTIVATED!
          this.ultActive=true;
          this.ultProgress=this.ultCombos.map(()=>0);
          this.ultFlash=millis();
          this.ultVideo=videos[this.name==="grax"?"grax_ultimate":"yuke_ultimate"];
          if(this.ultVideo){this.ultVideo.currentTime=0;this.ultVideo.play().catch(()=>{});}
          if(game)game.lsdafue.usedUltra=true;
        }
      } else {
        // Wrong key for this combo — reset this combo
        this.ultProgress[ci]=0;
        // But check if key matches start of this combo
        if(ku===combo[0]) this.ultProgress[ci]=1;
      }
    });
  }
  keyRelease(k){}
  applyRemoteInput(inp){this._remoteInput=inp;}

  update(enemy){
    if(!this._init){this.cd1=this.cd2=this.cd3=this.cd4=millis();this._init=true;}
    const now=millis(), t=frameCount%30;

    // ── FACING — always face the enemy ──────────────────────
    // Use _r frames when facing right, _l when facing left
    // This means sprites are ALWAYS from the correct set:
    // original (right-facing) when enemy is to the right,
    // Specchiato (left-facing) when enemy is to the left
    this.facing = enemy.x > this.x ? 1 : -1;

    if(this.mode==="cpu"&&this.playerNum===2){this._cpuUpdate(enemy,now,t);return;}

    // Input source
    let inp;
    if(this.mode==="online"&&this.playerNum===2){
      inp=this._remoteInput;
    } else {
      const p1=this.playerNum===1;
      inp={
        a: p1?(keys["a"]||keys["A"]):(keys["j"]||keys["J"]),
        d: p1?(keys["d"]||keys["D"]):(keys["l"]||keys["L"]),
        c: p1?(keys["c"]||keys["C"]):(keys[";"]),
        w: p1?(keys["w"]||keys["W"]):(keys["i"]||keys["I"]),
        s: p1?(keys["s"]||keys["S"]):(keys["k"]||keys["K"]),
        q: p1?(keys["q"]||keys["Q"]):(keys["u"]||keys["U"]),
        e: p1?(keys["e"]||keys["E"]):(keys["o"]||keys["O"]),
      };
    }

    // ── ANIMATION TICK ──────────────────────────────────────
    if(this.anim){
      const el=frameCount-this.anim.start;
      if(el>=this.anim.dur){this.frame=0;this.anim=null;}
      else{
        switch(this.anim.type){
          case"punch":  this.frame=el<14?3:4; break;
          case"kick":   this.frame=el<14?5:6; break;
          case"ranged":
            this.frame=this.name==="grax"?(el<14?9:10):(el<14?11:12);
            if(this.name==="yuke"&&el===14){this.projX=this.x+this.facing*140;this.projDir=this.facing;this.projActive=true;}
            break;
          case"special":
            this.frame=this.name==="grax"?(el<9?11:el<18?12:13):(el<14?9:10);
            if(this.name==="yuke"&&el===14){this.projX=this.x+this.facing*140;this.projDir=this.facing;this.proj2Active=true;}
            break;
          case"hit": this.frame=8; break;
        }
      }
      // Move projectiles
      if(this.projActive){
        this.projX+=9*this.projDir;
        if((this.projDir>0&&this.projX>enemy.x+50)||(this.projDir<0&&this.projX<enemy.x-50))this.projActive=false;
      }
      if(this.proj2Active){
        this.projX+=8*this.projDir;
        if((this.projDir>0&&this.projX>enemy.x+50)||(this.projDir<0&&this.projX<enemy.x-50))this.proj2Active=false;
      }
      return;
    }

    // ── MOVEMENT (smooth with velocity) ────────────────────
    if(inp.d){ this._velX=Math.min(this._velX+1.2,6); this.frame=t<15?1:2; }
    else if(inp.a){ this._velX=Math.max(this._velX-1.2,-6); this.frame=t<=15?2:0; }
    else { this._velX*=0.75; this.frame=0; }
    this.x=Math.max(60,Math.min(BASE_W-60,this.x+this._velX));

    // ── COLLISION PUSH ──────────────────────────────────────
    const overlap=85;
    if(Math.abs(this.x-enemy.x)<overlap){
      const push=(overlap-Math.abs(this.x-enemy.x))*0.4;
      this.x+=this.x<enemy.x?-push:push;
      this.x=Math.max(60,Math.min(BASE_W-60,this.x));
    }

    // ── BLOCK ───────────────────────────────────────────────
    this.blocking=!!(inp.c);
    if(inp.c){this.frame=7;this._velX=0;}

    const dist=Math.abs(enemy.x-this.x);
    const halfHP=enemy.hp<=50; // special only unlocks when enemy ≤50%

    // ── ATTACKS ─────────────────────────────────────────────
    if(inp.w&&now-this.cd1>1600&&!this.anim){
      this.anim={type:"punch",start:frameCount,dur:22};this.cd1=now;
      if(dist<200)this._hit(enemy,5,1,55);
    }
    if(inp.s&&now-this.cd2>3200&&!this.anim){
      this.anim={type:"kick",start:frameCount,dur:26};this.cd2=now;
      if(dist<180)this._hit(enemy,10,2.5,140);
    }
    if(inp.q&&now-this.cd3>6500&&!this.anim){
      this.anim={type:"ranged",start:frameCount,dur:28};this.cd3=now;
      if(this.name==="grax"&&dist<950)this._hit(enemy,15,5,0); // instant for Grax ranged
    }
    if(inp.e&&now-this.cd4>8500&&!this.anim&&halfHP){
      this.anim={type:"special",start:frameCount,dur:30};this.cd4=now;
      this.hp=Math.min(100,this.hp+(this.name==="grax"?28:8));
      if(dist<950)this._hit(enemy,12,5,0);
    }

    // ── ULTRA KILL APPLY ────────────────────────────────────
    if(this.ultKill){
      enemy.hp=Math.max(0,enemy.hp-50);
      this.ultKill=false;
      this.ultKillUsed=true;
    }
  }

  _hit(enemy,dmg,blockDmg,knockback){
    if(enemy.blocking){
      enemy.hp=Math.max(0,enemy.hp-blockDmg);
    } else {
      enemy.hp=Math.max(0,enemy.hp-dmg);
      enemy.hitFlash=millis();
      if(knockback>0){
        const dir=enemy.x>this.x?1:-1;
        enemy.x=Math.max(60,Math.min(BASE_W-60,enemy.x+dir*knockback));
      }
      if(!enemy.anim||enemy.anim.type!=="hit"){
        enemy.anim={type:"hit",start:frameCount,dur:8};
      }
    }
  }

  _cpuUpdate(enemy,now,t){
    const dist=Math.abs(enemy.x-this.x), d=this.cpuDiff;
    const reactionMs={easy:1100,medium:520,hard:160}[d]||520;
    const aggression={easy:0.18,medium:0.52,hard:0.9}[d]||0.52;

    this.facing=enemy.x>this.x?1:-1;
    this.x=Math.max(60,Math.min(BASE_W-60,this.x));

    if(now<this._cpuState.thinkEnd){
      const act=this._cpuState.action;
      if(act==="approach"){this.x+=this.facing*4;this.frame=t<15?1:2;}
      else if(act==="retreat"){this.x-=this.facing*3;this.frame=t<=15?2:0;}
      else this.frame=0;
    } else {
      this._cpuState.thinkEnd=now+reactionMs;
      if(dist>270) this._cpuState.action="approach";
      else if(dist<65&&d!=="hard") this._cpuState.action="retreat";
      else this._cpuState.action=Math.random()<aggression?"attack":"idle";
    }

    // Hard CPU blocks more
    if(d==="hard"&&dist<180&&Math.random()<0.22&&now>this._cpuState.blockEnd){
      this.blocking=true;this.frame=7;this._cpuState.blockEnd=now+600;return;
    }
    this.blocking=false;

    if(this.anim){
      const el=frameCount-this.anim.start;
      if(el>=this.anim.dur){this.frame=0;this.anim=null;}
      else{if(this.anim.type==="punch")this.frame=el<14?3:4;else if(this.anim.type==="kick")this.frame=el<14?5:6;}
      return;
    }
    if(this._cpuState.action!=="attack")return;

    const halfHP=enemy.hp<=50;
    if(dist<175&&now-this.cd2>3200&&Math.random()<0.52){
      this.anim={type:"kick",start:frameCount,dur:26};this.cd2=now;this._hit(enemy,10,2.5,140);
    } else if(dist<195&&now-this.cd1>1600){
      this.anim={type:"punch",start:frameCount,dur:22};this.cd1=now;this._hit(enemy,5,1,55);
    } else if(now-this.cd3>6500&&d!=="easy"&&Math.random()<0.42){
      this.anim={type:"ranged",start:frameCount,dur:28};this.cd3=now;this._hit(enemy,15,5,0);
    } else if(halfHP&&now-this.cd4>8500&&d==="hard"&&Math.random()<0.68){
      this.anim={type:"special",start:frameCount,dur:30};this.cd4=now;
      this.hp=Math.min(100,this.hp+(this.name==="grax"?28:8));this._hit(enemy,12,5,0);
    }
  }

  drawChar(){
    const now=millis();
    // Hit flash — red tint when receiving damage
    const flashActive=this.hitFlash&&now-this.hitFlash<200;
    if(flashActive){ctx.save();ctx.globalAlpha=0.5;ctx.fillStyle="#ff0000";ctx.fillRect(sx(this.x-100),sy(this.y-280),ss(200),ss(320));ctx.restore();}

    const fs=this.frames[Math.min(this.frame,this.frames.length-1)];
    if(fs){
      // facing 1 = enemy is to the right → use right-facing sprite (_r)
      // facing -1 = enemy is to the left  → use left-facing sprite (_l)
      const img=this.facing===1?fs.r:fs.l;
      if(img&&img.complete&&img.naturalWidth) drawImg(img,this.x,this.y);
    }

    // Yuke projectiles
    if(this.projActive&&this.name==="yuke"){
      const k=this.projDir>0?"yuke_proj_r":"yuke_proj_l";
      if(images[k])drawImg(images[k],this.projX,this.y-90);
    }
    if(this.proj2Active&&this.name==="yuke"){
      const k=this.projDir>0?"yuke_meteora_r":"yuke_meteora_l";
      if(images[k])drawImg(images[k],this.projX,this.y-90);
    }
    // Grax ranged wave effect
    if(this.name==="grax"&&this.anim?.type==="ranged"){
      const el=frameCount-this.anim.start;
      const alpha=0.5-el/this.anim.dur*0.5;
      ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle="#C97900";
      ctx.fillRect(sx(this.x+(this.facing>0?0:-200)),sy(this.y-260),ss(200),ss(320));
      ctx.restore();
    }

    // Ultra ready glow
    const maxProgress=Math.max(...this.ultProgress);
    const maxComboLen=this.ultCombos[0].length;
    if(maxProgress>0&&!this.ultActive){
      const glowAlpha=0.15+0.2*(maxProgress/maxComboLen)*Math.sin(now/120);
      ctx.save();ctx.globalAlpha=glowAlpha;ctx.fillStyle="#8B17D3";
      ctx.fillRect(sx(this.x-100),sy(this.y-280),ss(200),ss(320));ctx.restore();
    }
  }

  drawUlt(){
    if(!this.ultActive||!this.ultVideo)return;

    const now=millis();
    // Flash white for first 300ms when ultra activates
    if(this.ultFlash&&now-this.ultFlash<300){
      const alpha=1-(now-this.ultFlash)/300;
      ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle="#ffffff";ctx.fillRect(0,0,W,H);ctx.restore();
    }

    // Draw video fullscreen
    ctx.save();ctx.drawImage(this.ultVideo,sx(0),sy(0),ss(BASE_W),ss(BASE_H));ctx.restore();

    // Check end condition
    const ended=this.ultVideo.ended||
      (this.name==="yuke"&&this.ultVideo.currentTime>=84)||
      (this.name==="grax"&&this.ultVideo.currentTime>=65);
    if(ended){
      this.ultActive=false;this.ultKill=true;
      this.ultVideo.pause();
      // End flash
      this.hitFlash=now;
    }
  }
}

class TargetShooting{
  constructor(){this.reset();}
  reset(){this.started=false;this.score=0;this.attempts=10;this.difficulty=0;this.forza=0;this.shot=false;this.shotX=0;this.shotY=0;this.delayActive=false;this.delayEnd=0;this.targetX=BASE_W/2;this.targetY=BASE_H/2;this.tSpeedX=1.5;this.tSpeedY=1.2;this.TSo=0;this._submitted=false;this._lbData=null;this._lbLoading=false;}
  keyPress(k){if(k==="b"||k==="B")keys["b"]=true;}
  keyRelease(k){if(k==="b"||k==="B")keys["b"]=false;}
  draw(){
    ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
    drawImg(images.logo,BASE_W/2,BASE_H/2);
    this._drawTarget();this._drawBar();this._drawCrosshair();
    // LB button
    fillR(BASE_W-190,55,170,42,"#a10000",0.88,8);txt("🏆 RANKS",BASE_W-105,76,"#baa701",17);
    if(isBtnPressed(BASE_W-105,76,170,42)&&!this._lbLoading){this._lbLoading=true;Auth.getLeaderboard("target").then(d=>{this._lbData=d;this._lbLoading=false;});}
    txt(`Score: ${this.score}`,BASE_W-105,30,"#fff",24);
    if(!this.started){
      btn("START",BASE_W/2,BASE_H-230,220,82);
      if(isBtnPressed(BASE_W/2,BASE_H-230,220,82)){this.started=true;showLegend("TARGET SHOOTING",[["Aim","Move mouse / touch over target"],["Charge","Hold B key (PC) or HOLD button (mobile)"],["Shoot","Click / tap while charged"],["Scoring","Bullseye=8pts, Near=6pts, Hit=2-4pts, Miss=-3pts"],["Rounds","10 shots total"],["Tip","Green bar = perfect power, red = too much!"]]);}
      if(this._lbData)this._drawLB();
    }else if(this.attempts>0){
      if(!this.delayActive){
        if(keys["b"]&&this.forza<580)this.forza++;
        else if(this.forza>0&&!keys["b"])this.forza=Math.max(0,this.forza-1);
        this.targetX+=this.tSpeedX*this.difficulty;this.targetY+=this.tSpeedY*this.difficulty;
        if(this.targetX-50<=180||this.targetX+50>=BASE_W-100)this.tSpeedX*=-1;
        if(this.targetY-50<=100||this.targetY+50>=BASE_H-100)this.tSpeedY*=-1;
        if(clickAvail()&&this.forza>0&&!this.shot){
          consumeClick();this.shot=true;this.shotX=mouseX;
          let off=0;if(this.forza<=260)off=100-this.forza/260*80;else if(this.forza<500)off=(this.forza<380?(this.forza-260)/120*-10:(this.forza-380)/120*10-10);else off=-(this.forza-500)/80*100;
          this.shotY=mouseY+off;
          const d2=Math.hypot(this.shotX-this.targetX,this.shotY-this.targetY);
          let pts=0;
          if(d2<=10)pts=8;else if(d2<=20){this.TSo++;pts=8;}else if(d2<=40)pts=6;else if(d2<=50)pts=4;else if(d2<=100)pts=2;else pts=-3;
          this.score+=pts;this.difficulty++;this.attempts--;this.delayActive=true;this.delayEnd=millis()+900;
        }
      }else{if(millis()>this.delayEnd){this.delayActive=false;this.shot=false;this.forza=0;}}
      txt(`${11-this.attempts}/10`,BASE_W/2,40,"#fff",24);
    }else{
      if(!this._submitted){Auth.submitScore("target",this.score);this._submitted=true;}
      txt(`FINAL SCORE: ${this.score}`,BASE_W/2,BASE_H/2-90,"#baa701",36);
      btn("PLAY AGAIN",BASE_W/2,BASE_H-200,240,82);
      if(isBtnPressed(BASE_W/2,BASE_H-200,240,82))this.reset();
      if(this._lbData)this._drawLB();
    }
  }
  _drawLB(){
    const rows=(this._lbData?.leaderboard||[]).slice(0,8);
    fillR(38,180,300,360,"#000",0.82,10);strokeR(38,180,300,360,"#baa701",1.5,10);
    txt("TOP SCORES",188,206,"#baa701",20);
    rows.forEach((r,i)=>{ txt(`#${r.rank} ${r.username}`,138,240+i*36,"#fff",17,"left");txt(`${r.bestScore}`,320,240+i*36,"#baa701",17,"right"); });
    if(this._lbData?.myRank)txt(`You: #${this._lbData.myRank.rank} — ${this._lbData.myRank.bestScore}pts`,188,520,"#4EC600",16);
  }
  _drawTarget(){
    ctx.save();ctx.strokeStyle="#0000ff";ctx.lineWidth=ss(2);ctx.strokeRect(sx(180),sy(98),ss(BASE_W-280),ss(BASE_H-200));ctx.restore();
    circle(this.targetX,this.targetY,50,"#fff");circle(this.targetX,this.targetY,40,"#000");circle(this.targetX,this.targetY,20,"#F50C0C");circle(this.targetX,this.targetY,10,"#F0F50C");
    txt("Hold B to charge · Click to shoot",BASE_W/2,BASE_H-46,"#F0F50C",22);
  }
  _drawBar(){
    ctx.save();ctx.fillStyle="#fff";ctx.fillRect(sx(46),sy(250),ss(60),ss(530));
    ctx.fillStyle=this.forza<=260?"#F0F50C":this.forza<500?"#00ff00":"#ff0000";
    ctx.fillRect(sx(54),sy(775-this.forza),ss(44),ss(this.forza));ctx.restore();
    txt("B",76,800,"#F0F50C",18);
  }
  _drawCrosshair(){
    ctx.save();ctx.strokeStyle="#fff";ctx.lineWidth=ss(1.5);ctx.beginPath();ctx.moveTo(sx(mouseX-26),sy(mouseY));ctx.lineTo(sx(mouseX+26),sy(mouseY));ctx.moveTo(sx(mouseX),sy(mouseY-26));ctx.lineTo(sx(mouseX),sy(mouseY+26));ctx.stroke();ctx.beginPath();ctx.arc(sx(mouseX),sy(mouseY),ss(6),0,Math.PI*2);ctx.stroke();ctx.restore();
    if(this.shot){ctx.save();ctx.strokeStyle="#00f";ctx.lineWidth=ss(4);ctx.beginPath();ctx.moveTo(sx(this.shotX-5),sy(this.shotY));ctx.lineTo(sx(this.shotX+5),sy(this.shotY));ctx.moveTo(sx(this.shotX),sy(this.shotY-5));ctx.lineTo(sx(this.shotX),sy(this.shotY+5));ctx.stroke();ctx.restore();}
  }
}

//  GAME 3 — NATION BUILDER (improved)
// ============================================================
class NationBuilder{
  constructor(){this.lsdnation=false;this.squares=null;this.money=2000;this.energy=0;this.water=0;this.happiness=75;this.turn=0;this.selected=null;this._clickCd=0;this.builtCity=false;this.COLS=0;this.ROWS=0;this.TILE=50;this._lbData=null;}
  keyPress(k){if(k==="a"||k==="A")this.nextTurn();if(k==="s"||k==="S")this.save();if(k==="Escape")this.selected=null;}
  initMap(){
    this.COLS=Math.floor(BASE_H/this.TILE);this.ROWS=Math.floor(BASE_W/this.TILE);
    this.squares=[];
    for(let i=0;i<this.COLS;i++){this.squares[i]=[];for(let j=0;j<this.ROWS;j++)this.squares[i][j]={state:"terra",level:0};}
    // Water pattern
    for(let i=0;i<this.COLS;i++){
      [0,1].forEach(j=>this.squares[i][j]={state:"acqua",level:0});
      if(i>=1)[2,3,4].forEach(j=>{if(j<this.ROWS)this.squares[i][j]={state:"acqua",level:0};});
      if(i>=4&&i<=14)[5,6,7].forEach(j=>{if(j<this.ROWS)this.squares[i][j]={state:"acqua",level:0};});
      if(i>=8&&i<=11)[8,9].forEach(j=>{if(j<this.ROWS)this.squares[i][j]={state:"acqua",level:0};});
    }
    // Start road
    for(let j=10;j<20;j++){if(this.ROWS>j)this.squares[Math.floor(this.COLS/2)][j]={state:"strada",level:0};}
  }
  save(){if(!this.squares)return;localStorage.setItem("lsd_nation_save",JSON.stringify({money:this.money,energy:this.energy,water:this.water,happiness:this.happiness,turn:this.turn,squares:this.squares}));}
  load(){try{const d=localStorage.getItem("lsd_nation_save");if(d){const o=JSON.parse(d);Object.assign(this,{money:o.money,energy:o.energy,water:o.water,happiness:o.happiness||75,turn:o.turn,squares:o.squares});this.COLS=this.squares.length;this.ROWS=this.squares[0].length;return true;}}catch{}return false;}
  nextTurn(){
    if(!this.squares)return;this.turn++;
    let citiesWithPower=0,totalCities=0,happinessChange=0;
    for(let i=0;i<this.COLS;i++)for(let j=0;j<this.ROWS;j++){
      const s=this.squares[i][j];
      if(s.state==="energia"&&this.money>=4){this.energy+=50;this.money-=4;}
      if(s.state==="idratazione"&&this.money>=4){this.water+=350;this.money-=4;}
      if(s.state==="parco"){happinessChange+=2;}
      if(s.state==="citta"){
        totalCities++;
        const lv=s.level||0,mult=1+lv*0.5;
        if(this.energy>=20*mult&&this.water>=200*mult){
          citiesWithPower++;this.energy-=Math.floor(20*mult);this.water-=Math.floor(200*mult);
          this.money+=Math.floor((20+lv*15)*mult);
          this.builtCity=true;
        }else happinessChange-=5;
      }
    }
    if(totalCities>0)happinessChange+=(citiesWithPower/totalCities)*5;
    this.happiness=Math.max(0,Math.min(100,this.happiness+happinessChange-1));
    if(this.money>=10000&&game)game.trophies[9]=true;
    this.save();
  }
  draw(){if(!this.lsdnation)this.drawMenu();else this.drawGame();}
  drawMenu(){
    ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
    // Animated bg logo
    if(!this._animX){this._animX=400;this._animDir=1;}
    this._animX+=this._animDir*1.5;if(this._animX>1200)this._animDir=-1;if(this._animX<400)this._animDir=1;
    drawImg(images.nb_menu1,BASE_W/2,BASE_H/2);
    txt("LSD NATION BUILDER",BASE_W/2,60,"#a10000",38);
    txt("Build your city, manage resources, keep citizens happy",BASE_W/2,100,"#888",20);
    btn("🗺 NEW GAME",BASE_W/2,280,320,80);
    btn("📂 CONTINUE",BASE_W/2,390,320,80,"#1a3a1a");
    btn("◀ BACK",BASE_W/2,BASE_H-60,220,56,"#222");
    if(isBtnPressed(BASE_W/2,280,320,80)){this.initMap();this.money=2000;this.energy=0;this.water=0;this.happiness=75;this.turn=0;this.lsdnation=true;showLegend("NATION BUILDER",[["Click tile","Select a tile to build"],["A key / button","Advance to next turn"],["S key","Save game"],["Land (green)","Build cities, power plants, water plants, parks"],["Water (blue)","Build water treatment plants"],["City","Generates money each turn — needs power & water"],["Power Plant","Generates energy each turn"],["Water Plant","Generates water each turn"],["Park","Increases citizen happiness"],["Happiness","Keep above 50% to avoid penalties"]]);}
    if(isBtnPressed(BASE_W/2,390,320,80)){this.initMap();if(!this.load()){this.money=2000;this.energy=0;this.water=0;this.happiness=75;this.turn=0;}this.lsdnation=true;}
    if(isBtnPressed(BASE_W/2,BASE_H-60,220,56)){if(game)game.setScreen(0);}
  }
  drawGame(){
    if(!this.squares)return;
    const COLORS={terra:"#3a7d3a",acqua:"#1a5fa8",citta:"#cc2222",energia:"#e0d000",idratazione:"#1a8acc",parco:"#2aa82a",strada:"#777"};
    for(let i=0;i<this.COLS;i++)for(let j=0;j<this.ROWS;j++){
      const s=this.squares[i][j];
      const lv=s.level||0;
      let col=COLORS[s.state]||"#3a7d3a";
      if(s.state==="citta"){const intensity=Math.min(1,lv/3);col=`rgb(${Math.floor(204-lv*40)},${Math.floor(34+lv*20)},${Math.floor(34)})`;} 
      ctx.save();ctx.fillStyle=col;ctx.strokeStyle="rgba(0,0,0,0.3)";ctx.lineWidth=ss(0.5);
      ctx.fillRect(sx(j*this.TILE),sy(i*this.TILE),ss(this.TILE),ss(this.TILE));
      ctx.strokeRect(sx(j*this.TILE),sy(i*this.TILE),ss(this.TILE),ss(this.TILE));
      if(s.state==="citta"&&lv>0){setFont(12);ctx.fillStyle="#fff";ctx.fillText(lv,sx(j*this.TILE+this.TILE/2),sy(i*this.TILE+this.TILE/2));}
      ctx.restore();
    }
    // HUD bar
    fillR(0,0,BASE_W,54,"#000",0.82);
    // Resources
    txt(`💰${this.money}`,80,27,"#FFD700",22);
    txt(`⚡${this.energy}`,220,27,"#F0F000",22);
    txt(`💧${this.water}`,360,27,"#00BFFF",22);
    // Happiness bar
    const hcol=this.happiness>70?"#4EC600":this.happiness>40?"#F0F000":"#ff4444";
    txt("😊",520,27,hcol,22);
    fillR(545,10,150,30,"#333",1,4);
    fillR(545,10,150*(this.happiness/100),30,hcol,1,4);
    strokeR(545,10,150,30,"#555",1,4);
    txt(`${Math.round(this.happiness)}%`,545+75,27,hcol,18);
    txt(`Turn ${this.turn}`,750,27,"#888",20);
    // Next turn button in HUD
    btn("A — NEXT TURN",950,27,220,42,"#2a2a00","#baa701");
    if(isBtnPressed(950,27,220,42))this.nextTurn();
    btn("SAVE",1180,27,100,42,"#1a3a1a","#4EC600");
    if(isBtnPressed(1180,27,100,42))this.save();
    // Info panel
    if(this.selected){
      const {i,j}=this.selected,s=this.squares[i][j];
      fillR(BASE_W-310,56,310,BASE_H-56,"#000",0.92);
      strokeR(BASE_W-310,56,310,BASE_H-56,"#baa701",2);
      const NAMES={terra:"🌱 Land",acqua:"💧 Water",citta:"🏙 City",energia:"⚡ Power Plant",idratazione:"🚿 Water Plant",parco:"🌳 Park",strada:"🛣 Road"};
      txt(NAMES[s.state]||s.state,BASE_W-155,80,"#baa701",24);
      const lv=s.level||0;
      if(s.state==="terra"){
        txt("Empty land — build something!",BASE_W-155,116,"#888",16);
        btn("🏙 City  💰1200",BASE_W-155,200,250,58);btn("⚡ Power  💰400",BASE_W-155,278,250,58);
        btn("🚿 Water  💰200",BASE_W-155,356,250,58);btn("🌳 Park  💰150",BASE_W-155,434,250,58,"#1a4a1a");
        if(isBtnPressed(BASE_W-155,200,250,58)&&this.money>=1200){this.money-=1200;this._buildArea(i,j,"citta",0);this.nextTurn();}
        if(isBtnPressed(BASE_W-155,278,250,58)&&this.money>=400){this.money-=400;this.squares[i][j]={state:"energia",level:0};this.nextTurn();}
        if(isBtnPressed(BASE_W-155,356,250,58)&&this.money>=200){this.money-=200;this.squares[i][j]={state:"idratazione",level:0};this.nextTurn();}
        if(isBtnPressed(BASE_W-155,434,250,58)&&this.money>=150){this.money-=150;this.squares[i][j]={state:"parco",level:0};this.nextTurn();}
      }
      if(s.state==="acqua"){
        btn("🚿 Water Plant  💰200",BASE_W-155,200,260,58);
        if(isBtnPressed(BASE_W-155,200,260,58)&&this.money>=200){this.money-=200;this.squares[i][j]={state:"idratazione",level:0};this.nextTurn();}
      }
      if(s.state==="citta"){
        const income=Math.floor((20+lv*15)*(1+lv*0.5));const eCost=Math.floor(20*(1+lv*0.5));const wCost=Math.floor(200*(1+lv*0.5));
        txt(`Level ${lv} City`,BASE_W-155,116,"#fff",20);
        txt(`Income: +${income}💰/turn`,BASE_W-155,148,"#FFD700",17);
        txt(`Needs: ${eCost}⚡  ${wCost}💧`,BASE_W-155,172,"#aaa",16);
        if(lv<4){const costs=[0,500,1200,2500,5000];const nextCost=costs[lv+1];btn(`⬆ Upgrade Lv${lv+1}  💰${nextCost}`,BASE_W-155,240,260,58);if(isBtnPressed(BASE_W-155,240,260,58)&&this.money>=nextCost){this.money-=nextCost;this._buildArea(i,j,"citta",lv+1);}}
        else txt("MAX LEVEL",BASE_W-155,240,"#FFD700",22);
        btn("🗑 Demolish",BASE_W-155,320,200,50,"#4a0000");
        if(isBtnPressed(BASE_W-155,320,200,50)){this.squares[i][j]={state:"terra",level:0};}
      }
      if(s.state==="energia")txt("Generates 50⚡/turn\nCosts 4💰/turn",BASE_W-155,160,"#ccc",18);
      if(s.state==="idratazione")txt("Generates 350💧/turn\nCosts 4💰/turn",BASE_W-155,160,"#ccc",18);
      if(s.state==="parco")txt("+2 😊 happiness/turn",BASE_W-155,160,"#4EC600",18);
      btn("✕ CLOSE",BASE_W-155,BASE_H-40,180,46,"#222");
      if(isBtnPressed(BASE_W-155,BASE_H-40,180,46))this.selected=null;
    }
    // Tile click
    if(clickAvail()&&mouseX<(this.selected?BASE_W-310:BASE_W)&&mouseY>56&&millis()-this._clickCd>400){
      const j=Math.floor(mouseX/this.TILE),i=Math.floor(mouseY/this.TILE);
      if(i>=0&&i<this.COLS&&j>=0&&j<this.ROWS){consumeClick();this._clickCd=millis();this.selected={i,j};}
    }
  }
  _buildArea(ci,cj,state,level){
    for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){
      const ni=ci+di,nj=cj+dj;
      if(ni>=0&&ni<this.COLS&&nj>=0&&nj<this.ROWS&&this.squares[ni][nj].state==="terra")
        this.squares[ni][nj]={state,level};
    }
  }
}

// ============================================================
//  GAME 4 — ATTACK OF ZOMBIES (with waves, difficulty, HP bar)
// ============================================================
class AttackOfZombies{
  constructor(){this.reset();}
  reset(){
    this.avviato=false;this.playerChar=null;this.difficulty=null;
    this.wave=1;this.maxWave=10;this.zombieList=[];this.fighter=null;
    this.victory=false;this.winner="";this.victoryTime=0;
    this._clickCd=0;this.killedZombie=false;this.completedAllRounds=false;
    this.waveTimer=0;this.waveActive=false;this.waveMsg="";this.waveMsgEnd=0;
    this.playerHP=100;this.playerMaxHP=100;
  }
  keyPress(k){if(this.fighter)this.fighter.keyPress(k);}
  keyRelease(k){}

  _spawnWave(){
    const diff=this.difficulty;
    const baseCount={easy:1,medium:1,hard:2}[diff]||1;
    const waveBonus=Math.floor(this.wave/2);
    const count=baseCount+waveBonus+(diff==="hard"?1:0);
    const hp={easy:15,medium:22,hard:32}[diff]||20;
    const speed={easy:1.2,medium:2,hard:2.8}[diff]||1.5;
    this.zombieList=[];
    for(let z=0;z<count;z++){
      const fromRight=Math.random()>0.5;
      const offset=z*80;
      const startX=fromRight?BASE_W+100+offset:-100-offset;
      this.zombieList.push(new ZombieFighter(startX,fromRight,hp+this.wave*3,speed+this.wave*0.1));
    }
    this.waveActive=true;
    this.waveMsg=`WAVE ${this.wave}`;this.waveMsgEnd=millis()+2000;
  }

  setupFight(){
    const n=this.playerChar==="grax"?14:13;
    const frames=Array.from({length:n},(_,i)=>({r:images[`${this.playerChar}_r_${i}`],l:images[`${this.playerChar}_l_${i}`]}));
    this.fighter=new Fighter(frames,250,750,this.playerChar,1,"local");
    this.fighter.hp=100;this.playerHP=100;this._spawnWave();
    showLegend("ATTACK OF ZOMBIES",[["Move","A / D keys"],["Punch","W — short range, fast"],["Kick","S — more damage, knockback"],["Ranged","Q — hits from distance"],["Special","E — only when zombie has <50% HP"],["Block","C — reduces zombie damage"],["Survive","Kill all zombies in each wave to advance"],["ESC","Pause"]]);
  }

  draw(){
    if(!this.avviato){this.drawMenu();return;}
    drawImg(images.bg_zombies,BASE_W/2,BASE_H/2);
    // Wave message
    if(millis()<this.waveMsgEnd){
      fillR(BASE_W/2-180,BASE_H/2-40,360,80,"#000",0.75,12);
      txt(this.waveMsg,BASE_W/2,BASE_H/2,"#FFD700",52);
    }
    // Wave progress
    txt(`Wave ${this.wave}/${this.maxWave}`,BASE_W/2,28,"#a10000",26);

    // Player HP bar (top left)
    txt(this.playerChar?.toUpperCase()||"",120,22,"#fff",22);
    hpBar(40,38,200,22,this.fighter?.hp||0,100,"#4EC600");

    // Zombie HP bars (top center)
    if(this.zombieList.length>0){
      const totalHP=this.zombieList.reduce((s,z)=>s+z.hp,0);
      const totalMax=this.zombieList.reduce((s,z)=>s+z.maxHP,0);
      txt("ZOMBIES",BASE_W/2,42,"#a10000",18);
      hpBar(BASE_W/2-150,55,300,18,totalHP,totalMax,"#a10000");
    }

    if(this.fighter){
      const dummy={x:this.zombieList[0]?.x??BASE_W,hp:100,blocking:false,name:"zombie",facing:1};
      this.fighter.update(dummy);
      this.fighter.drawChar();
    }

    // Update zombies
    for(let i=this.zombieList.length-1;i>=0;i--){
      const z=this.zombieList[i];
      z.draw();
      if(this.fighter&&!this.victory){
        z.move(this.fighter);
        // Fighter hits zombie
        if(this.fighter.anim&&!this.fighter.anim.hit){
          const dmgMap={punch:8,kick:14,ranged:20,special:16};
          const reach={punch:200,kick:180,ranged:700,special:200};
          const dt=Math.abs(z.x-this.fighter.x);
          if(this.fighter.anim.type in dmgMap&&dt<reach[this.fighter.anim.type]){
            z.hp-=dmgMap[this.fighter.anim.type];
            this.fighter.anim.hit=true;
            if(z.hp<=0)this.killedZombie=true;
          }
        }
      }
      if(z.hp<=0)this.zombieList.splice(i,1);
    }

    // All zombies dead → next wave
    if(this.waveActive&&this.zombieList.length===0&&!this.victory){
      this.waveActive=false;
      if(this.wave>=this.maxWave){this.victory=true;this.winner=this.playerChar;this.victoryTime=millis();this.completedAllRounds=true;if(game)game.trophies[11]=true;}
      else{this.wave++;setTimeout(()=>{if(!this.victory)this._spawnWave();},1500);this.waveMsg=`Wave ${this.wave} incoming!`;this.waveMsgEnd=millis()+1400;}
    }

    // Player dead
    if(this.fighter&&this.fighter.hp<=0&&!this.victory){this.victory=true;this.winner="ZOMBIE";this.victoryTime=millis();}

    if(this.victory){
      fillR(BASE_W/2-350,BASE_H/2-55,700,110,"#000",0.8,14);
      txt(this.winner==="ZOMBIE"?"💀 GAME OVER":`🏆 ${this.winner.toUpperCase()} WINS!`,BASE_W/2,BASE_H/2,this.winner==="ZOMBIE"?"#ff4444":"#FFD700",46);
      if(millis()-this.victoryTime>=3500){this.reset();if(game)game.setScreen(0);}
    }
  }

  drawMenu(){
    drawImg(images.bg_fight_menu,BASE_W/2,BASE_H/2);
    fillR(BASE_W/2-460,0,920,BASE_H,"#000",0.58);
    txt("LSD ATTACK OF ZOMBIES",BASE_W/2,55,"#a10000",36);

    if(!this.difficulty){
      txt("CHOOSE DIFFICULTY",BASE_W/2,100,"#baa701",26);
      btn("😊 EASY — 10 waves, slow zombies",BASE_W/2,240,480,76,"#1a6e1a");
      btn("😐 MEDIUM — 10 waves, faster hordes",BASE_W/2,348,480,76,"#7a7000");
      btn("💀 HARD — 10 waves, many fast zombies",BASE_W/2,456,480,76,"#8B0000");
      btn("◀ BACK",BASE_W/2,570,220,56,"#222");
      if(isBtnPressed(BASE_W/2,240,480,76))this.difficulty="easy";
      if(isBtnPressed(BASE_W/2,348,480,76))this.difficulty="medium";
      if(isBtnPressed(BASE_W/2,456,480,76))this.difficulty="hard";
      if(isBtnPressed(BASE_W/2,570,220,56)){if(game)game.setScreen(0);}
      return;
    }

    txt("SELECT CHARACTER",BASE_W/2,100,"#baa701",26);
    const chars=[{key:"grax",x:500,y:320},{key:"yuke",x:1060,y:320}];
    chars.forEach(c=>{
      drawImg(images[`icon_${c.key}`],c.x,c.y);
      const hov=isHov(c.x,c.y,155,155);
      if(hov){strokeR(c.x-84,c.y-84,168,168,"#baa701",2,8);txt(c.key.toUpperCase(),c.x,c.y+98,"#baa701",22);}
      else txt(c.key.toUpperCase(),c.x,c.y+98,"#555",20);
      if(clickAvail()&&hov&&millis()-this._clickCd>400){consumeClick();this._clickCd=millis();this.playerChar=c.key;}
    });
    if(this.playerChar){
      drawImg(images[`icon_${this.playerChar}`],200,BASE_H/2);
      txt(this.playerChar.toUpperCase(),200,BASE_H/2+100,"#baa701",26);
      btn("▶ START",BASE_W/2,720,200,72);
      if(isBtnPressed(BASE_W/2,720,200,72)){this.setupFight();this.avviato=true;}
    }
    btn("◀ BACK",BASE_W/2,BASE_H-40,200,50,"#222");
    if(isBtnPressed(BASE_W/2,BASE_H-40,200,50))this.difficulty=null;
  }
}

class ZombieFighter{
  constructor(startX,fromRight=true,hp=20,speed=2){
    this.x=startX;this.y=750;this.hp=hp;this.maxHP=hp;this.speed=speed;
    this.frame=0;this.facing=fromRight?-1:1;this._lastAtk=0;
  }
  draw(){
    const img=images[`zombie_${Math.min(this.frame,5)}`];
    if(img&&img.complete&&img.naturalWidth){
      if(this.facing>0)drawImg(img,this.x,this.y);
      else{ctx.save();ctx.translate(sx(this.x),sy(this.y));ctx.scale(-1,1);ctx.drawImage(img,-img.naturalWidth*scale/2,-img.naturalHeight*scale/2,img.naturalWidth*scale,img.naturalHeight*scale);ctx.restore();}
    }
  }
  move(fighter){
    const t=frameCount%28;
    this.facing=fighter.x>this.x?1:-1;
    if(Math.abs(this.x-fighter.x)>62){
      this.x=Math.max(30,Math.min(BASE_W-30,this.x+this.speed*this.facing));
      this.frame=Math.floor(t/10)%3;
    }else{
      if(millis()-this._lastAtk>=1800){this.frame=5;fighter.hp=Math.max(0,fighter.hp-8);this._lastAtk=millis();}
      else this.frame=3+Math.floor(t/9)%2;
    }
  }
}

// ============================================================
//  GAME 5 — BALL
// ============================================================
class BallGame{
  constructor(){this.reset();}
  reset(){this.started=false;this.over=false;this.score=0;this.bx=BASE_W/2;this.by=BASE_H/2;this.bdx=1;this.bdy=1;this.speed=5;this.padX=BASE_W/2;this.bounced=false;this._submitted=false;this._lbData=null;this._lbLoading=false;}
  draw(){
    ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
    txt(`Score: ${this.score}`,BASE_W/2,28,"#a10000",30);
    fillR(BASE_W-190,52,168,42,"#a10000",0.88,8);txt("🏆 RANKS",BASE_W-106,73,"#baa701",17);
    if(isBtnPressed(BASE_W-106,73,168,42)&&!this._lbLoading){this._lbLoading=true;Auth.getLeaderboard("ball").then(d=>{this._lbData=d;this._lbLoading=false;});}
    const padY=BASE_H-90;this.padX=mouseX;
    ctx.save();ctx.fillStyle="#ccc";ctx.beginPath();ctx.roundRect(sx(this.padX-80),sy(padY),ss(160),ss(18),ss(9));ctx.fill();ctx.restore();
    const hue=(frameCount*3)%360;
    ctx.save();ctx.fillStyle=`hsl(${hue},80%,55%)`;ctx.shadowColor=`hsl(${hue},80%,55%)`;ctx.shadowBlur=ss(12);ctx.beginPath();ctx.arc(sx(this.bx),sy(this.by),ss(22),0,Math.PI*2);ctx.fill();ctx.restore();
    if(this.over){txt("GAME OVER",BASE_W/2,BASE_H/2,"#a10000",50);this.started=false;}
    if(!this.started){
      btn("START",BASE_W/2,BASE_H-72,160,78);
      if(isBtnPressed(BASE_W/2,BASE_H-72,160,78)){this.started=true;this.over=false;this.score=0;this.bx=BASE_W/2;this.by=BASE_H/2;this.speed=5;this._submitted=false;showLegend("BALL",[["Move pad","Move mouse left/right (or touch drag)"],["Goal","Don't let the ball fall!"],["Scoring","Each bounce = 1 point"],["Speed","Ball speeds up every 2 bounces"]]);}
      if(this._lbData)this._drawLB();
    }else{
      this.bx+=this.bdx*this.speed;this.by+=this.bdy*this.speed;
      if(this.bx<22||this.bx>BASE_W-22)this.bdx*=-1;
      if(this.by<22)this.bdy=1;
      if(this.by+22>=padY&&this.by+22<=padY+14&&this.bx>this.padX-80&&this.bx<this.padX+80){this.bdy=-1;this.score++;this.bounced=true;if(this.score%2===0)this.speed+=0.4;}
      if(this.by>BASE_H){this.over=true;if(!this._submitted){Auth.submitScore("ball",this.score);this._submitted=true;}}
    }
  }
  _drawLB(){
    const rows=(this._lbData?.leaderboard||[]).slice(0,8);
    fillR(38,180,280,330,"#000",0.82,10);strokeR(38,180,280,330,"#baa701",1.5,10);
    txt("TOP SCORES",178,202,"#baa701",20);
    rows.forEach((r,i)=>{txt(`#${r.rank} ${r.username}`,95,235+i*34,"#fff",16,"left");txt(`${r.bestScore}`,300,235+i*34,"#baa701",16,"right");});
    if(this._lbData?.myRank)txt(`You: #${this._lbData.myRank.rank}`,178,505,"#4EC600",16);
  }
}

// ============================================================
//  GAME 6 — ARTIST MAKER
// ============================================================
class ArtistMaker{
  constructor(){this.c2=document.createElement("canvas");this.x2=this.c2.getContext("2d");this.initialized=false;this.color="#000000";this.size=12;this.sliderX=BASE_W/2-100;this._pp=false;this._px=0;this._py=0;this._drag=false;}
  reset(){this.c2.width=BASE_W;this.c2.height=BASE_H;this.x2.fillStyle="#fff";this.x2.fillRect(0,0,BASE_W,BASE_H);this.initialized=true;}
  saveImg(){const a=document.createElement("a");a.download="lsd_drawing.png";a.href=this.c2.toDataURL("image/png");a.click();}
  draw(){
    if(!this.initialized)this.reset();
    ctx.save();ctx.drawImage(this.c2,sx(0),sy(0),ss(BASE_W),ss(BASE_H));ctx.restore();
    const inBar=mouseY>BASE_H-170;
    if(mousePressed&&!inBar&&!_clickConsumed&&!this._drag){
      this.x2.strokeStyle=this.color;this.x2.lineWidth=this.size;this.x2.lineCap="round";this.x2.lineJoin="round";
      if(this._pp){this.x2.beginPath();this.x2.moveTo(this._px,this._py);this.x2.lineTo(mouseX,mouseY);this.x2.stroke();}
      else{this.x2.fillStyle=this.color;this.x2.beginPath();this.x2.arc(mouseX,mouseY,this.size/2,0,Math.PI*2);this.x2.fill();}
      this._pp=true;
    }else this._pp=false;
    this._px=mouseX;this._py=mouseY;
    ctx.save();ctx.globalAlpha=0.9;ctx.fillStyle="#111";ctx.beginPath();ctx.roundRect(sx(BASE_W/2-370),sy(BASE_H-168),ss(740),ss(150),ss(18));ctx.fill();ctx.restore();
    ctx.save();ctx.strokeStyle="#444";ctx.lineWidth=ss(8);ctx.beginPath();ctx.moveTo(sx(BASE_W/2-110),sy(BASE_H-130));ctx.lineTo(sx(BASE_W/2+110),sy(BASE_H-130));ctx.stroke();
    ctx.strokeStyle="#0567FF";ctx.lineWidth=ss(10);ctx.beginPath();ctx.moveTo(sx(BASE_W/2-110),sy(BASE_H-130));ctx.lineTo(sx(this.sliderX),sy(BASE_H-130));ctx.stroke();
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(sx(this.sliderX),sy(BASE_H-130),ss(12),0,Math.PI*2);ctx.fill();ctx.strokeStyle="#000";ctx.lineWidth=ss(2);ctx.stroke();ctx.restore();
    if(mousePressed&&Math.abs(mouseX-this.sliderX)<20&&Math.abs(mouseY-(BASE_H-130))<20)this._drag=true;
    if(!mousePressed)this._drag=false;
    if(this._drag)this.sliderX=Math.min(BASE_W/2+110,Math.max(BASE_W/2-110,mouseX));
    this.size=Math.round((this.sliderX-(BASE_W/2-110))/220*45+5);
    txt(`Size: ${this.size}`,BASE_W/2,BASE_H-158,"#555",15);
    const sw=[{c:"#ffffff",x:BASE_W/2-340},{c:"#ff0000",x:BASE_W/2-270},{c:"#00bb00",x:BASE_W/2-200},{c:"#0055ff",x:BASE_W/2-130},{c:"#ffdd00",x:BASE_W/2-60},{c:"#ff8800",x:BASE_W/2+10},{c:"#cc00cc",x:BASE_W/2+80},{c:"#00cccc",x:BASE_W/2+150},{c:"#000000",x:BASE_W/2+220}];
    sw.forEach(s=>{
      ctx.save();ctx.fillStyle=s.c;ctx.strokeStyle=this.color===s.c?"#baa701":"#333";ctx.lineWidth=ss(this.color===s.c?3:1);ctx.beginPath();ctx.roundRect(sx(s.x),sy(BASE_H-106),ss(50),ss(50),ss(7));ctx.fill();ctx.stroke();
      if(s.c==="#ffffff"){ctx.strokeStyle="#888";ctx.lineWidth=ss(1);ctx.beginPath();ctx.roundRect(sx(s.x+1),sy(BASE_H-105),ss(48),ss(48),ss(6));ctx.stroke();}
      ctx.restore();
      if(mousePressed&&mouseX>s.x&&mouseX<s.x+50&&mouseY>BASE_H-106&&mouseY<BASE_H-56)this.color=s.c;
    });
    btn("CLEAR",BASE_W/2+290,BASE_H-82,80,44,"#550000");
    if(isBtnPressed(BASE_W/2+290,BASE_H-82,80,44)){this.x2.fillStyle="#fff";this.x2.fillRect(0,0,BASE_W,BASE_H);}
    btn("💾 SAVE",BASE_W/2-355,BASE_H-82,88,44,"#005500");
    if(isBtnPressed(BASE_W/2-355,BASE_H-82,88,44))this.saveImg();
    ctx.save();ctx.globalAlpha=0.6;ctx.fillStyle=this.color==="#ffffff"?"rgba(160,160,160,0.5)":this.color;ctx.beginPath();ctx.arc(sx(mouseX),sy(mouseY),ss(this.size/2),0,Math.PI*2);ctx.fill();if(this.color==="#ffffff"){ctx.strokeStyle="#aaa";ctx.lineWidth=ss(1);ctx.stroke();}ctx.restore();
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop(){
  requestAnimationFrame(loop);if(!game)return;frameCount++;
  ctx.clearRect(0,0,W,H);ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
  game.draw();
}
function startGame(){
  loadAllAssets();game=new LSDConsole();setupMobilePad();requestAnimationFrame(loop);
  fetch(API_URL+"/health").catch(()=>{});
}
