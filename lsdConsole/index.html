// ============================================================
//  GAME 4 — ATTACK OF ZOMBIES  (v2 — fixed facing, speed, HUD, G-pad)
// ============================================================
class AttackOfZombies {
  constructor(){ this.reset(); }

  reset() {
    this.avviato    = false;
    this.playerChar = null;
    this.round      = 1;
    this.zombieList = [];
    this.fighter    = null;
    this.victory    = false;
    this.winner     = "";
    this.victoryTime= 0;
    this._clickCd   = 0;
  }

  keyPress(k){ if(this.fighter) this.fighter.keyPress(k); }

  // Numero zombie per round: round 1-3 = 1, round 4-6 = 2, round 7-9 = 3, round 10 = 4
  _zombieCount(r){ return r<=3?1 : r<=6?2 : r<=9?3 : 4; }

  // Velocità zombie per round: parte lenta, cresce gradualmente
  _zombieSpeed(r){ return 0.8 + (r-1)*0.25; } // round 1=0.8, round 10=3.05

  startRound(r) {
    this.round = r;
    this.zombieList = [];
    const count = this._zombieCount(r);
    const speed = this._zombieSpeed(r);
    for(let i=0; i<count; i++){
      // Tutti entrano dallo stesso lato per sembrare "a squadra"
      // ma con offset X e temporale per non sovrapporsi
      const fromRight = Math.random() > 0.5;
      const extraDist = i * 160;
      const startX    = fromRight
        ? BASE_W + 100 + extraDist
        : -100 - extraDist;
      const z = new ZombieFighter(startX, fromRight, speed, r);
      z.y = 800 + (i % 2 === 0 ? 0 : 30);
      this.zombieList.push(z);
    }
    // Ultra sbloccata solo all'ultimo round (round 10)
    if(this.fighter) {
      this.fighter._zombieUltraLocked = (r < 10);
    }
  }

  setupFight() {
    const n = this.playerChar==="grax" ? 14 : 13;
    const frames = Array.from({length:n}, (_,i) => ({
      r: images[`${this.playerChar}_r_${i}`],
      l: images[`${this.playerChar}_l_${i}`]
    }));
    this.fighter = new Fighter(frames, BASE_W/2, 800, this.playerChar, 1, "local");
    this.fighter.hp = 100;
    this.fighter._zombieMode = true; // ultra bloccata fino all'ultimo round
    this.startRound(1);
    showGamePad(isMobile);
  }

  draw() {
    if(!this.avviato){ this.drawMenu(); return; }

    drawImg(images.bg_zombies, BASE_W/2, BASE_H/2);

    // ── HUD — vita giocatore (stile AFUE) ─────────────────────
    this._drawHUD();

    // Round label
    fillText(`Round ${this.round} / 10`, BASE_W/2, 80, "#a10000", 48);
    fillText(`Zombies: ${this.zombieList.length}`, BASE_W/2, 128, "#baa701", 22);
    // Ultra: sbloccata solo al round 10
    if(this.fighter && this.fighter._zombieUltraLocked){
      fillText("⚡ ULTRA unlocks at Round 10", BASE_W/2, 158, "#555", 18);
    } else if(this.fighter && !this.fighter._zombieUltraLocked){
      fillText("⚡ ULTRA UNLOCKED!", BASE_W/2, 158, "#ff4400", 20);
    }

    // ── Aggiorna e disegna fighter ─────────────────────────────
    if(this.fighter){
      const nearestZ = this.zombieList.reduce((best,z)=>{
        return (!best||Math.abs(z.x-this.fighter.x)<Math.abs(best.x-this.fighter.x))?z:best;
      }, null);
      const fakeEnemy = nearestZ
        ? {x:nearestZ.x, hp:nearestZ.hp, blocking:false, name:"zombie", facing:nearestZ.facing, cd4:0, cd5:0}
        : {x:this.fighter.x+300, hp:100, blocking:false, name:"zombie", facing:1, cd4:0, cd5:0};
      this.fighter.update(fakeEnemy);
      this.fighter.drawChar(1);
    }

    // ── Aggiorna e disegna zombie ──────────────────────────────
    for(let i=this.zombieList.length-1; i>=0; i--){
      const z = this.zombieList[i];
      z.draw();
      if(this.fighter){
        z.move(this.fighter);
        // Hit detection: quando il fighter attacca
        if(this.fighter.anim && ["punch","kick","ranged","special"].includes(this.fighter.anim.type)){
          const dt    = Math.abs(z.x - this.fighter.x);
          const dmgMap= {punch:8, kick:14, ranged:18, special:15};
          const reach = {punch:200, kick:180, ranged:800, special:220};
          if(dt < reach[this.fighter.anim.type] && this.fighter.anim.start===frameCount){
            const dmg = dmgMap[this.fighter.anim.type];
            z.hp -= dmg;
            if(game) game.trophies[4]=true;
            // Particelle di danno sullo zombie colpito
            if(!z.hitParticles) z.hitParticles=[];
            const cols={punch:["#FF8800","#FFAA00","#fff"],kick:["#FF4400","#FF2200","#FF8800"],
                        ranged:["#FF6600","#FFD700","#fff"],special:["#FF0000","#FF8800","#FFD700","#fff"]};
            const pcols=cols[this.fighter.anim.type]||cols.punch;
            for(let pi=0;pi<12;pi++){
              const ang=Math.random()*Math.PI*2, spd=Math.random()*4+2;
              z.hitParticles.push({
                x:z.x+(Math.random()-0.5)*40, y:z.y-150+(Math.random()-0.5)*40,
                vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-3,
                r:Math.random()*6+3, alpha:1,
                col:pcols[Math.floor(Math.random()*pcols.length)],
                life:0, maxLife:20
              });
            }
            z._hitFlash=5;
          }
        }
      }
      if(z.hp<=0){
        this.zombieList.splice(i,1);
        // Se non ci sono più zombie, avanza al round successivo
        if(this.zombieList.length===0){
          if(this.round>=10){
            this.victory=true; this.winner=this.playerChar;
            this.victoryTime=millis();
            if(game) game.trophies[11]=true;
          } else {
            this.startRound(this.round+1);
          }
        }
      }
    }

    // Giocatore morto
    if(this.fighter && this.fighter.hp<=0 && !this.victory){
      this.victory=true; this.winner="Zombies"; this.victoryTime=millis();
    }

    // ── Schermata vittoria ─────────────────────────────────────
    if(this.victory){
      ctx.save(); ctx.fillStyle="rgba(0,0,0,0.75)"; ctx.fillRect(0,0,W,H); ctx.restore();
      const won = this.winner!=="Zombies";
      setFont(72); ctx.fillStyle=won?"#FFD700":"#FF3333";
      ctx.shadowColor=won?"#FFD700":"#FF3333"; ctx.shadowBlur=ss(20);
      ctx.fillText(won?"🏆  YOU SURVIVED!":"💀  GAME OVER", sx(BASE_W/2), sy(BASE_H/2-40));
      ctx.shadowBlur=0;
      setFont(30); ctx.fillStyle="#fff";
      ctx.fillText(`Reached Round ${this.round}`, sx(BASE_W/2), sy(BASE_H/2+40));
      if(millis()-this.victoryTime>=3500){
        showGamePad(false); this.reset(); if(game) game.screen=0;
      }
    }

    // ── Tasti a schermo (desktop) ──────────────────────────────
    if(!isMobile) this._drawKeyHints();
  }

  _drawHUD() {
    if(!this.fighter) return;
    const hp = this.fighter.hp;
    // Barra vita stile AFUE
    fillRoundRect(60, 50, 320, 44, "#333", 1, 4);
    fillRoundRect(60, 50, Math.max(0,hp/100*320), 44, hp>50?"#4EC600":hp>25?"#FFD700":"#FF3333", 1, 4);
    ctx.save(); ctx.strokeStyle="#fff"; ctx.lineWidth=ss(2);
    ctx.strokeRect(sx(60),sy(50),ss(320),ss(44)); ctx.restore();
    setFont(28,"left"); ctx.fillStyle="#fff";
    ctx.fillText(this.playerChar?.toUpperCase()||"", sx(80), sy(22));
    setFont(20,"left"); ctx.fillStyle="rgba(255,255,255,0.5)";
    ctx.fillText(`HP: ${Math.max(0,Math.round(hp))}`, sx(240), sy(22));
  }

  _drawKeyHints() {
    // Box tasti in basso al centro
    const bx=BASE_W/2, by=BASE_H-55;
    fillRoundRect(bx-350,by-28,700,52,"#000",0.6,10);
    const keys=[
      {k:"A",l:"Move L"},{k:"D",l:"Move R"},{k:"W",l:"Punch"},
      {k:"S",l:"Kick"},{k:"Q",l:"Ranged"},{k:"E",l:"Special"},{k:"C",l:"Block"}
    ];
    keys.forEach((kt,i)=>{
      const kx=bx-300+i*100;
      fillCircle(kx,by,22,"#a10000",0.8);
      setFont(18); ctx.fillStyle="#baa701"; ctx.fillText(kt.k,sx(kx),sy(by));
      setFont(14); ctx.fillStyle="#888"; ctx.fillText(kt.l,sx(kx),sy(by+32));
    });
  }

  drawMenu() {
    drawImg(images.bg_fight_menu, BASE_W/2, BASE_H/2);
    fillText("⚠  ATTACK OF ZOMBIES", BASE_W/2, 55, "#a10000", 42);
    fillText("Survive 10 rounds — zombies get faster and more numerous each round", BASE_W/2, 100, "#888", 20);

    const chars=[{key:"grax",x:610,y:320},{key:"yuke",x:1260,y:320}];
    chars.forEach(ch=>{
      drawImg(images[`icon_${ch.key}`], ch.x, ch.y);
      if(isHover(ch.x,ch.y,150,150)){
        strokeRoundRect(ch.x-80,ch.y-80,160,160,"#baa701",2,8);
        fillText(ch.key.charAt(0).toUpperCase()+ch.key.slice(1), ch.x, 190, "#baa701", 28);
        if(clickAvailable()&&millis()-this._clickCd>400){
          consumeClick(); this._clickCd=millis(); this.playerChar=ch.key;
        }
      }
    });
    if(this.playerChar){
      drawImg(images[`icon_${this.playerChar}`], 200, BASE_H/2);
      fillText(this.playerChar.toUpperCase(), 200, BASE_H/2+130, "#a10000", 32);
      drawButton("▶ START", BASE_W/2, BASE_H-100, 200, 80);
      if(isButtonPressed(BASE_W/2, BASE_H-100, 200, 80)){
        this.setupFight(); this.avviato=true;
      }
    }
    // Round preview
    fillRoundRect(BASE_W/2-300,BASE_H-220,600,80,"#000",0.5,10);
    fillText("Round 1-3: 1 zombie  |  4-6: 2 zombies  |  7-9: 3 zombies  |  10: 4 zombies", BASE_W/2, BASE_H-180, "#666", 18);
  }
}

class ZombieFighter {
  // Le immagini zombie guardano a SINISTRA di default (facing=-1 = immagine diretta)
  // Se facing=+1 (zombie guarda a destra) → specchia l'immagine

  constructor(startX, fromRight=true, speed=1, round=1){
    this.x       = startX;
    this.y       = 800;
    this.hp      = 20 + round * 4;
    this.maxHp   = this.hp;
    this.frame   = 0;
    this._lastAtk= 0;
    this.speed   = speed;
    this.round   = round;
    // Offset per non sovrapporre zombie della stessa ondata
    this.xOffset = 0;
    // facing: zombie deve guardare VERSO il giocatore
    // fromRight=true → entra da destra → deve guardare a SINISTRA → facing=-1 → immagine diretta ✓
    // fromRight=false → entra da sinistra → deve guardare a DESTRA → facing=+1 → immagine specchiata
    this.facing  = fromRight ? -1 : 1;
  }

  draw() {
    if(this.hp<=0) return;
    const fk  = `zombie_r_${Math.min(this.frame, 5)}`;
    const img = images[fk];
    if(img && img.complete && img.naturalWidth){
      if(this.facing < 0){
        // facing=-1 → guarda a SINISTRA → immagine originale (già orientata a sinistra)
        drawImg(img, this.x, this.y);
      } else {
        // facing=+1 → guarda a DESTRA → specchia l'immagine
        ctx.save();
        ctx.translate(sx(this.x), sy(this.y));
        ctx.scale(-1, 1);
        ctx.drawImage(img,
          -img.naturalWidth*scale/2, -img.naturalHeight*scale/2,
           img.naturalWidth*scale,    img.naturalHeight*scale);
        ctx.restore();
      }
    }
    // Barra vita sopra lo zombie
    const bwFull = 80;
    const bw = Math.max(0, (this.hp/this.maxHp)*bwFull);
    fillRoundRect(this.x-bwFull/2, this.y-230, bwFull, 10, "#333", 1, 3);
    fillRoundRect(this.x-bwFull/2, this.y-230, bw,     10, "#a10000", 1, 3);

    // Hit flash
    if(this._hitFlash>0){
      ctx.save(); ctx.globalAlpha=this._hitFlash/5*0.5; ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(sx(this.x),sy(this.y-150),ss(50),0,Math.PI*2); ctx.fill();
      ctx.restore(); this._hitFlash--;
    }
    // Hit particles sullo zombie
    if(this.hitParticles&&this.hitParticles.length>0){
      this.hitParticles=this.hitParticles.filter(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life++;
        p.alpha=1-p.life/p.maxLife;
        if(p.alpha<=0) return false;
        ctx.save(); ctx.globalAlpha=p.alpha; ctx.fillStyle=p.col;
        ctx.shadowColor=p.col; ctx.shadowBlur=ss(5);
        ctx.beginPath(); ctx.arc(sx(p.x),sy(p.y),ss(p.r),0,Math.PI*2); ctx.fill();
        ctx.restore(); return true;
      });
    }
  }

  move(fighter) {
    const t    = frameCount % 30;
    const dist = Math.abs(this.x - fighter.x);
    // Aggiorna sempre il facing verso il giocatore
    const newFacing = fighter.x > this.x ? 1 : -1;
    this.facing = newFacing;

    const STOP_DIST = 90; // distanza a cui si ferma e attacca — NON spinge il giocatore

    if(dist > STOP_DIST){
      // Cammina verso il giocatore
      this.x += this.speed * this.facing;
      this.frame = Math.floor(t/10) % 3;
    } else {
      // È vicino — si FERMA e attacca (nessun push)
      // Non aggiorna this.x → non spinge il fighter
      const atkCooldown = Math.max(900, 2200 - this.round * 100);
      if(millis() - this._lastAtk >= atkCooldown){
        this.frame = 5;
        const dmg = 4 + Math.floor(this.round / 3);
        fighter.hp = Math.max(0, fighter.hp - dmg);
        this._lastAtk = millis();
        // Particelle di danno sul fighter
        if(!fighter.hitParticles) fighter.hitParticles=[];
        for(let i=0;i<10;i++){
          const ang=Math.random()*Math.PI*2;
          const spd=Math.random()*3+1;
          fighter.hitParticles.push({
            x:fighter.x+(Math.random()-0.5)*40, y:fighter.y-140+(Math.random()-0.5)*40,
            vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-2,
            r:Math.random()*5+3, alpha:1,
            col:["#ff0000","#ff4400","#ff8800"][Math.floor(Math.random()*3)],
            life:0, maxLife:16
          });
        }
        fighter._hitFlash=6;
      } else {
        this.frame = 3 + Math.floor(t/15)%2;
      }
    }
  }
}

    fillText("🏆 CLASSIFICA",BASE_W-120,85,"#baa701",18);
    if(isButtonPressed(BASE_W-120,85,200,50)&&!this._lbLoading){this._lbLoading=true;Auth.getLeaderboard("ball").then(d=>{this._lbData=d;this._lbLoading=false;});}
    const padY=BASE_H-100;this.padX=mouseX;
    ctx.save();ctx.fillStyle="#fff";ctx.fillRect(sx(this.padX-75),sy(padY),ss(150),ss(18));ctx.restore();
    const hue=(frameCount*3)%360;
    ctx.save();ctx.fillStyle=`hsl(${hue},80%,50%)`;ctx.shadowColor=`hsl(${hue},80%,50%)`;ctx.shadowBlur=ss(12);ctx.beginPath();ctx.arc(sx(this.bx),sy(this.by),ss(24),0,Math.PI*2);ctx.fill();ctx.restore();
    if(this.over){fillText("GAME OVER",BASE_W/2,BASE_H/2,"#a10000",52);this.started=false;}
    if(!this.started){
      drawButton("START",BASE_W/2,BASE_H-80,180,90);
      if(isButtonPressed(BASE_W/2,BASE_H-80,180,90)){this.started=true;this.over=false;this.score=0;this.bx=BASE_W/2;this.by=BASE_H/2;this.speed=5;this._submitted=false;}
      if(this._lbData) this._drawLB();
    } else {
      this.bx+=this.bdx*this.speed;this.by+=this.bdy*this.speed;
      if(this.bx<24||this.bx>BASE_W-24)this.bdx*=-1;
      if(this.by<24)this.bdy=1;
      if(this.by+24>=padY&&this.by+24<=padY+12&&this.bx>this.padX-75&&this.bx<this.padX+75){this.bdy=-1;this.score++;if(this.score%2===0)this.speed+=0.4;if(game)game.trophies[6]=true;}
      if(this.by>BASE_H){this.over=true;if(!this._submitted){Auth.submitScore("ball",this.score);this._submitted=true;}}
    }
  }
  _drawLB(){const rows=(this._lbData?.leaderboard||[]).slice(0,8);fillRoundRect(50,200,340,380,"#000",0.8,10);strokeRoundRect(50,200,340,380,"#baa701",2,10);fillText("TOP SCORES",220,228,"#baa701",22);rows.forEach((r,i)=>{const ry=265+i*38;fillText(`#${r.rank} ${r.username}`,150,ry,"#fff",18);fillText(`${r.bestScore}`,330,ry,"#baa701",18);});if(this._lbData?.myRank)fillText(`You: #${this._lbData.myRank.rank}`,220,590,"#4EC600",18);}
}

// ============================================================
//  GAME 6 — ARTIST MAKER (unchanged)
// ============================================================
class ArtistMaker {
  constructor(){this.c2=document.createElement("canvas");this.x2=this.c2.getContext("2d");this.initialized=false;this.color="#000000";this.size=10;this.sliderX=BASE_W/2-100;this._pp=false;this._px=0;this._py=0;this._drag=false;}
  reset(){this.c2.width=BASE_W;this.c2.height=BASE_H;this.x2.fillStyle="#fff";this.x2.fillRect(0,0,BASE_W,BASE_H);this.initialized=true;}
  save(){const a=document.createElement("a");a.download="lsd_drawing.png";a.href=this.c2.toDataURL("image/png");a.click();}
  draw(){
    if(!this.initialized)this.reset();
    ctx.save();ctx.drawImage(this.c2,sx(0),sy(0),ss(BASE_W),ss(BASE_H));ctx.restore();
    const inBar=mouseY>BASE_H-175;
    if(mousePressed&&!inBar&&!_clickConsumed&&!this._drag){this.x2.strokeStyle=this.color;this.x2.lineWidth=this.size;this.x2.lineCap="round";if(this._pp){this.x2.beginPath();this.x2.moveTo(this._px,this._py);this.x2.lineTo(mouseX,mouseY);this.x2.stroke();}else{this.x2.fillStyle=this.color;this.x2.beginPath();this.x2.arc(mouseX,mouseY,this.size/2,0,Math.PI*2);this.x2.fill();}this._pp=true;}else{this._pp=false;}
    this._px=mouseX;this._py=mouseY;
    ctx.save();ctx.globalAlpha=0.88;ctx.fillStyle="#111";ctx.beginPath();ctx.roundRect(sx(BASE_W/2-360),sy(BASE_H-175),ss(720),ss(152),ss(20));ctx.fill();ctx.restore();
    ctx.save();ctx.strokeStyle="#555";ctx.lineWidth=ss(10);ctx.beginPath();ctx.moveTo(sx(BASE_W/2-110),sy(BASE_H-135));ctx.lineTo(sx(BASE_W/2+110),sy(BASE_H-135));ctx.stroke();
    ctx.strokeStyle="#0567FF";ctx.lineWidth=ss(12);ctx.beginPath();ctx.moveTo(sx(BASE_W/2-110),sy(BASE_H-135));ctx.lineTo(sx(this.sliderX),sy(BASE_H-135));ctx.stroke();
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(sx(this.sliderX),sy(BASE_H-135),ss(13),0,Math.PI*2);ctx.fill();ctx.strokeStyle="#000";ctx.lineWidth=ss(2);ctx.stroke();ctx.restore();
    if(mousePressed&&Math.abs(mouseX-this.sliderX)<22&&Math.abs(mouseY-(BASE_H-135))<22){this._drag=true;}
    if(!mousePressed)this._drag=false;
    if(this._drag)this.sliderX=Math.min(BASE_W/2+110,Math.max(BASE_W/2-110,mouseX));
    this.size=Math.round((this.sliderX-(BASE_W/2-110))/220*40+5);
    fillText(`Size: ${this.size}`,BASE_W/2,BASE_H-162,"#666",16);
    const sw=[{c:"#ffffff",x:BASE_W/2-320},{c:"#ff0000",x:BASE_W/2-240},{c:"#00bb00",x:BASE_W/2-170},{c:"#0055ff",x:BASE_W/2-100},{c:"#ffdd00",x:BASE_W/2-30},{c:"#ff8800",x:BASE_W/2+40},{c:"#cc00cc",x:BASE_W/2+110},{c:"#00cccc",x:BASE_W/2+180},{c:"#000000",x:BASE_W/2+250}];
    sw.forEach(s=>{ctx.save();ctx.fillStyle=s.c;ctx.strokeStyle=this.color===s.c?"#baa701":"#444";ctx.lineWidth=ss(this.color===s.c?3:1.5);ctx.beginPath();ctx.roundRect(sx(s.x),sy(BASE_H-108),ss(50),ss(50),ss(7));ctx.fill();ctx.stroke();if(s.c==="#ffffff"){ctx.strokeStyle="#999";ctx.lineWidth=ss(1);ctx.beginPath();ctx.roundRect(sx(s.x+1),sy(BASE_H-107),ss(48),ss(48),ss(6));ctx.stroke();}ctx.restore();if(mousePressed&&mouseX>s.x&&mouseX<s.x+50&&mouseY>BASE_H-108&&mouseY<BASE_H-58)this.color=s.c;});
    if(images.gomma)drawImg(images.gomma,BASE_W/2-320+25,BASE_H-83,26,26);
    drawButton("CLEAR",BASE_W/2+330,BASE_H-83,100,44,"#550000");
    if(isButtonPressed(BASE_W/2+330,BASE_H-83,100,44)){this.x2.fillStyle="#fff";this.x2.fillRect(0,0,BASE_W,BASE_H);}
    drawButton("💾 SAVE",BASE_W/2-355,BASE_H-83,100,44,"#005500");
    if(isButtonPressed(BASE_W/2-355,BASE_H-83,100,44))this.save();
    ctx.save();ctx.globalAlpha=0.65;ctx.fillStyle=this.color==="#ffffff"?"rgba(180,180,180,0.5)":this.color;if(this.color==="#ffffff"){ctx.strokeStyle="#aaa";ctx.lineWidth=ss(1);}ctx.beginPath();ctx.arc(sx(mouseX),sy(mouseY),ss(this.size/2),0,Math.PI*2);ctx.fill();if(this.color==="#ffffff")ctx.stroke();ctx.restore();
  }
}

// ============================================================
// ── Game Drawer ──────────────────────────────────────────────
function toggleDrawer() {
  const d = document.getElementById("gameDrawer");
  d.classList.toggle("open");
}
function drawerAction(action) {
  document.getElementById("gameDrawer").classList.remove("open");
  if (!game) return;
  if (action === "resume") return;
  if (action === "home") {
    game.screen = 0;
    game.sidePanelOpen = false;
    game.lsdafue.reset();
    game.nation.lsdnation = false;
    game.zombies.reset();
    game.ball.reset();
    game.target.reset();
    game.artist.initialized = false;
    showGamePad(false);
    showMobileMenu(false);
  }
  if (action === "exit") {
    game.saveTrophies();
    window.location.href = "https://lsd-software.github.io/project.html";
  }
}
// Show drawer button on ALL screens except home (screen=0)
function _updateDrawerBtn() {
  if (!game) return;
  const show = game.screen !== 0 && isMobile;
  document.getElementById("mobileMenu").classList.toggle("show", show);
}

function loop() {
  requestAnimationFrame(loop);
  if (!game) return;
  frameCount++;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
  // Mantieni smoothing ad ogni frame (setTransform può resettarlo)
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  game.draw();
  _updateDrawerBtn();
}
function startGame() {
  loadAllAssets();
  game = new LSDConsole();
  setupMobilePad();
  // Lock zoom during gameplay for precise touch control
  document.getElementById("metaViewport").content =
    "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover";
  requestAnimationFrame(loop);
  fetch(API_URL+"/health").catch(()=>{});
}
document.addEventListener("fullscreenchange",       () => setTimeout(resizeCanvas, 80));
document.addEventListener("webkitfullscreenchange", () => setTimeout(resizeCanvas, 80));
document.addEventListener("mozfullscreenchange",    () => setTimeout(resizeCanvas, 80));
document.addEventListener("MSFullscreenChange",     () => setTimeout(resizeCanvas, 80));
</script>
