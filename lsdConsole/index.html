<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta id="metaViewport" name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.3, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LSD Console — Play</title>
<meta name="description" content="LSD Console: 6 games in one — LSD Attack Force, Target Shooting, Nation Builder, Attack of Zombies, Ball, Artist Maker.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{width:100%;height:100%;background:#000;overflow:hidden;}
body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  font-family:'Courier New',monospace;
  position:fixed;
  /* Prevent iOS bounce */
  overscroll-behavior:none;
}
#canvas{
  display:block;
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#000;
  /* Canvas size set by JS — CSS just centers it */
  image-rendering:auto;
}

/* ── Fullscreen prompt ── */
#fsPrompt{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0000 0%,#000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:clamp(12px,3vw,24px);}
#fsPrompt h1{font-size:clamp(28px,7vw,64px);color:#a10000;letter-spacing:clamp(4px,1.5vw,10px);text-shadow:0 0 30px #a10000aa;animation:pulse 2s infinite;}
#fsPrompt p{font-size:clamp(13px,2.5vw,20px);color:#ccc;text-align:center;padding:0 clamp(16px,4vw,40px);max-width:600px;}
#fsBtn{background:linear-gradient(135deg,#a10000,#cc1111);color:#baa701;border:none;padding:clamp(12px,3vw,18px) clamp(32px,8vw,60px);font-size:clamp(16px,3vw,24px);cursor:pointer;letter-spacing:3px;font-family:inherit;border-radius:8px;box-shadow:0 0 20px #a10000aa;transition:all 0.2s;}
#fsBtn:hover,#fsBtn:active{filter:brightness(1.3);transform:scale(1.05);}
#loadBar{width:clamp(240px,60vw,400px);height:8px;background:#222;border-radius:4px;overflow:hidden;}
#loadBarFill{height:100%;background:#a10000;width:0;transition:width 0.1s;}
@keyframes pulse{0%,100%{text-shadow:0 0 20px #a10000aa;}50%{text-shadow:0 0 40px #ff0000cc;}}

/* ── Auth overlay — stile CardGame ── */
#authOverlay{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center,#1a0030 0%,rgba(0,0,0,0.95) 70%);
  display:none;align-items:center;justify-content:center;
  z-index:8000;
  padding:max(20px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(20px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));
  backdrop-filter:blur(8px);
}
#authOverlay.show{display:flex;}

#authBox{
  background:linear-gradient(160deg,#0d001a,#1a0008);
  border:2px solid rgba(255,215,0,0.4);
  border-radius:16px;
  padding:clamp(24px,5vw,48px) clamp(20px,6vw,52px);
  width:min(440px,96vw);
  max-height:92vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:0;
  box-shadow:0 0 60px rgba(128,0,128,0.25),0 0 120px rgba(0,0,0,0.8);
  animation:authIn 0.25s ease-out;
  font-family:'Cinzel',serif;
}
@keyframes authIn{from{opacity:0;transform:scale(0.93) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* Logo */
#authBox .auth-logo{text-align:center;margin-bottom:20px;}
#authBox .auth-logo h2{
  font-size:clamp(1.1rem,4vw,1.5rem);font-weight:900;
  color:gold;letter-spacing:4px;margin:0;
  text-shadow:0 0 20px rgba(255,215,0,0.5);
}
#authBox .auth-logo p{color:rgba(255,255,255,0.35);font-size:0.72rem;letter-spacing:3px;margin:4px 0 0;}
#authBox .auth-divider{border:none;border-top:1px solid rgba(255,215,0,0.12);margin:16px 0;}

/* Tabs */
.auth-tabs{
  display:flex;gap:4px;margin-bottom:20px;
  background:rgba(0,0,0,0.3);border-radius:8px;padding:4px;
}
.auth-tab{
  flex:1;padding:clamp(8px,2vw,10px);
  background:none;border:none;
  color:rgba(255,255,255,0.4);
  font-family:'Cinzel',serif;
  font-size:clamp(0.68rem,2.2vw,0.82rem);
  font-weight:700;letter-spacing:1.5px;
  cursor:pointer;border-radius:6px;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.auth-tab.active{
  background:linear-gradient(145deg,#800000,#4a0000);
  color:gold;box-shadow:0 0 12px rgba(128,0,0,0.4);
}
.auth-tab:not(.active):hover{color:rgba(255,255,255,0.7);}

/* Field label */
.auth-field-label{
  font-size:clamp(0.68rem,1.8vw,0.8rem);
  color:rgba(255,215,0,0.8);
  letter-spacing:1px;text-transform:uppercase;
  margin-bottom:6px;display:block;margin-top:12px;
}

/* Inputs */
#authBox input{
  background:rgba(0,0,0,0.5);
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:8px;color:#fff;
  font-family:'Cinzel',serif;
  font-size:clamp(0.82rem,2.5vw,0.95rem);
  padding:12px 14px;transition:border-color 0.2s;
  width:100%;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
#authBox input:focus{
  outline:none;
  border-color:rgba(255,215,0,0.6);
  box-shadow:0 0 8px rgba(255,215,0,0.15);
}
#authBox input::placeholder{color:rgba(255,255,255,0.2);}

/* Buttons */
.auth-btn{
  padding:14px;margin-top:16px;
  background:linear-gradient(145deg,#800000,#4a0000);
  color:gold;border:2px solid gold;
  border-radius:8px;
  font-family:'Cinzel',serif;
  font-size:clamp(0.82rem,2.5vw,0.95rem);
  font-weight:700;letter-spacing:2px;
  cursor:pointer;text-transform:uppercase;
  transition:all 0.2s;width:100%;
  -webkit-tap-highlight-color:transparent;
}
.auth-btn:hover,.auth-btn:active{
  background:gold;color:#800000;
  box-shadow:0 0 18px rgba(255,215,0,0.4);
  transform:scale(1.02);
}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.auth-btn.secondary{
  background:rgba(0,0,0,0.3);
  border:1.5px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.45);
  margin-top:8px;letter-spacing:1px;
  font-size:clamp(0.72rem,2vw,0.82rem);
}
.auth-btn.secondary:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05);transform:none;}

/* Messages */
#authMsg{
  font-size:clamp(0.75rem,2vw,0.85rem);text-align:center;
  padding:10px 14px;border-radius:6px;margin-top:8px;
  min-height:0;transition:all 0.2s;letter-spacing:0.5px;
}
#authMsg.error{background:rgba(200,0,0,0.15);border:1px solid rgba(200,0,0,0.5);color:#ff6666;}
#authMsg.success{background:rgba(0,180,0,0.15);border:1px solid rgba(0,180,0,0.4);color:#66ff88;}

#authUserInfo{color:rgba(255,215,0,0.5);font-size:clamp(0.72rem,2vw,0.82rem);text-align:center;letter-spacing:1px;margin-bottom:4px;}

.auth-forgot-link{
  color:rgba(255,255,255,0.3);font-size:clamp(0.7rem,1.8vw,0.78rem);
  text-align:right;cursor:pointer;transition:color 0.2s;
  margin-top:4px;font-family:'Cinzel',serif;
}
.auth-forgot-link:hover{color:rgba(255,215,0,0.7);}

/* Divider or/guest */
.auth-divider-or{
  display:flex;align-items:center;gap:12px;margin:16px 0;
  color:rgba(255,255,255,0.2);font-size:0.8rem;
}
.auth-divider-or::before,.auth-divider-or::after{
  content:'';flex:1;border-top:1px solid rgba(255,255,255,0.1);
}

/* ── Video overlay (ultimate) ── */
#videoOverlay{display:none;position:fixed;inset:0;background:#000;z-index:7000;align-items:center;justify-content:center;}
#videoOverlay.show{display:flex;}
#ultimateVideo{width:100%;height:100%;object-fit:cover;}

/* ── Mobile gamepad — ONLY shown inside AFUE fight ── */
#gamepad{display:none;position:fixed;bottom:0;left:0;right:0;pointer-events:none;z-index:300;padding-bottom:env(safe-area-inset-bottom);}
#gamepad.active{display:block;}
.dpad{position:absolute;bottom:clamp(12px,3vw,20px);left:clamp(12px,3vw,20px);width:clamp(140px,32vw,180px);height:clamp(140px,32vw,180px);pointer-events:all;}
.dpad-btn{position:absolute;width:clamp(44px,11vw,56px);height:clamp(44px,11vw,56px);background:rgba(255,255,255,0.1);border:2px solid rgba(186,167,1,0.5);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#baa701;font-size:clamp(18px,5vw,24px);touch-action:none;cursor:pointer;transition:background 0.1s;}
.dpad-btn.pressed,.dpad-btn:active{background:rgba(161,0,0,0.8)!important;}
#dUp{top:0;left:50%;transform:translateX(-50%);}
#dDown{bottom:0;left:50%;transform:translateX(-50%);}
#dLeft{left:0;top:50%;transform:translateY(-50%);}
#dRight{right:0;top:50%;transform:translateY(-50%);}
.action-btns{position:absolute;bottom:clamp(12px,3vw,20px);right:clamp(12px,3vw,20px);width:clamp(160px,38vw,210px);height:clamp(150px,35vw,185px);pointer-events:all;}
.act-btn{position:absolute;width:clamp(48px,12vw,62px);height:clamp(48px,12vw,62px);border-radius:50%;background:rgba(161,0,0,0.65);border:2px solid #baa701;color:#baa701;font-size:clamp(11px,3vw,15px);font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:pointer;transition:background 0.1s;}
.act-btn.pressed,.act-btn:active{background:rgba(161,0,0,1)!important;}
#bQ{top:32px;left:0;}
#bW{top:0;left:50%;transform:translateX(-50%);}
#bE{top:32px;right:0;}
#bS{bottom:0;left:50%;transform:translateX(-50%);}
#bC{top:32px;left:50%;transform:translateX(-50%);background:rgba(0,60,180,0.65);}
/* Labels sotto ogni tasto */
.act-btn::after{content:attr(data-label);position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:clamp(9px,2vw,11px);color:#888;white-space:nowrap;}
/* P2 pad */
.action-btns.p2 .act-btn{background:rgba(0,80,30,0.65);}
.action-btns.p2 .act-btn#b2C{background:rgba(0,60,180,0.65);}

/* ── Online room code input overlay (mobile) ── */
#codeInputOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:6000;align-items:center;justify-content:center;padding:20px;}
#codeInputOverlay.show{display:flex;}
#codeInputBox{background:#0d0d0d;border:2px solid #baa701;border-radius:12px;padding:28px 32px;width:min(400px,96vw);display:flex;flex-direction:column;gap:14px;align-items:center;}
#codeInputBox h3{color:#baa701;font-size:1.3rem;letter-spacing:3px;}
#codeInputField{background:#1a1a1a;border:2px solid #baa701;border-radius:8px;padding:14px;color:#fff;font-family:'Courier New',monospace;font-size:2rem;letter-spacing:8px;text-align:center;width:100%;}
#codeInputField:focus{outline:none;}
.code-confirm-btn{background:#a10000;color:#baa701;border:none;padding:12px 40px;font-size:1rem;border-radius:8px;cursor:pointer;font-family:inherit;letter-spacing:2px;width:100%;}
.code-confirm-btn.cancel{background:#222;border:1px solid #555;color:#888;}

/* ── Mobile menu btn ── */
#mobileMenu{
  display:none;position:fixed;
  top:clamp(8px,2vw,14px);right:clamp(8px,2vw,14px);
  z-index:400;
  background:rgba(20,0,0,0.85);
  border:2px solid #baa701;
  color:#baa701;
  font-size:clamp(20px,5vw,26px);
  width:clamp(44px,11vw,54px);height:clamp(44px,11vw,54px);
  border-radius:10px;
  align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;
  backdrop-filter:blur(4px);
  box-shadow:0 2px 12px rgba(0,0,0,0.5);
  transition:background 0.2s;
}
#mobileMenu.show{display:flex;}
#mobileMenu:active{background:rgba(161,0,0,0.9);}

/* ── Game Drawer ── */
#gameDrawer{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.75);
  z-index:500;
  backdrop-filter:blur(6px);
  align-items:center;justify-content:center;
}
#gameDrawer.open{display:flex;}
#gameDrawerBox{
  background:linear-gradient(160deg,#0d0000,#110000);
  border:2px solid #baa701;
  border-radius:16px;
  padding:clamp(24px,5vw,36px) clamp(20px,5vw,40px);
  width:min(340px,88vw);
  display:flex;flex-direction:column;gap:14px;
  box-shadow:0 0 60px rgba(161,0,0,0.3);
  animation:drawerIn 0.2s ease-out;
}
@keyframes drawerIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
#gameDrawerTitle{
  color:#baa701;font-family:'Cinzel',serif;
  font-size:clamp(1rem,4vw,1.3rem);
  letter-spacing:4px;text-align:center;
  margin-bottom:4px;
  text-shadow:0 0 12px rgba(186,167,1,0.4);
}
.drawer-btn{
  padding:clamp(13px,3vw,16px);
  background:rgba(161,0,0,0.2);
  border:1.5px solid rgba(186,167,1,0.4);
  border-radius:10px;color:#fff;
  font-family:'Courier New',monospace;
  font-size:clamp(0.88rem,3vw,1rem);
  letter-spacing:2px;cursor:pointer;
  transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.drawer-btn:hover,.drawer-btn:active{
  background:rgba(161,0,0,0.7);
  border-color:#baa701;color:#baa701;
}
.drawer-btn-exit{
  background:rgba(60,0,0,0.3);
  border-color:rgba(255,60,60,0.3);
  color:rgba(255,100,100,0.8);margin-top:6px;
}
.drawer-btn-exit:hover,.drawer-btn-exit:active{
  background:rgba(180,0,0,0.5);
  border-color:#ff4444;color:#ff8888;
}
</style>
</head>
<body>

<!-- Fullscreen / loading prompt -->
<div id="fsPrompt">
  <h1>⚡ LSD CONSOLE ⚡</h1>
  <p>Tap to enter fullscreen and start playing</p>
  <div id="loadBar"><div id="loadBarFill"></div></div>
  <button id="fsBtn" onclick="enterFullscreen()">▶ PLAY</button>
  <p style="font-size:clamp(10px,2vw,13px);opacity:0.35">Or press any key to continue</p>
</div>

<!-- Auth overlay -->
<div id="authOverlay">
  <div id="authBox">
    <div class="auth-logo">
      <h2>⚡ LSD CONSOLE</h2>
      <p>PLAYER ACCOUNT</p>
    </div>
    <p id="authUserInfo"></p>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="setAuthTab('login')">SIGN IN</div>
      <div class="auth-tab" onclick="setAuthTab('register')">REGISTER</div>
    </div>
    <div id="authFields"></div>
    <div id="authMsg"></div>
    <div class="auth-divider-or"><span>or</span></div>
    <button class="auth-btn" style="background:rgba(0,0,0,0.4);border:1.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);margin-top:0;" onclick="setAuthTab('guest');doAuth()">
      🎲 PLAY AS GUEST
      <span style="display:block;font-size:0.68rem;color:rgba(255,255,255,0.3);font-weight:400;letter-spacing:0.5px;margin-top:3px;">Progress not saved permanently</span>
    </button>
    <button class="auth-btn secondary" onclick="closeAuth()">✕ CLOSE</button>
  </div>
</div>

<!-- Video overlay for ultimates -->
<div id="videoOverlay">
  <video id="ultimateVideo" playsinline webkit-playsinline></video>
</div>

<canvas id="canvas"></canvas>

<!-- Mobile controls (only shown during AFUE fight) -->
<div id="mobileMenu" onclick="toggleDrawer()">☰</div>

<!-- ── GAME DRAWER — visible in all games ── -->
<div id="gameDrawer">
  <div id="gameDrawerBox">
    <div id="gameDrawerTitle">MENU</div>
    <button class="drawer-btn" onclick="drawerAction('resume')">▶ RESUME</button>
    <button class="drawer-btn" onclick="drawerAction('home')">🏠 HOME</button>
    <button class="drawer-btn drawer-btn-exit" onclick="drawerAction('exit')">✕ EXIT CONSOLE</button>
  </div>
</div>
<div id="gamepad">
  <div class="dpad">
    <div class="dpad-btn" id="dLeft">◀</div>
    <div class="dpad-btn" id="dRight">▶</div>
    <div class="dpad-btn" id="dUp">▲</div>
    <div class="dpad-btn" id="dDown">▼</div>
  </div>
  <div class="action-btns" id="actionBtnsP1">
    <div class="act-btn" id="bQ" data-label="Attack">Q</div>
    <div class="act-btn" id="bW" data-label="Punch">W</div>
    <div class="act-btn" id="bC" data-label="Block">C</div>
    <div class="act-btn" id="bE" data-label="Special">E</div>
    <div class="act-btn" id="bS" data-label="Kick">S</div>
  </div>
</div>

<!-- Room code input (mobile) -->
<div id="codeInputOverlay">
  <div id="codeInputBox">
    <h3>ENTER ROOM CODE</h3>
    <input id="codeInputField" maxlength="6" placeholder="000000" inputmode="numeric" pattern="[0-9]*">
    <button class="code-confirm-btn" onclick="confirmCodeInput()">▶ JOIN</button>
    <button class="code-confirm-btn cancel" onclick="cancelCodeInput()">✕ CANCEL</button>
  </div>
</div>

<script>
// ============================================================
//  LSD CONSOLE v4 — Complete rewrite with all fixes
// ============================================================

const API_URL  = "https://lsd-backend-4phu.onrender.com";
const SITE_URL = "https://lsd-software.github.io";

// ── Canvas & Scale ──────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
let W = 0, H = 0, scale = 1;
const BASE_W = 1920, BASE_H = 1080;

function _requestFS() {
  const el  = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (req) {
    req.call(el).then(() => {
      // After FS granted, recalculate canvas size
      setTimeout(resizeCanvas, 100);
    }).catch(() => {
      // iOS Safari doesn't support FS — just recalculate canvas
      resizeCanvas();
    });
  } else {
    resizeCanvas();
  }
}

function enterFullscreen() {
  document.getElementById("fsPrompt").style.display = "none";
  _requestFS();
  resizeCanvas();
  startGame();
}

// Keyboard shortcut F or any key
document.addEventListener("keydown", function onFirst(e) {
  if (document.getElementById("fsPrompt").style.display !== "none") {
    enterFullscreen();
    document.removeEventListener("keydown", onFirst);
  }
});

// Also re-request FS on any click/touch (re-entering after ESC)
document.addEventListener("click", () => {
  if (document.fullscreenEnabled && !document.fullscreenElement && document.getElementById("fsPrompt").style.display === "none") {
    _requestFS();
  }
});

// Animate loading bar
let _loadStart = Date.now();
function animLoadBar() {
  const pct = Math.min(1, (Date.now()-_loadStart)/4000);
  document.getElementById("loadBarFill").style.width = (pct*100)+"%";
  if (pct < 1) requestAnimationFrame(animLoadBar);
}
requestAnimationFrame(animLoadBar);

// Auto-start after 4s
setTimeout(() => {
  if (document.getElementById("fsPrompt").style.display !== "none") enterFullscreen();
}, 4000);
// ── Mobile detection (MUST be before resizeCanvas) ──────────
const isMobile = /Mobi|Android|iPhone|iPad|Touch/i.test(navigator.userAgent) || ('ontouchstart' in window) || window.innerWidth < 900;

const DPR = Math.min(window.devicePixelRatio || 1, 3);
// _offX/_offY always 0 because canvas is centered by CSS transform
// Game coordinates always map 1:1 from (0,0) to (BASE_W, BASE_H)
let _offX = 0, _offY = 0;

function resizeCanvas() {
  W = window.innerWidth;
  H = window.innerHeight;

  // FIT: scale so entire game is visible with no cropping on any device
  scale = Math.min(W / BASE_W, H / BASE_H);

  // Physical canvas pixels = game size × DPR for sharp rendering
  const cssW = Math.round(BASE_W * scale);
  const cssH = Math.round(BASE_H * scale);

  canvas.width  = Math.round(cssW * DPR);
  canvas.height = Math.round(cssH * DPR);

  // CSS size = logical pixels (centered by transform:translate(-50%,-50%) in CSS)
  canvas.style.width  = cssW + "px";
  canvas.style.height = cssH + "px";

  // Scale context by DPR so everything drawn in game coords
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // Offsets are 0 — canvas is already positioned at (0,0) game origin
  _offX = 0;
  _offY = 0;

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
}
window.addEventListener("resize", () => { resizeCanvas(); });
// Also re-calc on orientation change (mobile)
window.addEventListener("orientationchange", () => { setTimeout(resizeCanvas, 200); });
resizeCanvas();

function sx(x) { return x * scale; }
function sy(y) { return y * scale; }
function ss(s) { return s * scale; }

// ── Asset Loading ───────────────────────────────────────────
const images = {};
function loadImg(key, src) {
  const img = new Image(); img.src = src; images[key] = img; return img;

// ── Input ───────────────────────────────────────────────────
const keys = {};
let mouseX = 0, mouseY = 0, mousePressed = false, _clickConsumed = false;
function consumeClick() { _clickConsumed = true; }
function clickAvailable() { return mousePressed && !_clickConsumed; }

// Convert screen coords → game coords
// Canvas is CSS-centered via transform:translate(-50%,-50%)
// so we need to subtract the canvas CSS position
function _toGameCoords(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) / scale,
    y: (clientY - r.top)  / scale
  };
}

canvas.addEventListener("mousemove", e => {
  const p = _toGameCoords(e.clientX, e.clientY);
  mouseX = p.x; mouseY = p.y;
});
canvas.addEventListener("mousedown", e => {
  const p = _toGameCoords(e.clientX, e.clientY);
  mouseX = p.x; mouseY = p.y;
  mousePressed = true; _clickConsumed = false;
});
canvas.addEventListener("mouseup", () => { mousePressed = false; _clickConsumed = false; });

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  const t = e.touches[0];
  const p = _toGameCoords(t.clientX, t.clientY);
  mouseX = p.x; mouseY = p.y;
  mousePressed = true; _clickConsumed = false;
}, { passive: false });
canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const t = e.touches[0];
  const p = _toGameCoords(t.clientX, t.clientY);
  mouseX = p.x; mouseY = p.y;
}, { passive: false });
canvas.addEventListener("touchend", () => { mousePressed = false; _clickConsumed = false; }, { passive: false });
canvas.addEventListener("touchend", () => { mousePressed = false; _clickConsumed = false; }, { passive: false });
canvas.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { e.preventDefault(); if (game) game.handleEsc(); return; }
  keys[e.key.toLowerCase()] = true; keys[e.key] = true;
  if (game) game.handleKeyPress(e.key);
});
document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false; keys[e.key] = false;
  if (game) game.handleKeyRelease(e.key);
});

function showMobileMenu(show) {

function setupMobilePad() {
  if (!isMobile) return;
  const mapKey = (id, key, label) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (label) el.dataset.label = label;
    const dn = e => { e.preventDefault(); e.stopPropagation(); keys[key]=true; keys[key.toLowerCase()]=true; el.classList.add("pressed"); if(game)game.handleKeyPress(key); };
    const up = e => { e.preventDefault(); e.stopPropagation(); keys[key]=false; keys[key.toLowerCase()]=false; el.classList.remove("pressed"); if(game)game.handleKeyRelease(key); };
    el.addEventListener("touchstart", dn, {passive:false});
    el.addEventListener("touchend",   up, {passive:false});
    el.addEventListener("mousedown",  dn);
    el.addEventListener("mouseup",    up);
  };
  mapKey("dLeft","a","← Move"); mapKey("dRight","d","→ Move");
  mapKey("dUp","w","▲ Punch"); mapKey("dDown","s","▼ Kick");
  mapKey("bQ","q","Attack"); mapKey("bW","w","Punch");

  mapKey("bC","c","Block");
  document.getElementById("mobileMenu").addEventListener("click", () => { if(game) game.handleEsc(); });
}

// ── Auth / API ───────────────────────────────────────────────
const Auth = {
  token: null, user: null,
  init() {
    this.token = localStorage.getItem("lsd_token");
    try { this.user = JSON.parse(localStorage.getItem("lsd_user")||"null"); } catch{}
  },
  save(token, user) {
    this.token=token; this.user=user;
    localStorage.setItem("lsd_token",token);
    localStorage.setItem("lsd_user",JSON.stringify(user));
  },
  clear() { this.token=null; this.user=null; localStorage.removeItem("lsd_token"); localStorage.removeItem("lsd_user"); },
  isGuest() { return !this.user || this.user.isGuest; },
  username() { return this.user?.username || "Guest"; },
  async request(path, method="GET", body=null) {
    const h = { "Content-Type":"application/json" };
    if (this.token) h["Authorization"] = `Bearer ${this.token}`;
    const opts = { method, headers:h };
    if (body) opts.body = JSON.stringify(body);
    try {
      const r = await fetch(API_URL + path, opts);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || "Error");
      return d;
    } catch(e) { throw e; }
  },
  async submitScore(game, score) {
    if (!this.token) return;
    try { await this.request("/console/score","POST",{game,score}); } catch(e){ console.warn("Score submit:",e); }
  },
  async submitAFUEResult(wins, losses) {
    if (!this.token || this.isGuest()) return;
    try { await this.request("/console/score","POST",{game:"afue",wins,losses}); } catch(e){ console.warn("AFUE result:",e); }
  },
  async getLeaderboard(gameName) {
    try { return await this.request(`/console/leaderboard/${gameName}`); } catch(e){ return {leaderboard:[],myRank:null}; }
  },
  async getTrophies() {
    if (!this.token || this.isGuest()) return null;
    try { const d = await this.request("/trophies/me"); return d.trophies; } catch(e){ return null; }
  },
  async saveTrophies(arr) {
    if (!this.token || this.isGuest()) return;
    try { await this.request("/trophies/save","POST",{trophies:arr}); } catch(e){ console.warn("Trophy save:",e); }
  }
};
Auth.init();

  _authTab = tab;

  } else if (tab==="register") {
    f.innerHTML = `<input id="ai_un" placeholder="Username" type="text" autocomplete="username"><input id="ai_em" placeholder="Email" type="email" autocomplete="email"><input id="ai_pw" placeholder="Password (min 8)" type="password" autocomplete="new-password"><button class="auth-btn" onclick="doAuth()">REGISTER</button>`;
  } else {

function showAuth() {
  const overlay = document.getElementById("authOverlay");
  overlay.classList.add("show");
  const ui = document.getElementById("authUserInfo");
  if (Auth.user) ui.textContent = `Logged in as: ${Auth.username()}`;
  else ui.textContent = "Log in to save scores to the leaderboard";
  setAuthTab("login");
}
function closeAuth() { document.getElementById("authOverlay").classList.remove("show"); }
async function doAuth() {
  const msg = document.getElementById("authMsg");
  msg.style.color="#ff6666"; msg.textContent = "Loading...";
  try {
    if (_authTab==="login") {
      const id = document.getElementById("ai_id")?.value.trim();
      const pw = document.getElementById("ai_pw")?.value;
      const d  = await Auth.request("/auth/login","POST",{identifier:id,password:pw});
      Auth.save(d.token, d.user);
      msg.className="auth-msg success"; msg.textContent = `Welcome back, ${d.user.username}!`;
      // Merge trofei DB con locali
      if (game) await game.mergeTrophiesFromDB();
      setTimeout(closeAuth, 1200);
    } else if (_authTab==="register") {
      const un = document.getElementById("ai_un")?.value.trim();
      const em = document.getElementById("ai_em")?.value.trim();
      const pw = document.getElementById("ai_pw")?.value;
      const d  = await Auth.request("/auth/register","POST",{username:un,email:em,password:pw});
      Auth.save(d.token, d.user);
      msg.className="auth-msg success"; msg.textContent = `Account created! Welcome, ${d.user.username}!`;
      setTimeout(closeAuth, 1200);
    } else {
      const nick = document.getElementById("ai_guest")?.value.trim() || "Guest";
      const d    = await Auth.request("/auth/guest","POST");
      d.user.username = nick;
      Auth.save(d.token, d.user);
      msg.className="auth-msg success"; msg.textContent = `Playing as guest: ${nick}`;
      setTimeout(closeAuth, 900);
    }
  } catch(e) {
    msg.className="auth-msg error"; msg.textContent = e.message || "Error";
  }
  if(btn) btn.disabled=false;
}

// ── Draw helpers ─────────────────────────────────────────────
function drawImg(img, x, y, w, h) {
  if (!img||!img.complete||!img.naturalWidth) return;
  ctx.save(); ctx.translate(sx(x),sy(y));
  if (w&&h) ctx.drawImage(img,-ss(w)/2,-ss(h)/2,ss(w),ss(h));
  else ctx.drawImage(img,-img.naturalWidth*scale/2,-img.naturalHeight*scale/2,img.naturalWidth*scale,img.naturalHeight*scale);
  ctx.restore();
}
const fontFace = new FontFace("LSDFont","url(font/font.otf)");
fontFace.load().then(f=>document.fonts.add(f)).catch(()=>{});
// fontScale: boost text size on small screens so it stays readable
function _getFontScale() {
  const minDim = Math.min(W, H);
  if(minDim < 400) return 1.6;
  if(minDim < 600) return 1.3;
  if(minDim < 800) return 1.1;
  return 1.0;
}
function setFont(sz,align="center") {
  const boosted = sz * _getFontScale();
  ctx.font=`${ss(boosted)}px LSDFont,monospace`;
  ctx.textAlign=align; ctx.textBaseline="middle";
}
function drawButton(text,x,y,w,h,col="#a10000") {
  const hov = isHover(x,y,w,h);
  const hw=hov?w*1.06:w, hh=hov?h*1.06:h;
  ctx.save();
  ctx.fillStyle=col;
  ctx.shadowColor="#0006"; ctx.shadowBlur=ss(10);
  ctx.beginPath(); ctx.roundRect(sx(x-hw/2),sy(y-hh/2),ss(hw),ss(hh),ss(8)); ctx.fill();
  ctx.restore();
  setFont(Math.min(22, h*0.38)); ctx.fillStyle="#baa701"; ctx.fillText(text,sx(x),sy(y));
}
function isButtonPressed(x,y,w,h) {
  if (clickAvailable()&&mouseX>x-w/2&&mouseX<x+w/2&&mouseY>y-h/2&&mouseY<y+h/2){ consumeClick(); return true; }
  return false;
}
function isHover(x,y,w,h){ return mouseX>x-w/2&&mouseX<x+w/2&&mouseY>y-h/2&&mouseY<y+h/2; }
function fillRect(x,y,w,h,col,alpha=1){ ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=col; ctx.fillRect(sx(x),sy(y),ss(w),ss(h)); ctx.restore(); }
function fillRoundRect(x,y,w,h,col,alpha=1,r=0){ ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=col; ctx.beginPath(); ctx.roundRect(sx(x),sy(y),ss(w),ss(h),ss(r)); ctx.fill(); ctx.restore(); }
function strokeRoundRect(x,y,w,h,col,lw=2,r=0){ ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=ss(lw); ctx.beginPath(); ctx.roundRect(sx(x),sy(y),ss(w),ss(h),ss(r)); ctx.stroke(); ctx.restore(); }
function fillCircle(x,y,r,col,alpha=1){ ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=col; ctx.beginPath(); ctx.arc(sx(x),sy(y),ss(r),0,Math.PI*2); ctx.fill(); ctx.restore(); }
function fillText(text,x,y,col="#fff",sz=28){ setFont(sz); ctx.fillStyle=col; ctx.fillText(text,sx(x),sy(y)); }

// ============================================================
//  MAIN CONSOLE CONTROLLER
// ============================================================
class LSDConsole {
  constructor() {
    this.screen = 0;
    this.sidePanelOpen = false;
    this.trophies = TrophyStorage.load();
    this.lsdafue  = new LSDAttackForceUE();
    this.target   = new TargetShooting();
    this.nation   = new NationBuilder();
    this.zombies  = new AttackOfZombies();
    this.ball     = new BallGame();
    this.artist   = new ArtistMaker();
    this.loadTime = millis();
    this._lbData  = null;
    this._lbGame  = null;
    this._lbLoading = false;
    this._trophySaveTimer = 0;
    // Load from DB if logged in
    if (!Auth.isGuest()) this.mergeTrophiesFromDB();
  }

  async mergeTrophiesFromDB() {
    const remote = await Auth.getTrophies();
    if (!remote) return;
    // merge: local OR remote (non si perdono trofei)
    for (let i=0; i<14; i++) this.trophies[i] = this.trophies[i] || remote[i];
    TrophyStorage.save(this.trophies);
  }

  handleEsc() {
    if (this.screen===0) return;
    if (this.screen===7||this.screen===8||this.screen===9) { this.screen=0; return; }
    this.sidePanelOpen = !this.sidePanelOpen;
  }
  handleKeyPress(k) {
    if (this.screen===1) this.lsdafue.handleKeyPress(k);
    if (this.screen===2) this.target.keyPress(k);
    if (this.screen===3) this.nation.keyPress(k);
    if (this.screen===4) this.zombies.keyPress(k);
  }
  handleKeyRelease(k) {
    if (this.screen===1) this.lsdafue.keyRelease(k);
    if (this.screen===2) this.target.keyRelease(k);
    if (this.screen===3) this.nation.keyRelease(k);
    if (this.screen===4) this.zombies.keyRelease(k);
  }

  saveTrophies() {
    TrophyStorage.save(this.trophies);
    if (!Auth.isGuest()) Auth.saveTrophies(this.trophies);
  }

  update() {
    if (this.lsdafue.voltaGrax>=1) this.trophies[0]=true;
    if (this.lsdafue.voltaYuke>=1) this.trophies[1]=true;
    if (this.lsdafue.usedBot)      this.trophies[2]=true;
    if (this.lsdafue.voltaGrax>=5) this.trophies[7]=true;
    if (this.lsdafue.voltaYuke>=5) this.trophies[8]=true;
    if (this.target.TSo>=5)        this.trophies[10]=true;
    // Autosave trophies every 10s
    if (millis()-this._trophySaveTimer > 10000) { this._trophySaveTimer=millis(); this.saveTrophies(); }
  }

  draw() {
    // Loading splash with animated bar
    if (millis()-this.loadTime < 2800) {
      ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
      drawImg(images.logoLSD,BASE_W/2,BASE_H/2);
      const pct = Math.min(1,(millis()-this.loadTime)/2800);
      fillRoundRect(BASE_W/2-200,BASE_H-70,400*pct,12,"#a10000",1,6);
      fillRoundRect(BASE_W/2-200,BASE_H-70,400,12,"#222",0.5,6);
      fillText("LOADING...",BASE_W/2,BASE_H-100,"#555",22);
      return;
    }
    this.update();
    switch(this.screen){
      case 0: this.drawMenu();    break;
      case 1: this.lsdafue.draw(); break;
      case 2: this.target.draw(); break;
      case 3: this.nation.draw(); break;
      case 4: this.zombies.draw(); break;
      case 5: this.ball.draw();   break;
      case 6: this.artist.draw(); break;
      case 7: this.drawInfo();    break;
      case 8: this.drawLibrary(); break;
      case 9: this.drawLeaderboard(); break;
    }
    if (this.sidePanelOpen) this.drawSidePanel();
  }

  drawMenu() {
    ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
    // Background border
    strokeRoundRect(5,200,BASE_W-10,BASE_H-205,"#baa701",5,40);
    drawImg(images.logo,BASE_W/2,BASE_H/2+100);

    // ── TOP BAR layout:
    // LEFT: Exit btn + Trofei
    // CENTER: data e ora
    // RIGHT: Info → Login/Username → Classifica

    drawImg(images.btn_exit,50,50);
    if(isButtonPressed(50,50,70,70)){ this.saveTrophies(); window.location.href=SITE_URL+"/project.html"; }
    const tCount = this.trophies.filter(Boolean).length;
    fillRoundRect(90,15,160,70,"#111",0.7,10);
    strokeRoundRect(90,15,160,70,"#baa701",1.5,10);
    fillText("🏆",170,32,"#baa701",20);
    fillText(`${tCount}/14`,170,60,"#baa701",26);
    // Library btn
    drawImg(images.btn_lib,280,50);
    if(isButtonPressed(280,50,70,70)) this.screen=8;

    // --- TOP CENTER: date + time
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,"0"), mm=String(now.getMinutes()).padStart(2,"0");
    const dd=String(now.getDate()).padStart(2,"0"), mo=String(now.getMonth()+1).padStart(2,"0"), yy=now.getFullYear();
    fillRoundRect(BASE_W/2-160,8,320,90,"#000",0.6,10);

    if(isButtonPressed(BASE_W-480,45,220,66)){ this.screen=9; this._lbGame=null; this._lbData=null; }

    // ── Game grid 3×2

// ============================================================
//  GAME 1 — LSD ATTACK FORCE ULTIMATE EDITION
// ============================================================
const CHAR_DESC = {
  grax: "GRAX — Brutal fighter.\n[W] Punch  [S] Kick  [Q] Ranged  [E] Special/Heal  [C] Block",
  yuke: "YUKE — Ranged tactician.\n[W] Punch  [S] Kick  [Q] Projectile  [E] Meteor  [C] Block"
};
const ULTRA_COMBOS = {
  p1: ["w","s","e","q"],   // P1
  p2: ["i","k","o","u"]    // P2
};
// Additional combos that also trigger ultra (alternative)
const ULTRA_COMBOS_ALT = {
  p1: ["q","w","e","s"],
  p2: ["u","i","o","k"]
};

class LSDAttackForceUE {
  constructor() {
    this.voltaGrax=0; this.voltaYuke=0; this.usedBot=false;
    this.socket=null; this.onlineState=null;
    this.reset();
  }
  reset() {
    this.menuPhase="mode";
    this.mode=null;
    this.cpuDiff=null;
    this.p1Char=null; this.p2Char=null;
    this.selectingFor=1;
    this.victory=false; this.winner=""; this.victoryTime=0; this._victoryRegistered=false;
    this.fighter1=null; this.fighter2=null;
    this._cd=0;
    this.roomCode=null; this.playerIndex=null; this.waitingOpponent=false;
    this.opponentInput={};
    this.onlineReady=false; this.opponentInfo=null;
    this.onlineMsg="";
    this._codeInput="";
    if(this.socket){ this.socket.disconnect(); this.socket=null; }
    showGamePad(false);
  }
  keyRelease(k){}
  handleKeyPress(k) {
    if(this.fighter1) this.fighter1.keyPress(k);
    if(this.fighter2&&this.mode!=="cpu"&&this.mode!=="online") this.fighter2.keyPress(k);
    // Online room code entry via keyboard
    if (this.menuPhase==="enterCode") {
      if (k==="Enter"&&this._codeInput.length===6) { this.joinRoom(this._codeInput); return; }
      if (k==="Backspace") { this._codeInput=this._codeInput.slice(0,-1); return; }
      if (/^\d$/.test(k)&&this._codeInput.length<6) this._codeInput+=k;
    }
  }
  keyRelease(k){}

  // ── Online ──────────────────────────────────────────────
  connectSocket() {
    if (this.socket) return;
    this.socket = io(API_URL+"/afue", {
      auth: { token: Auth.token, username: Auth.username() },
      transports: ["websocket","polling"]
    });
    this.socket.on("room_created",   d => { this.roomCode=d.code; this.playerIndex=0; this.waitingOpponent=true; });
    this.socket.on("opponent_joined",d => { this.waitingOpponent=false; this.opponentInfo=d; });
    this.socket.on("room_joined",    d => { this.roomCode=d.code; this.playerIndex=1; this.opponentInfo={username:d.opponentUsername,char:d.opponentChar}; });
    this.socket.on("game_start",     d => { this.onlineReady=true; this.setupOnlineFight(d); });
    this.socket.on("opponent_input", d => { this.opponentInput=d; });
    this.socket.on("state_sync",     d => { if(this.playerIndex===1&&this.fighter2) this.fighter2.syncState(d); });
    this.socket.on("opponent_left",  () => { this.onlineMsg="Opponent disconnected. Returning..."; setTimeout(()=>this.reset(),3000); });
    this.socket.on("error",          d => { this.onlineMsg=d.msg; });
    // Opponent triggered ultra — show video on this client too
    this.socket.on("opponent_ultra", d => {
      if(window._ultraPlaying) return;
      window._ultraPlaying = true;
      const ytId = d.char==="grax" ? "PIWatPZndfc" : "o8cJGZX2Pyg";
      const src  = `https://www.youtube.com/embed/${ytId}?autoplay=1&controls=0&modestbranding=1&rel=0&showinfo=0&fs=0&disablekb=1&iv_load_policy=3`;
      if(this.fighter2) this.fighter2._showUltimateVideo(src, null);
    });
    // opponent_ultra_done: il client locale gestisce già il proprio _ultraPlaying
    // via closeUltra(). Non forziamo false qui per non tagliare il video.
    this.socket.on("opponent_ultra_done", () => {
      // noop — gestito da closeUltra() localmente
    });
    // Round result for online: show YOU WIN / YOU LOSE
    this.socket.on("round_result_broadcast", d => {
      this._onlineResult = d; // {winner, loser}
    });
  }
  setupOnlineFight(data) {
    const myChar = this.playerIndex===0 ? data.p0.char : data.p1.char;
    const opChar = this.playerIndex===0 ? data.p1.char : data.p0.char;
    this.p1Char=myChar; this.p2Char=opChar;
    this._buildFighters();
    this.menuPhase="fight";
    if(myChar==="grax")this.voltaGrax++; else this.voltaYuke++;
    showGamePad(isMobile);
  }
  createRoom() { this.connectSocket(); this.socket.emit("create_room",{ char:this.p1Char }); }
  joinRoom(code) { this.connectSocket(); this.socket.emit("join_room",{ code:code.trim(), char:this.p1Char }); }

  _buildFighters() {
    const p1=this.p1Char, p2=this.p2Char;
    const f1frames = n => Array.from({length:n},(_,i)=>({ r:images[`${p1}_r_${i}`], l:images[`${p1}_l_${i}`] }));
    const f2frames = n => Array.from({length:n},(_,i)=>({ r:images[`${p2}_r_${i}`], l:images[`${p2}_l_${i}`] }));
    const nFrames = ch => ch==="grax"?14:13;
    // Online: P1 starts left (200), P2 starts right (BASE_W-200) — far apart
    // fighter1 sempre a SINISTRA, fighter2 sempre a DESTRA
    // Online: ai bordi opposti dello schermo, lontani
    // Locale/CPU: distanza moderata
    const p1startX = this.mode==="online" ? 200  : 380;
    const p2startX = this.mode==="online" ? BASE_W-200 : BASE_W-380;
    this.fighter1 = new Fighter(f1frames(nFrames(p1)), p1startX, 800, p1, 1, this.mode);
    this.fighter2 = new Fighter(f2frames(nFrames(p2)), p2startX, 800, p2, 2, this.mode==="cpu"?"cpu":this.mode==="online"?"online":this.mode);
    if (this.mode==="cpu") this.fighter2.cpuDiff=this.cpuDiff;
    // Give fighters a back-reference to the AFUE instance (for socket events)
    this.fighter1._ownerAfue = this;
    this.fighter2._ownerAfue = this;
    this.fighter1._usedUltraThisRound = false;
    this.fighter2._usedUltraThisRound = false;
    this._onlineResult = null;
    // Mark which fighter is controlled by network input on this client
    // playerIndex=0: I am fighter1 (local), fighter2 is opponent (netKeys)
    // playerIndex=1: I am fighter2 (local), fighter1 is opponent (netKeys)  
    // local/cpu: no network fighters
    this.fighter1._isNetworkFighter = (this.mode==="online" && this.playerIndex===1);
    this.fighter2._isNetworkFighter = (this.mode==="online" && this.playerIndex===0);
  }

  draw() {
    if (this.menuPhase!=="fight") { this.drawMenu(); return; }
    this._drawFight();
  }

  _drawYouLabel() {
    if(!this.fighter1||!this.fighter2) return;
    // Which fighter is "you"?
    // online: playerIndex=0→fighter1, playerIndex=1→fighter2
    // local/cpu: fighter1=P1 always (no "you" label needed in local, show both)
    const drawLabel = (fighter, label, col) => {
      const x=fighter.x, y=fighter.y-310;
      // Badge
      ctx.save();
      ctx.fillStyle=col; ctx.globalAlpha=0.9;
      const w=ss(90), h=ss(32), rx=sx(x)-w/2, ry=sy(y)-h/2;
      ctx.beginPath(); ctx.roundRect(rx,ry,w,h,ss(6)); ctx.fill();
      ctx.restore();
      setFont(20); ctx.fillStyle="#000"; ctx.fillText(label,sx(x),sy(y));
    };
    if(this.mode==="online"){
      if(this.playerIndex===0){
        drawLabel(this.fighter1,"▼ YOU","#FFD700");
        drawLabel(this.fighter2,"▼ OPP","#ff6666");
      } else {
        drawLabel(this.fighter1,"▼ OPP","#ff6666");
        drawLabel(this.fighter2,"▼ YOU","#FFD700");
      }
    } else {
      drawLabel(this.fighter1,"▼ P1","#4EC600");
      drawLabel(this.fighter2, this.mode==="cpu"?"▼ CPU":"▼ P2","#ff8800");
    }
  }

  drawMenu() {
    drawImg(images.bg_fight_menu,BASE_W/2,BASE_H/2);
    fillRoundRect(BASE_W/2-520,0,1040,BASE_H,"#000",0.55);
    showGamePad(false);

    if (this.menuPhase==="mode") {
      fillText("LSD ATTACK FORCE UE",BASE_W/2,60,"#a10000",46);
      fillText("— SELECT MODE —",BASE_W/2,110,"#baa701",24);

      // How to play panel
      fillRoundRect(BASE_W/2-500,150,1000,130,"#000",0.5,12);
      strokeRoundRect(BASE_W/2-500,150,1000,130,"#555",1,12);
      fillText("P1: A/D move  |  W punch  |  S kick  |  Q ranged  |  E special  |  C block",BASE_W/2,190,"#888",18);
      fillText("P2: J/L move  |  I punch  |  K kick  |  U ranged  |  O special  |  . block",BASE_W/2,225,"#888",18);
      fillText("Discover secret moves by playing... 🔐",BASE_W/2,262,"#555",18);

      drawButton("⚔  LOCAL (2 Players)",BASE_W/2,370,400,85);
      drawButton("🤖  VS CPU",             BASE_W/2,490,400,85);
      drawButton("🌐  ONLINE",             BASE_W/2,610,400,85);
      if(isButtonPressed(BASE_W/2,370,400,85)){ this.mode="local"; this.menuPhase="charSelect"; this.selectingFor=1; }
      if(isButtonPressed(BASE_W/2,490,400,85)){ this.mode="cpu";   this.menuPhase="cpuDiff"; }
      if(isButtonPressed(BASE_W/2,610,400,85)){
        if(!Auth.token){ showAuth(); return; }
        this.mode="online"; this.menuPhase="charSelect"; this.selectingFor=1;
      }
      return;
    }

    if (this.menuPhase==="cpuDiff") {
      fillText("CPU DIFFICULTY",BASE_W/2,80,"#baa701",36);
      fillText("CPU uses all moves including ultra — good luck!",BASE_W/2,130,"#888",20);
      drawButton("😊  EASY",  BASE_W/2,300,320,85,"#1a6e1a");
      drawButton("😐  MEDIUM",  BASE_W/2,420,320,85,"#8B8B00");
      drawButton("💀  HARD",BASE_W/2,540,320,85,"#8B0000");
      if(isButtonPressed(BASE_W/2,300,320,85)){this.cpuDiff="easy"; this.menuPhase="charSelect"; this.selectingFor=1; this.usedBot=true;}
      if(isButtonPressed(BASE_W/2,420,320,85)){this.cpuDiff="medium"; this.menuPhase="charSelect"; this.selectingFor=1; this.usedBot=true;}
      if(isButtonPressed(BASE_W/2,540,320,85)){this.cpuDiff="hard"; this.menuPhase="charSelect"; this.selectingFor=1; this.usedBot=true;}
      drawButton("◀ BACK",BASE_W/2,690,220,60,"#333");
      if(isButtonPressed(BASE_W/2,690,220,60)) this.menuPhase="mode";
      return;
    }

    if (this.menuPhase==="charSelect") {
      const modeLabel={local:"LOCAL",cpu:`CPU — ${(this.cpuDiff||"").toUpperCase()}`,online:"ONLINE"};
      fillText(`${modeLabel[this.mode]} — Select Character ${this.selectingFor}`,BASE_W/2,55,"#a10000",34);
      fillText("Hover to see description  •  Click to select",BASE_W/2,98,"#666",20);

      const chars=[{key:"grax",x:610,y:360},{key:"yuke",x:1260,y:360}];
      chars.forEach(c=>{
        drawImg(images[`icon_${c.key}`],c.x,c.y);
        const hov=isHover(c.x,c.y,180,180);
        if(hov){
          fillRoundRect(c.x-95,c.y-95,190,190,"#a10000",0.18,12);
          strokeRoundRect(c.x-95,c.y-95,190,190,"#baa701",2,12);
          // description box
          const lines=CHAR_DESC[c.key].split("\n");
          const boxH=lines.length*36+20;
          fillRoundRect(BASE_W/2-380,BASE_H-200-boxH,760,boxH+10,"#000",0.88,10);
          strokeRoundRect(BASE_W/2-380,BASE_H-200-boxH,760,boxH+10,"#baa701",1,10);
          lines.forEach((l,li)=>fillText(l,BASE_W/2,BASE_H-200-boxH+22+li*36,li===0?"#baa701":"#ccc",li===0?20:17));
          if(clickAvailable()&&millis()-this._cd>350){
            consumeClick(); this._cd=millis();
            if(this.selectingFor===1){
              this.p1Char=c.key;
              if(this.p1Char==="grax")this.voltaGrax=Math.max(this.voltaGrax,1); else this.voltaYuke=Math.max(this.voltaYuke,1);
              if(this.mode==="cpu"){
                this.p2Char=this.p1Char==="grax"?"yuke":"grax";
                this._finishSelection();
              } else {
                this.selectingFor=2;
              }
            } else {
              this.p2Char=c.key;
              if(this.mode==="online"){ this.menuPhase="onlineLobby"; }
              else { this._finishSelection(); }
            }
          }
        }
        // Border if selected
        if((this.selectingFor===2&&c.key===this.p1Char)||(this.p2Char===c.key)){
          strokeRoundRect(c.x-90,c.y-90,180,180,"#baa701",3,10);
        }
      });

      if(this.p1Char){
        fillRoundRect(60,260,200,280,"#111",0.7,10);
        drawImg(images[`icon_${this.p1Char}`],160,370);
        fillText(`P1: ${this.p1Char.toUpperCase()}`,160,490,"#baa701",22);
      }
      if(this.p2Char&&this.mode!=="online"){
        fillRoundRect(BASE_W-260,260,200,280,"#111",0.7,10);
        drawImg(images[`icon_${this.p2Char}`],BASE_W-160,370);
        fillText(`P2: ${this.p2Char.toUpperCase()}`,BASE_W-160,490,"#baa701",22);
      }
      drawButton("◀ BACK",BASE_W/2,BASE_H-50,200,55,"#333");
      if(isButtonPressed(BASE_W/2,BASE_H-50,200,55)){ this.menuPhase=this.mode==="cpu"?"cpuDiff":"mode"; this.p1Char=null; this.p2Char=null; this.selectingFor=1; }
    }

    if (this.menuPhase==="confirmStart") {
      fillText(`${this.p1Char.toUpperCase()}  vs  ${this.p2Char.toUpperCase()}`,BASE_W/2,BASE_H/2-80,"#baa701",46);
      // Show controls reminder
      fillText("P1: A/D • W Punch • S Kick • Q Ranged • E Special • C Block",BASE_W/2,BASE_H/2-20,"#888",18);
      if(this.mode==="local") fillText("P2: J/L • I Punch • K Kick • U Ranged • O Special • . Block",BASE_W/2,BASE_H/2+10,"#888",18);
      drawButton("▶ FIGHT!",BASE_W/2,BASE_H/2+130,240,100);
      if(isButtonPressed(BASE_W/2,BASE_H/2+130,240,100)){
        this._buildFighters(); this.menuPhase="fight";
        showGamePad(isMobile);
      }
      drawButton("◀ BACK",BASE_W/2,BASE_H/2+265,200,60,"#333");
      if(isButtonPressed(BASE_W/2,BASE_H/2+265,200,60)){ this.menuPhase="charSelect"; this.selectingFor=2; this.p2Char=null; }

  _drawFight() {
    drawImg(images.bg_fight,BASE_W/2,BASE_H/2);
    if(!this.fighter1||!this.fighter2) return;

    // Online: invia input locale, applica input avversario al fighter corretto
    if(this.mode==="online"&&this.socket){
      const inp = this._getP1Input();
      this.socket.emit("input", inp);
      // playerIndex=0: fighter2 è l'avversario
      // playerIndex=1: fighter1 è l'avversario
      if(this.playerIndex===0 && this.fighter2){
        this.fighter2.applyNetworkInput(this.opponentInput);
      } else if(this.playerIndex===1 && this.fighter1){
        this.fighter1.applyNetworkInput(this.opponentInput);
      }
    }

    // Blocca il combattimento durante la riproduzione dell'ultra
    if(!window._ultraPlaying){
      this.fighter1.update(this.fighter2);
      this.fighter2.update(this.fighter1);
    }
    this.fighter1.drawChar(1);
    this.fighter2.drawChar(2);
    this._drawYouLabel();
    this._drawHUD();

    // ── VICTORY CHECK ─────────────────────────────────────
    // Registra la vittoria appena un fighter muore
    // Ma mostra la schermata solo DOPO che il video ultra è finito
    if(!this._victoryRegistered){
      const f1Dead = this.fighter1.hp<=0;
      const f2Dead = this.fighter2.hp<=0;
      if(f1Dead || f2Dead){
        this._victoryRegistered=true;
        if(f2Dead){
          // fighter2 morto → fighter1 vince
          this.victory=true;
          this.winner=this.fighter1.name.toUpperCase();
          this.victorIsP1=true;
          if(game) game.trophies[13]=true;
        } else {
          // fighter1 morto → fighter2 vince
          this.victory=true;
          this.winner=this.fighter2.name.toUpperCase();
          this.victorIsP1=false;
        }
        // Solo playerIndex=0 invia il risultato al server (anti-duplicati)
        if(this.mode==="online"&&this.socket&&this.playerIndex===0){
          const w = this.victorIsP1 ? this.fighter1.name : this.fighter2.name;
          const l = this.victorIsP1 ? this.fighter2.name : this.fighter1.name;
          this.socket.emit("round_result",{winner:w,loser:l});
        }
      }
    }

    // ── VICTORY DISPLAY ───────────────────────────────────
    // Mostra schermata SOLO quando: vittoria registrata E video non in corso
    if(this.victory && !window._ultraPlaying){
      if(!this.victoryTime) this.victoryTime=millis();

      ctx.save(); ctx.fillStyle="rgba(0,0,0,0.82)"; ctx.fillRect(0,0,W,H); ctx.restore();

      // Determina chi ha vinto dal punto di vista del giocatore locale
      // victorIsP1=true → fighter1 ha vinto
      // Online playerIndex=0 → io sono fighter1 → victorIsP1=true = ho vinto
      // Online playerIndex=1 → io sono fighter2 → victorIsP1=false = ho vinto
      let topLine, topCol, subLine;
      if(this.mode==="online"){
        const iWon = (this.playerIndex===0 &&  this.victorIsP1) ||
                     (this.playerIndex===1 && !this.victorIsP1);
        topLine = iWon ? "🏆  YOU WIN!"  : "💀  YOU LOSE";
        topCol  = iWon ? "#FFD700"       : "#FF3333";
        subLine = `${this.winner} wins the round`;
      } else {
        topLine = `🏆  ${this.winner}  WINS!`;
        topCol  = "#FFD700";
        subLine = this.mode==="cpu"
          ? (this.victorIsP1 ? "You beat the CPU!" : "CPU wins this round!")
          : "";
      }

      setFont(78); ctx.fillStyle=topCol;
      ctx.shadowColor=topCol; ctx.shadowBlur=ss(30);
      ctx.fillText(topLine, sx(BASE_W/2), sy(BASE_H/2-60));
      ctx.shadowBlur=0;
      if(subLine){ setFont(32); ctx.fillStyle="#fff"; ctx.fillText(subLine, sx(BASE_W/2), sy(BASE_H/2+20)); }
      setFont(22); ctx.fillStyle="#888";
      ctx.fillText("Returning to menu...", sx(BASE_W/2), sy(BASE_H/2+90));

      if(millis()-this.victoryTime>=4500){
        showGamePad(false); this.reset(); if(game) game.screen=0;
      }
    }
  }

  }
  _getP1Input() {
    // Invia solo i tasti — ogni client gestisce la propria posizione
    return {
      a: !!(keys["a"]||keys["A"]),
      d: !!(keys["d"]||keys["D"]),
      w: !!(keys["w"]||keys["W"]),
      s: !!(keys["s"]||keys["S"]),
      q: !!(keys["q"]||keys["Q"]),
      e: !!(keys["e"]||keys["E"]),
      c: !!(keys["c"]||keys["C"])
    };
  }
}

// ============================================================
//  FIGHTER CLASS
// ============================================================
class Fighter {
  constructor(frames, x, y, name, playerNum, mode) {
    this.frames   = frames;
    this.x = x; this.y = y;
    this.name = name; this.playerNum = playerNum; this.mode = mode;
    this.hp = 100;
    this.frame = 0;
    this.facing = playerNum===1 ? 1 : -1;
    this.blocking = false;
    this.cd1=0;this.cd2=0;this.cd3=0;this.cd4=0;this.cd5=0; // cd5=ultra cooldown separato da cd4(special)
    this.anim = null;
    this.projX=x; this.projActive=false; this.proj2Active=false;
    // Grax cube particle data
    this.graxCubeActive=false; this.graxCubeX=x; this.graxCubeY=800; this.graxCubeParts=[];
    // Ultra sequence tracking (P1: w s e q; P2: i k o u)
    this.ultSeq  = playerNum===1 ? ["w","s","e","q"] : ["i","k","o","u"];
    this.ultSeqAlt = playerNum===1 ? ["q","w","e","s"] : ["u","i","o","k"];
    this.ultIdx  = 0; this.ultIdxAlt = 0;
    this.ultActive = false; this.ultKill = false;
    this.cpuDiff = "medium";
    this._cpuState = {action:null,thinkEnd:0};
    this._initialized = false;
    this.hitbox = { w:120, h:280 };
    // Network
    this._netKeys = {};
  }

  keyPress(k) {
    const ku = k.toLowerCase();
    // Tasti che fanno parte di qualche combo — non resettare il tracker
    const comboKeys = new Set([...this.ultSeq, ...this.ultSeqAlt]);

    // Ultra sequence check (main combo)
    if(ku===this.ultSeq[this.ultIdx]){
      this.ultIdx++;
      if(this.ultIdx>=this.ultSeq.length){ this._triggerUltra(); this.ultIdx=0; }
    } else if(!comboKeys.has(ku)){
      // Tasto estraneo alla combo: resetta
      this.ultIdx=0;
    } else if(ku===this.ultSeq[0]){
      this.ultIdx=1;
    }
    // Alt combo
    if(ku===this.ultSeqAlt[this.ultIdxAlt]){
      this.ultIdxAlt++;
      if(this.ultIdxAlt>=this.ultSeqAlt.length){ this._triggerUltra(); this.ultIdxAlt=0; }
    } else if(!comboKeys.has(ku)){
      this.ultIdxAlt=0;
    } else if(ku===this.ultSeqAlt[0]){
      this.ultIdxAlt=1;
    }
  }

  _triggerUltra(onDone) {
    if(millis()-this.cd5 < 12000) return;
    if(window._ultraPlaying) return;
    if(this._zombieUltraLocked) return; // bloccata nei round 1-9 zombie mode
    this.ultActive=true; this.ultIdx=0; this.ultIdxAlt=0;
    this.cd5=millis();
    window._ultraPlaying = true;
    // YouTube embed con autoplay — molto più affidabile di Drive
    const ytId = this.name==="grax" ? "PIWatPZndfc" : "o8cJGZX2Pyg";
    const src  = `https://www.youtube.com/embed/${ytId}?autoplay=1&controls=0&modestbranding=1&rel=0&showinfo=0&fs=0&disablekb=1&iv_load_policy=3`;
    this._showUltimateVideo(src, onDone);
    if(game) game.trophies[12]=true;
    // Notify opponent via socket to show the same video
    if(this._ownerAfue && this._ownerAfue.socket){
      this._ownerAfue.socket.emit("ultra_activated", { char: this.name });
    }
  }

  _showUltimateVideo(src, onDone) {
    const overlay = document.getElementById("videoOverlay");
    overlay.innerHTML = "";
    overlay.style.cssText = "display:flex;position:fixed;inset:0;background:#000;z-index:7000;align-items:center;justify-content:center;flex-direction:column;";

    // Flash title
    const title = document.createElement("div");
    title.textContent = "⚡ ULTRA ⚡";
    title.style.cssText = "position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(2.5rem,8vw,5rem);color:#FF4400;font-family:monospace;letter-spacing:6px;text-shadow:0 0 40px #FF4400;animation:ultraFlash 0.8s ease-out forwards;pointer-events:none;z-index:5;";
    overlay.appendChild(title);
    if(!document.getElementById("_ultraFlashStyle")){
      const st=document.createElement("style"); st.id="_ultraFlashStyle";
      st.textContent="@keyframes ultraFlash{0%{opacity:1;transform:translate(-50%,-50%) scale(2);}100%{opacity:0;transform:translate(-50%,-50%) scale(0.8);}}";
      document.head.appendChild(st);
    }

    // Skip button — visible after 1s
    const skip = document.createElement("button");
    skip.textContent = "SKIP ▶";
    skip.style.cssText = "position:absolute;top:18px;right:22px;z-index:10;background:rgba(0,0,0,0.8);color:#baa701;border:2px solid #baa701;padding:10px 24px;font-size:1rem;font-family:monospace;letter-spacing:2px;cursor:pointer;border-radius:6px;pointer-events:all;opacity:0;transition:opacity 0.3s;";
    overlay.appendChild(skip);
    setTimeout(()=>{ skip.style.opacity="1"; }, 1000);

    // iframe — load after flash (800ms)
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "width:100%;height:100%;border:none;position:absolute;inset:0;opacity:0;transition:opacity 0.5s;pointer-events:all;";
    iframe.allow = "autoplay; encrypted-media; picture-in-picture";
    overlay.appendChild(iframe);

    let _closed = false;
    const _openedAt = Date.now();

    const closeUltra = (fromSkip=false) => {
      if(_closed) return;
      _closed = true;
      clearTimeout(this._vidTimer);
      clearTimeout(this._vidLoadTimer);
      overlay.style.display = "none";
      overlay.innerHTML = "";
      window._ultraPlaying = false;
      this.ultKill = true;
      this.ultActive = false;
      if(this._ownerAfue && this._ownerAfue.socket){
        this._ownerAfue.socket.emit("ultra_done", {});
      }
      // onDone chiamato DOPO la chiusura: mostra vittoria/sconfitta
      if(onDone) setTimeout(onDone, 100);
    };

    // Durata esatta dei video + 2s margine:
    // Grax: 1:06 = 66s + 2 = 68s  |  Yuke: 1:29 = 89s + 2 = 91s
    const videoDuration = (this.name === "grax") ? 68000 : 91000;

    // Carica iframe dopo il flash — il timer parte DA QUI (quando il video inizia)
    this._vidLoadTimer = setTimeout(() => {
      iframe.src = src;
      iframe.style.opacity = "1";
      // Timer parte esattamente quando il video comincia a caricare
      this._vidTimer = setTimeout(() => closeUltra(), videoDuration);
    }, 800);

    skip.addEventListener("click", e => { e.stopPropagation(); closeUltra(true); }, {once:true});

    // Click overlay chiude dopo 3s guard (evita click accidentale all'apertura)
    overlay.addEventListener("click", function _oc(e){
      if(e.target===skip) return;
      if(Date.now()-_openedAt < 3000) return;
      overlay.removeEventListener("click",_oc);
      closeUltra();
    });
  }

  applyNetworkInput(inp) {
    // Salva i tasti ricevuti dalla rete — NON sovrascrivere posizione locale
    // Ogni client è l'autorità sulla posizione del proprio fighter
    this._netKeys = inp || {};
  }
  syncState(state){ if(state.x!==undefined) this.x=state.x; if(state.hp!==undefined) this.hp=state.hp; }

  update(enemy) {
    if(!this._initialized){ this.cd1=this.cd2=this.cd3=this.cd4=this.cd5=millis()-(14000); this._initialized=true; }
    const now=millis(), t=frameCount%30;

    // Aggiorna sempre il facing verso il nemico
    this.facing = (enemy.x > this.x) ? 1 : -1;

    if(this.mode==="cpu"&&this.playerNum===2){ this._cpuUpdate(enemy, now, t); return; }

    // Advance animation
    if(this.anim){
      const el=frameCount-this.anim.start;
      if(el>=this.anim.dur){ this.frame=0; this.anim=null; }
      else {
        if(this.anim.type==="punch")  this.frame=el<15?3:4;
        else if(this.anim.type==="kick")   this.frame=el<15?5:6;
        else if(this.anim.type==="ranged") {
          if(this.name==="grax") {
            this.frame=el<15?9:10;
            if(el===14){ this._launchGraxCube(enemy); }
          } else {
            // Yuke: 5-frame charge windup, then release
            if(el<8)       this.frame=9;          // wind-up start
            else if(el<16) this.frame=10;          // wind-up peak
            else if(el<22) this.frame=11;          // release arm forward
            else           this.frame=12;          // follow-through
            // Trail particles during charge
            if(el>=8 && el<18 && el%2===0){
              if(!this.hitParticles) this.hitParticles=[];
              const chargeX = this.x + this.facing*80;
              this.hitParticles.push({
                x:chargeX+(Math.random()-0.5)*20, y:this.y-120+(Math.random()-0.5)*30,
                vx:(Math.random()-0.5)*2, vy:-(Math.random()*2+1),
                r:Math.random()*5+3, alpha:0.8,
                col:"#00CCFF", life:0, maxLife:12
              });
            }
            // Launch projectile at frame 20 (after wind-up)
            if(el===20){
              this.projX=this.x+this.facing*120;
              this.projY=this.y-110;
              this.projActive=true;
            }
          }
        }
        else if(this.anim.type==="special"){
          if(this.name==="grax") this.frame=el<10?11:el<20?12:13;
          else{ this.frame=el<15?9:10; if(el===15){this.projX=this.x+this.facing*160;this.proj2Active=true;} }
        }
      }
    }

    // Move projectiles
    if(this.projActive){ this.projX+=8*this.facing; if((this.facing>0&&this.projX>enemy.x-40)||(this.facing<0&&this.projX<enemy.x+40)){this.projActive=false; if(!enemy.blocking)this._dealDmg(enemy,15,5,false);} }
    if(this.proj2Active){ this.projX+=6*this.facing; if((this.facing>0&&this.projX>enemy.x-40)||(this.facing<0&&this.projX<enemy.x+40)){this.proj2Active=false; if(!enemy.blocking)this._dealDmg(enemy,12,5,false);} }

    // Update grax cube particles
    if(this.graxCubeActive) this._updateGraxCube(enemy, now);

    // Determine input source:
    // _isNetworkFighter=true → questo fighter è controllato dall'avversario remoto via netKeys
    // isLocalP2 → P2 in locale usa tasti j/l/i/k/u/o/.
    // default → P1 locale usa a/d/w/s/q/e/c
    const isNetFighter = this._isNetworkFighter === true;
    const isLocalP2    = !isNetFighter && this.mode!=="online" && this.mode!=="cpu" && this.playerNum===2;
    let leftKey, rightKey, blockKey, punchKey, kickKey, rangedKey, specKey;
    if(isNetFighter){
      // Usa i tasti ricevuti dalla rete (stesse chiavi a/d/w/s/q/e/c del P1 avversario)
      leftKey   = !!this._netKeys["a"];
      rightKey  = !!this._netKeys["d"];
      blockKey  = !!this._netKeys["c"];
      punchKey  = !!this._netKeys["w"];
      kickKey   = !!this._netKeys["s"];
      rangedKey = !!this._netKeys["q"];
      specKey   = !!this._netKeys["e"];
    } else if(isLocalP2){
      // P2 locale: tasti j/l/i/k/u/o/.
      leftKey   = !!(keys["j"]||keys["J"]);
      rightKey  = !!(keys["l"]||keys["L"]);
      blockKey  = !!(keys["."]||keys[">"]||keys["'"]||keys[";"]);
      punchKey  = !!(keys["i"]||keys["I"]);
      kickKey   = !!(keys["k"]||keys["K"]);
      rangedKey = !!(keys["u"]||keys["U"]);
      specKey   = !!(keys["o"]||keys["O"]);
    } else {
      // P1 locale (o fighter locale online): a/d/w/s/q/e/c
      leftKey   = !!(keys["a"]||keys["A"]);
      rightKey  = !!(keys["d"]||keys["D"]);
      blockKey  = !!(keys["c"]||keys["C"]);
      punchKey  = !!(keys["w"]||keys["W"]);
      kickKey   = !!(keys["s"]||keys["S"]);
      rangedKey = !!(keys["q"]||keys["Q"]);
      specKey   = !!(keys["e"]||keys["E"]);
    }

    // Movement (slower, more deliberate)
    if(!this.anim){
      if(rightKey){ this.x=Math.min(this.x+3,BASE_W-80); this.frame=t<15?1:2; }
      else if(leftKey){ this.x=Math.max(this.x-3,80); this.frame=t<=15?2:0; }
      else this.frame=0;
    }

    // Push-apart collision
    const overlap=100;
    if(Math.abs(this.x-enemy.x)<overlap){ this.x+=this.x<enemy.x?-1:+1; }

    this.blocking=blockKey; if(blockKey) this.frame=7;

    const dist=Math.abs(enemy.x-this.x);

    // Punch
    if(punchKey&&now-this.cd1>1800&&!this.anim){
      this.anim={type:"punch",start:frameCount,dur:32}; this.cd1=now;
      if(dist<200){ this._dealDmg(enemy,5,1,true); this._knockback(enemy,50); }
    }
    // Kick
    if(kickKey&&now-this.cd2>3500&&!this.anim){
      this.anim={type:"kick",start:frameCount,dur:32}; this.cd2=now;
      if(dist<180){ this._dealDmg(enemy,10,2.5,true); this._knockback(enemy,120); }
    }
    // Ranged (Q key for P1)
    if(rangedKey&&now-this.cd3>8000&&!this.anim){
      this.anim={type:"ranged",start:frameCount,dur:34}; this.cd3=now;
      if(this.name==="grax"){ /* grax cube launched at frame 14 */ }
      else { /* yuke: proj launched in anim update */ }
    }
    // Special (E key for P1) — usable anytime
    if(specKey&&now-this.cd4>12000&&!this.anim){
      this.anim={type:"special",start:frameCount,dur:36}; this.cd4=now;
      if(this.name==="grax") { this.hp=Math.min(100,this.hp+20); this._dealDmg(enemy,18,6,true); this._knockback(enemy,200); }
      else { this._dealDmg(enemy,12,5,true); /* meteora launched in anim */ }
    }
    // Ultra kill: applica 60 di danno all'avversario dopo il video
    if(this.ultKill && !window._ultraPlaying){
      enemy.hp=Math.max(0,enemy.hp-60);
      this.ultKill=false;
    }
  }

  _launchGraxCube(enemy) {
    // Particle burst traveling to enemy
    this.graxCubeActive=true;
    this.graxCubeX=this.x+this.facing*80;
    this.graxCubeY=this.y-120;
    this._graxTarget={x:enemy.x, y:enemy.y-120};
    this.graxCubeParts=[];
    for(let i=0;i<12;i++){
      this.graxCubeParts.push({
        ox:0, oy:0,
        vx:(Math.random()-0.5)*6, vy:-(Math.random()*4+2),
        r:Math.random()*16+6, alpha:1,
        col:`hsl(${20+Math.random()*40},100%,${50+Math.random()*20}%)`
      });
    }
    this._graxCubeMoved=false;
    this._graxCubeStart=millis();
    this._graxEnemy=enemy;
  }
  _updateGraxCube(enemy, now) {
    const elapsed=(now-this._graxCubeStart)/1000;
    const dur=0.7;
    if(elapsed>=dur){
      // On hit
      if(!this._graxCubeMoved){
        this._graxCubeMoved=true;
        if(!enemy.blocking) this._dealDmg(enemy,15,5,false); this._knockback(enemy,160);
      }
      this.graxCubeActive=false;
      return;
    }
    const pct=elapsed/dur;
    const tx=this._graxTarget.x, ty=this._graxTarget.y;
    this.graxCubeX=this.x+this.facing*80+(tx-(this.x+this.facing*80))*pct;
    this.graxCubeY=(this.y-120)+(ty-(this.y-120))*pct - Math.sin(pct*Math.PI)*80;
    // Update particles
    this.graxCubeParts.forEach(p=>{
      p.ox+=p.vx; p.oy+=p.vy; p.vy+=0.3; p.alpha=1-pct;
    });
  }

  _dealDmg(enemy,dmg,blockDmg,moveType){
    if(enemy.blocking){
      enemy.hp=Math.max(0,enemy.hp-blockDmg);
      enemy._spawnHitParticles("block", blockDmg);
    } else {
      enemy.hp=Math.max(0,enemy.hp-dmg);
      enemy._spawnHitParticles(moveType||"punch", dmg);
    }
  }
  _spawnHitParticles(type, dmg) {
    if(!this.hitParticles) this.hitParticles=[];
    const count = type==="ranged"?20 : type==="special"?30 : type==="kick"?14 : type==="block"?8 : 10;
    const colMap = {
      punch:  ["#FF8800","#FFAA00","#fff"],
      kick:   ["#FF4400","#FF2200","#FF8800"],
      ranged: ["#FF6600","#FF4400","#FFD700","#fff"],
      special:["#FF0000","#FF4400","#FF8800","#FFD700","#fff"],
      block:  ["#0088FF","#00AAFF","#fff"]
    };
    const cols = colMap[type]||colMap.punch;
    const cx = this.x, cy = this.y-140;
    for(let i=0;i<count;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = (Math.random()*4+2)*(dmg/10);
      this.hitParticles.push({
        x:cx + (Math.random()-0.5)*40,
        y:cy + (Math.random()-0.5)*60,
        vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed - 2,
        r: Math.random()*(type==="special"?10:6)+3,
        alpha:1,
        col: cols[Math.floor(Math.random()*cols.length)],
        life:0, maxLife: type==="special"?28:18
      });
    }
    // Flash effect on hit
    this._hitFlash = 6;
  }
  _knockback(enemy,dist){ enemy.x=Math.min(Math.max(enemy.x+(enemy.x>this.x?dist:-dist),80),BASE_W-80); }

  // ── CPU AI (enhanced) ──────────────────────────────────────
  _cpuUpdate(enemy, now, t) {
    const dist=Math.abs(enemy.x-this.x);
    const diff=this.cpuDiff;
    const reactionMs={easy:1400,medium:700,hard:250}[diff]||700;
    const aggr={easy:0.25,medium:0.55,hard:0.9}[diff]||0.55;

    this.facing=(enemy.x>this.x)?1:-1;

    if(now<this._cpuState.thinkEnd){
      const act=this._cpuState.action;
      if(act==="approach"){ this.x+=this.facing*3; this.frame=t<15?1:2; }
      else if(act==="retreat"){ this.x-=this.facing*2; this.frame=t<=15?2:0; }
      else this.frame=0;
    } else {
      this._cpuState.thinkEnd=now+reactionMs+(Math.random()*300);
      if(dist>300) this._cpuState.action="approach";
      else if(dist<90&&diff!=="hard"&&Math.random()<0.5) this._cpuState.action="retreat";
      else if(Math.random()<aggr) this._cpuState.action="attack";
      else if(Math.random()<0.3) this._cpuState.action="retreat";
      else this._cpuState.action="idle";
    }

    // Advance anim
    if(this.anim){
      const el=frameCount-this.anim.start;
      if(el>=this.anim.dur){this.frame=0;this.anim=null;}
      else{
        if(this.anim.type==="punch")this.frame=el<15?3:4;
        else if(this.anim.type==="kick")this.frame=el<15?5:6;
        else if(this.anim.type==="ranged"){
          this.frame=el<15?9:10;
          if(this.name==="grax"&&el===14) this._launchGraxCube(enemy);
          else if(this.name==="yuke"&&el===15){this.projX=this.x+this.facing*160;this.projActive=true;}
        }
        else if(this.anim.type==="special"){
          if(this.name==="grax")this.frame=el<10?11:el<20?12:13;
          else{this.frame=el<15?9:10;if(el===15){this.projX=this.x+this.facing*160;this.proj2Active=true;}}
        }
      }
      return;
    }

    if(this.projActive){ this.projX+=8*this.facing; if((this.facing>0&&this.projX>enemy.x-40)||(this.facing<0&&this.projX<enemy.x+40)){this.projActive=false;this._dealDmg(enemy,15,5,false);} }
    if(this.proj2Active){ this.projX+=6*this.facing; if((this.facing>0&&this.projX>enemy.x-40)||(this.facing<0&&this.projX<enemy.x+40)){this.proj2Active=false;this._dealDmg(enemy,12,5,false);} }
    if(this.graxCubeActive) this._updateGraxCube(enemy,now);
    if(this._cpuState.action!=="attack") return;

    // Blocking: hard CPU blocks when close
    this.blocking=diff==="hard"&&Math.random()<0.25&&dist<200&&!this.anim;
    if(this.blocking){this.frame=7;return;}

    // CPU special moves — always available, just respects cooldowns
    if(dist<180&&now-this.cd1>1800&&Math.random()<0.5){ this.anim={type:"punch",start:frameCount,dur:32}; this.cd1=now; this._dealDmg(enemy,5,1,false); this._knockback(enemy,50); }
    else if(dist<160&&now-this.cd2>3500&&Math.random()<0.6){ this.anim={type:"kick",start:frameCount,dur:32}; this.cd2=now; this._dealDmg(enemy,10,2.5,false); this._knockback(enemy,120); }
    else if(now-this.cd3>8000&&diff!=="easy"&&Math.random()<0.5){ this.anim={type:"ranged",start:frameCount,dur:34}; this.cd3=now; }
    else if(
      now-this.cd5>12000 &&
      (diff==="hard"||diff==="medium") &&
      Math.random()<0.15 &&                       // solo 15% di probabilità
      !this._usedUltraThisRound &&                // max 1 volta per round
      enemy.hp < 20                               // solo quando avversario quasi morto
    ){
      this._usedUltraThisRound = true;
      this._triggerUltra();
    }
  }

  // ── Draw character ─────────────────────────────────────────
  drawChar(playerNum) {
    const frameSet = this.frames[Math.min(this.frame, this.frames.length-1)];
    if (frameSet) {
      const img = this.facing===1 ? frameSet.r : frameSet.l;
      if (img && img.complete && img.naturalWidth) drawImg(img, this.x, this.y);
    }
    // Yuke projectiles
    const projKey = this.facing===1 ? "yuke_proj_r" : "yuke_proj_l";
    const metKey  = this.facing===1 ? "yuke_meteora_r" : "yuke_meteora_l";
    if (this.projActive&&this.name==="yuke")  drawImg(images[projKey], this.projX, this.projY||this.y-100);
    if (this.proj2Active&&this.name==="yuke") drawImg(images[metKey],  this.projX, this.y-160);

    // Hit flash
    if(this._hitFlash>0){
      ctx.save();
      ctx.globalAlpha = this._hitFlash/6 * 0.5;
      ctx.fillStyle="#fff";
      ctx.beginPath();
      ctx.arc(sx(this.x),sy(this.y-140),ss(60),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
      this._hitFlash--;
    }
    // Hit particles
    if(this.hitParticles&&this.hitParticles.length>0){
      this.hitParticles = this.hitParticles.filter(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life++;
        p.alpha = 1 - p.life/p.maxLife;
        if(p.alpha<=0) return false;
        ctx.save();
        ctx.globalAlpha=p.alpha;
        ctx.fillStyle=p.col;
        ctx.shadowColor=p.col; ctx.shadowBlur=ss(6);
        ctx.beginPath();
        ctx.arc(sx(p.x),sy(p.y),ss(p.r),0,Math.PI*2);
        ctx.fill();
        ctx.restore();
        return true;
      });
    }

    // Grax: particle cube going to enemy
    if (this.graxCubeActive) {
      this.graxCubeParts.forEach(p=>{
        ctx.save();
        ctx.globalAlpha=Math.max(0,p.alpha);
        ctx.fillStyle=p.col;
        ctx.shadowColor=p.col; ctx.shadowBlur=ss(8);
        ctx.beginPath();
        ctx.arc(sx(this.graxCubeX+p.ox),sy(this.graxCubeY+p.oy),ss(p.r),0,Math.PI*2);
        ctx.fill();
        ctx.restore();
      });
      // Core orb
      ctx.save();
      ctx.fillStyle="#FF8C00";
      ctx.shadowColor="#FF4400"; ctx.shadowBlur=ss(20);
      ctx.beginPath();
      ctx.arc(sx(this.graxCubeX),sy(this.graxCubeY),ss(14),0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    // Blocking visual
    if(this.blocking){
      ctx.save(); ctx.strokeStyle="#0044ff"; ctx.lineWidth=ss(3);
      ctx.globalAlpha=0.6;
      ctx.beginPath(); ctx.arc(sx(this.x),sy(this.y-140),ss(70),0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }
}

//  GAME 2 — TARGET SHOOTING  (unchanged logic, kept)
// ============================================================
class TargetShooting {
  constructor(){ this.reset(); }
  reset(){
    this.started=false;this.score=0;this.attempts=10;this.difficulty=0;
    this.forza=0;this.increaseForce=false;this.decreaseForce=false;
    this.shot=false;this.shotX=0;this.shotY=0;
    this.delayActive=false;this.delayEnd=0;
    this.targetX=BASE_W/2;this.targetY=BASE_H/2;
    this.targetSpeedX=1.5;this.targetSpeedY=1.2;this.TSo=0;
    this._scoreSubmitted=false; this._lbData=null; this._lbLoading=false;
  }
  keyPress(k){ if(k==="b"||k==="B") this.increaseForce=true; }
  keyRelease(k){ if(k==="b"||k==="B"){this.increaseForce=false;this.decreaseForce=true;} }
  draw(){
    ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
    drawImg(images.logo,BASE_W/2,BASE_H/2);
    this._drawTarget(); this._drawForceBar(); this._drawCrosshair();
    fillRoundRect(BASE_W-220,60,200,50,"#a10000",0.85,8);
    fillText("🏆 CLASSIFICA",BASE_W-120,85,"#baa701",18);
    if(isButtonPressed(BASE_W-120,85,200,50)&&!this._lbLoading){this._lbLoading=true;Auth.getLeaderboard("target").then(d=>{this._lbData=d;this._lbLoading=false;});}
    setFont(28); ctx.fillStyle="#fff"; ctx.textAlign="right"; ctx.fillText(`Score: ${this.score}`,sx(BASE_W-50),sy(50)); ctx.textAlign="center";
    if(!this.started){
      drawButton("START",BASE_W/2,BASE_H-280,200,90);
      if(isButtonPressed(BASE_W/2,BASE_H-280,200,90)) this.started=true;
      if(isMobile) this._drawMobileForceBtn();
      if(this._lbData) this._drawLB();
    } else if(this.attempts>0){
      if(!this.delayActive){
        if(this.increaseForce&&this.forza<580) this.forza++;
        else if(this.decreaseForce&&this.forza>0) this.forza--;
        this.targetX+=this.targetSpeedX*this.difficulty; this.targetY+=this.targetSpeedY*this.difficulty;
        if(this.targetX-50<=200||this.targetX+50>=BASE_W-100) this.targetSpeedX*=-1;
        if(this.targetY-50<=100||this.targetY+50>=BASE_H-100) this.targetSpeedY*=-1;
        if(clickAvailable()&&this.forza>0&&!this.shot){
          consumeClick(); this.shot=true; this.shotX=mouseX;
          let off=0;
          if(this.forza<=260) off=(100-this.forza/260*80);
          else if(this.forza<500) off=(this.forza<380?(this.forza-260)/120*-10:(this.forza-380)/120*10-10);
          else off=-(this.forza-500)/80*100;
          this.shotY=mouseY+off;
          const d2=Math.hypot(this.shotX-this.targetX,this.shotY-this.targetY);
          let pts=0;
          if(d2<=10) pts=8; else if(d2<=20){this.TSo++;pts=8;if(game)game.trophies[5]=true;}
          else if(d2<=40) pts=6; else if(d2<=50) pts=4; else if(d2<=100) pts=2; else pts=-3;
          this.score+=pts; this.difficulty++; this.attempts--;
          this.delayActive=true; this.delayEnd=millis()+1000;
        }
      } else { if(millis()>this.delayEnd){this.delayActive=false;this.shot=false;this.forza=0;} }
      setFont(26); ctx.fillStyle="#fff"; ctx.fillText(`${11-this.attempts}/10`,sx(BASE_W/2),sy(50));
      if(isMobile) this._drawMobileForceBtn();
    } else {
      if(!this._scoreSubmitted){ Auth.submitScore("target",this.score); this._scoreSubmitted=true; }
      setFont(38); ctx.fillStyle="#baa701"; ctx.fillText(`Final: ${this.score} punti`,sx(BASE_W/2),sy(BASE_H/2-100));
      drawButton("PLAY AGAIN",BASE_W/2,BASE_H-280,250,90);
      if(isButtonPressed(BASE_W/2,BASE_H-280,250,90)) this.reset();
      if(this._lbData) this._drawLB();
    }
  }
  _drawLB(){
    const rows=(this._lbData?.leaderboard||[]).slice(0,8);
    fillRoundRect(50,200,340,400,"#000",0.8,10);strokeRoundRect(50,200,340,400,"#baa701",2,10);
    fillText("TOP SCORES",220,228,"#baa701",22);
    rows.forEach((r,i)=>{const ry=265+i*40;fillText(`#${r.rank} ${r.username}`,150,ry,"#fff",18);fillText(`${r.bestScore}`,340,ry,"#baa701",18);});
    if(this._lbData?.myRank) fillText(`You: #${this._lbData.myRank.rank} — ${this._lbData.myRank.bestScore}`,220,600,"#4EC600",18);
  }
  _drawMobileForceBtn(){
    const bx=BASE_W-200,by=BASE_H-150;
    const held=isHover(bx,by,180,70)&&mousePressed;
    this.increaseForce=held; this.decreaseForce=!held;
    ctx.save(); ctx.fillStyle=held?"#00aa00":"#006600"; ctx.beginPath(); ctx.roundRect(sx(bx-90),sy(by-35),ss(180),ss(70),ss(10)); ctx.fill();
    setFont(18); ctx.fillStyle="#fff"; ctx.fillText("HOLD to charge",sx(bx),sy(by)); ctx.restore();
  }
  _drawTarget(){
    ctx.save(); ctx.strokeStyle="#0000ff"; ctx.lineWidth=ss(2); ctx.strokeRect(sx(200),sy(100),ss(BASE_W-300),ss(BASE_H-200)); ctx.restore();
    fillCircle(this.targetX,this.targetY,50,"#fff"); fillCircle(this.targetX,this.targetY,40,"#000");
    fillCircle(this.targetX,this.targetY,20,"#F50C0C"); fillCircle(this.targetX,this.targetY,10,"#F0F50C");
    fillText("Hold B to charge — click to shoot",BASE_W/2,BASE_H-50,"#F0F50C",24);
  }
  _drawForceBar(){
    ctx.save(); ctx.fillStyle="#fff"; ctx.fillRect(sx(50),sy(270),ss(70),ss(590));
    ctx.fillStyle=this.forza<=260?"#F0F50C":this.forza<500?"#00ff00":"#ff0000";
    ctx.fillRect(sx(58),sy(855-this.forza),ss(54),ss(this.forza)); ctx.restore();
    fillText("B",88,910,"#F0F50C",20);
  }
  _drawCrosshair(){
    ctx.save(); ctx.strokeStyle="#fff"; ctx.lineWidth=ss(2); ctx.beginPath();
    ctx.moveTo(sx(mouseX-28),sy(mouseY)); ctx.lineTo(sx(mouseX+28),sy(mouseY));
    ctx.moveTo(sx(mouseX),sy(mouseY-28)); ctx.lineTo(sx(mouseX),sy(mouseY+28));
    ctx.stroke(); ctx.beginPath(); ctx.arc(sx(mouseX),sy(mouseY),ss(7),0,Math.PI*2); ctx.stroke(); ctx.restore();
    if(this.shot){ ctx.save(); ctx.strokeStyle="#00f"; ctx.lineWidth=ss(4); ctx.beginPath(); ctx.moveTo(sx(this.shotX-6),sy(this.shotY)); ctx.lineTo(sx(this.shotX+6),sy(this.shotY)); ctx.moveTo(sx(this.shotX),sy(this.shotY-6)); ctx.lineTo(sx(this.shotX),sy(this.shotY+6)); ctx.stroke(); ctx.restore(); }
  }
}

class NationBuilder {
  constructor(){this.lsdnation=false;this.squares=null;this.money=1750;this.energy=0;this.water=0;this.turn=0;this.colonne=0;this.righe=0;this.animX=500;this.animDir=1;this.selected=null;this._clickCd=0;}
  keyPress(k){ if(k==="a"||k==="A")this.nextTurn(); if(k==="s"||k==="S")this.save(); if(k==="i"||k==="I")this.selected=null; }
