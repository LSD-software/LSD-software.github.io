<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <link rel="icon" type="image/png" href="../img/icon.png">
  <title>LSD P-E-S-C-A</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Courier New", monospace;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── ROTATE OVERLAY ── */
    #rotateOverlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      flex-direction: column;
      align-items: center; justify-content: center;
      color: #FFD700;
      font-size: 1.1rem;
      text-align: center;
      gap: 16px;
    }
    #rotateOverlay .icon { font-size: 3.5rem; animation: rot 2s ease-in-out infinite; }
    @keyframes rot { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }
    @media (max-width: 767px) and (orientation: portrait) {
      #rotateOverlay { display: flex; }
      #gameCanvas    { display: none !important; }
    }

    /* ── CANVAS ── */
    #gameCanvas {
      display: block;
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      cursor: default;
    }

    /* ── FULLSCREEN BTN (shown only when not in fullscreen) ── */
    #fsBtn {
      position: fixed;
      top: 8px; right: 8px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.4);
      color: #FFD700;
      font-size: 0.7rem;
      padding: 5px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      font-family: "Courier New", monospace;
    }
    #fsBtn:hover { background: rgba(255,215,0,0.15); }

    /* ── MOBILE UP/DOWN BUTTONS ── */
    #mobControls {
      display: none;
      position: fixed;
      right: 8px;
      top: 50%; transform: translateY(-50%);
      flex-direction: column;
      gap: 6px;
      z-index: 50;
    }
    @media (hover: none) { #mobControls { display: flex; } }
    .mobBtn {
      width: 56px; height: 56px;
      background: rgba(128,0,0,0.8);
      border: 2px solid #FFD700;
      color: #FFD700;
      font-size: 1.6rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .mobBtn:active { background: rgba(255,215,0,0.25); }
  </style>
</head>
<body>

<div id="rotateOverlay">
  <div class="icon">📱</div>
  <div>Rotate your device<br>to play LSD P-E-S-C-A</div>
</div>

<canvas id="gameCanvas"></canvas>
<button id="fsBtn" onclick="toggleFS()">⛶ FULLSCREEN</button>

<div id="mobControls">
  <div class="mobBtn" id="mobUp">▲</div>
  <div class="mobBtn" id="mobDown">▼</div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  LSD P-E-S-C-A  —  Web Port  (faithful to original)
// ════════════════════════════════════════════════════════════

const API_URL = "https://lsd-backend-4phu.onrender.com";

// ── CANVAS SETUP ────────────────────────────────────────────
const canvas = document.getElementById("gameCanvas");
const ctx    = canvas.getContext("2d");

// Virtual resolution (matches original 1920×1080)
const VW = 1920, VH = 1080;
let scale = 1, offX = 0, offY = 0;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const sw = canvas.width  / VW;
  const sh = canvas.height / VH;
  scale = Math.min(sw, sh);
  offX  = (canvas.width  - VW * scale) / 2;
  offY  = (canvas.height - VH * scale) / 2;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// Convert screen coords → virtual coords
function toV(sx, sy) {
  return { x: (sx - offX) / scale, y: (sy - offY) / scale };
}

// ── FULLSCREEN ──────────────────────────────────────────────
function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener("fullscreenchange", () => {
  document.getElementById("fsBtn").textContent =
    document.fullscreenElement ? "✕ EXIT FS" : "⛶ FULLSCREEN";
});
// Auto-request fullscreen on first tap (mobile)
document.addEventListener("touchstart", () => {
  if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
}, { once: true });

// ── API CLIENT ───────────────────────────────────────────────
const Api = {
  token() { return localStorage.getItem("lsd_token"); },
  user()  { return JSON.parse(localStorage.getItem("lsd_user") || "null"); },
  async req(path, method="GET", body=null) {
    const h = { "Content-Type":"application/json" };
    if (this.token()) h["Authorization"] = "Bearer " + this.token();
    const r = await fetch(API_URL + path, {
      method, headers: h,
      body: body ? JSON.stringify(body) : undefined
    });
    return r.json();
  },
  loadState()  { return this.req("/pesca/state"); },
  saveState(s) { return this.req("/pesca/save", "POST", s); },
  resetState() { return this.req("/pesca/reset", "POST"); }
};

// ── ASSET LOADER ─────────────────────────────────────────────
const IMG = {};
let assetsLoaded = 0, assetsTotal = 0;

function loadImg(key, src) {
  assetsTotal++;
  const img = new Image();
  img.onload  = () => assetsLoaded++;
  img.onerror = () => assetsLoaded++;
  img.src = src;
  IMG[key] = img;
  return img;
}

function allLoaded() { return assetsLoaded >= assetsTotal; }

// Load everything
loadImg("logo",       "assets/ui/logo.png");
loadImg("home",       "assets/ui/home.png");
loadImg("info",       "assets/ui/info.png");
loadImg("zaino",      "assets/ui/zaino.png");
loadImg("sfondoShop", "assets/ui/sfondoShop.png");
loadImg("inventario", "assets/ui/inventario.png");
loadImg("mappa",      "assets/ui/mappa.png");
loadImg("canna",      "assets/ui/canna_da_pesca.png");
loadImg("pesce",      "assets/ui/pesce.png");
loadImg("cassetta",   "assets/ui/cassettaVHS.png");

for (let i = 1; i <= 4; i++) loadImg("schermata"+i, "assets/schermate/schermata"+i+".png");
loadImg("volPiu",  "assets/volume/vol_piu.png");
loadImg("volMeno", "assets/volume/vol_meno.png");
loadImg("muto",    "assets/volume/muto.png");

for (let i = 0; i < 4; i++) loadImg("bioma"+i, "assets/biomi/bioma"+i+".png");

// Fish arrays [1..10] per biome
const FISH = { fiume: [null], mare: [null], oceano: [null], artico: [null] };
const BPATHS = ["1pesci_fiume","2pesci_mare","3pesci_oceano","4pesci_artico"];
const BKEYS  = ["fiume","mare","oceano","artico"];
BKEYS.forEach((k, bi) => {
  for (let i = 1; i <= 10; i++) {
    const img = loadImg(`${k}_${i}`, `assets/pesci/${BPATHS[bi]}/${i}.png`);
    FISH[k].push(img);
  }
});

// ── AUDIO ────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null, masterGain = null;
let muted = false, volume = 1.0;

function initAudio() {
  if (audioCtx) return;
  audioCtx  = new AudioCtx();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.15;
  masterGain.connect(audioCtx.destination);
  playAmbient();
}
document.addEventListener("click",    initAudio, { once: true });
document.addEventListener("touchstart", initAudio, { once: true });

function playAmbient() {
  if (!audioCtx) return;
  // Generative underwater ambient loop
  const notes = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94];
  const seq   = [0,2,4,2,4,7,4,2,0,4,2,7,4,2,4,0];
  const now   = audioCtx.currentTime;

  seq.forEach((n, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.value = notes[n % notes.length] * 0.5;
    g.gain.setValueAtTime(0, now + i * 1.2);
    g.gain.linearRampToValueAtTime(0.1, now + i * 1.2 + 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, now + i * 1.2 + 2.2);
    o.connect(g); g.connect(masterGain);
    o.start(now + i * 1.2); o.stop(now + i * 1.2 + 2.3);
    if (i % 3 === 0) {
      const o2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      o2.type = "triangle"; o2.frequency.value = notes[(n+2)%notes.length] * 0.25;
      g2.gain.setValueAtTime(0.04, now + i * 1.2); g2.gain.exponentialRampToValueAtTime(0.001, now + i * 1.2 + 3);
      o2.connect(g2); g2.connect(masterGain); o2.start(now + i * 1.2); o2.stop(now + i * 1.2 + 3.1);
    }
  });
  const loopDur = seq.length * 1.2;
  setTimeout(playAmbient, (loopDur - 0.3) * 1000);
}

function playCatch(mythic) {
  if (!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  (mythic ? [523,659,784,1047] : [392,494,587]).forEach((f, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = f; o.type = mythic ? "triangle" : "square";
    g.gain.setValueAtTime(0.2, now+i*0.1); g.gain.exponentialRampToValueAtTime(0.001, now+i*0.1+0.4);
    o.connect(g); g.connect(masterGain); o.start(now+i*0.1); o.stop(now+i*0.1+0.5);
  });
}

function playClick() {
  if (!audioCtx || muted) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.frequency.value = 440; o.type = "square";
  g.gain.setValueAtTime(0.07, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime + 0.08);
}

function setVolume(delta) {
  volume = Math.max(0, Math.min(1, volume + delta));
  if (masterGain) masterGain.gain.value = muted ? 0 : volume * 0.2;
}
function toggleMute() {
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : volume * 0.2;
}

// ── GAME STATE ───────────────────────────────────────────────
const S = {
  // Currency
  dobloni: 0,
  // Fish inventory
  comuni: 0, rari: 0, mitici: 0,
  // Biomes
  biomaBool: [true, false, false, false],
  selezionato: [true, false, false, false], // which biome is active
  // Encyclopedia (booleans per fish per biome)
  enci: {
    fiume:  new Array(10).fill(false),
    mare:   new Array(10).fill(false),
    oceano: new Array(10).fill(false),
    artico: new Array(10).fill(false)
  },
  // VHS cassettes
  vhs: [false, false, false, false],
  // Biome background index (0-3)
  get biomeIdx() {
    return this.selezionato.findIndex(v => v);
  },
  get biomeKey() { return BKEYS[this.biomeIdx]; },

  toPayload() {
    return {
      dobloni:          this.dobloni,
      comuni:           this.comuni,
      rari:             this.rari,
      mitici:           this.mitici,
      biomiSbloccati:   this.biomaBool,
      biomaSelezionato: this.biomeIdx,
      enciclopedia: {
        fiume:  this.enci.fiume,
        mare:   this.enci.mare,
        oceano: this.enci.oceano,
        artico: this.enci.artico
      },
      vhs: this.vhs
    };
  },
  fromServer(d) {
    if (!d) return;
    this.dobloni = d.dobloni ?? 0;
    this.comuni  = d.comuni  ?? 0;
    this.rari    = d.rari    ?? 0;
    this.mitici  = d.mitici  ?? 0;
    this.biomaBool = d.biomiSbloccati ?? [true,false,false,false];
    this.selezionato = [false,false,false,false];
    this.selezionato[d.biomaSelezionato ?? 0] = true;
    this.vhs = d.vhs ?? [false,false,false,false];
    if (d.enciclopedia) {
      this.enci.fiume  = d.enciclopedia.fiume  || new Array(10).fill(false);
      this.enci.mare   = d.enciclopedia.mare   || new Array(10).fill(false);
      this.enci.oceano = d.enciclopedia.oceano || new Array(10).fill(false);
      this.enci.artico = d.enciclopedia.artico || new Array(10).fill(false);
    }
  }
};

// ── FISHING MECHANICS ────────────────────────────────────────
// Faithful port of CannaDaPesca.pde
const ROD = {
  // Player slider (y in virtual coords, range 400–715)
  y: 714,
  speed: 3,
  // Fish indicator
  yPesce: 715,
  speedPesce: 2,
  dir: 1,
  // Capture state
  tempoCattura: 0,
  inizioCattura: 0,
  inizioCattur: false,
  pesceCatturato: false,
  inizioTempoDiAttesa: 0,
  contatoreIncrementato: false,
  // Current random fish (1-11)
  randomPesce: 1,
  // Whether catch was already processed
  catchProcessed: false,

  reset(biomeSpeed) {
    this.speedPesce = biomeSpeed;
    this.dir        = 1;
    this.yPesce     = 715;
    this.y          = 714;
    this.tempoCattura = 0;
    this.inizioCattur = false;
    this.pesceCatturato = false;
    this.contatoreIncrementato = false;
    this.catchProcessed = false;
  },

  spawnFish() {
    const bi  = S.biomeIdx;
    const hasVHS = S.vhs[bi];
    // If VHS already found, only 1-10. Else 1-11.
    this.randomPesce = hasVHS
      ? Math.floor(Math.random() * 10) + 1
      : Math.floor(Math.random() * 11) + 1;
    this.reset(BIOME_SPEEDS[bi]);
  },

  update(now) {
    if (this.pesceCatturato) return; // frozen until toast clears

    // Move fish
    this.yPesce += this.dir * this.speedPesce;
    if (this.yPesce > 715 || this.yPesce < 400) this.dir *= -1;

    // Check overlap: fish in player rect (y .. y+60)
    if (this.yPesce > this.y && this.yPesce < this.y + 60) {
      if (!this.inizioCattur) {
        this.inizioCattura = now;
        this.inizioCattur  = true;
      }
      this.tempoCattura = now - this.inizioCattura;
      if (this.tempoCattura >= 10000) {
        this.pesceCatturato       = true;
        this.inizioTempoDiAttesa  = now;
      }
    } else {
      this.inizioCattur  = false;
      this.tempoCattura  = 0;
    }
  }
};

const BIOME_SPEEDS = [2, 4, 8, 16];

// ── SCREENS / PHASES ─────────────────────────────────────────
// Phases: "loading" | "menu" | "game" | "shop" | "mappa" | "info"
let phase     = "loading";
let loadingStarted = false;

// Loading screen slideshow
const SLIDE = { idx: 0, lastChange: 0, interval: 10000 };

// Inventory/Encyclopedia sub-state
const UI_STATE = {
  inventarioOpen: false,
  enciOpenIdx: -1,  // -1=none, 0-3=biome
  statoEnci: false
};

// Info sub-state
let infoOpen = false; // shown over menu

// Save timer
let saveTimer = null;

// ── DRAW HELPERS ─────────────────────────────────────────────
function drawImg(key, x, y, w, h) {
  const img = IMG[key];
  if (!img || !img.complete) return;
  if (w !== undefined) ctx.drawImage(img, x, y, w, h);
  else ctx.drawImage(img, x, y);
}

function text(str, x, y, size, color, align="left") {
  ctx.save();
  ctx.font      = `${size}px "Courier New", monospace`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.fillText(str, x, y);
  ctx.restore();
}

function rect(x, y, w, h, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

// ── DRAW FUNCTIONS (port of original .pde files) ─────────────

function drawLoading(now) {
  if (!SLIDE.lastChange) SLIDE.lastChange = now;
  if (now - SLIDE.lastChange >= SLIDE.interval) {
    SLIDE.idx = (SLIDE.idx + 1) % 4;
    SLIDE.lastChange = now;
  }
  drawImg("schermata" + (SLIDE.idx + 1), 0, 0, VW, VH);
}

function drawMenu(now) {
  // Background slideshow
  drawLoading(now);

  // Logo overlay
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.31)";
  ctx.fillRect(0, 55, 650, 200);
  ctx.restore();
  drawImg("logo", 30, 60);

  // Info button (top right)
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.31)";
  ctx.beginPath(); ctx.arc(1850, 70, 25, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  drawImg("info", 1825, 45);

  // Sidebar menu buttons (bottom-left, original positions)
  const items = [
    { label: "Play",  y: VH - 200 },
    { label: "Map",   y: VH - 150 },
    { label: "Shop",  y: VH - 100 },
    { label: "Save",  y: VH - 50  }
  ];
  ctx.save();
  ctx.font = "32px \"Courier New\", monospace";
  items.forEach(item => {
    const hov = hoverV(10, item.y - 28, 150, 32);
    ctx.fillStyle = hov ? "#ED6307" : "#ffffff";
    ctx.fillText(item.label, 10, item.y);
    if (hov) {
      ctx.fillStyle = "#ED6307";
      ctx.fillRect(8, item.y + 2, 200, 10);
    }
  });
  ctx.restore();
}

function drawGame(now) {
  // Biome background
  drawImg("bioma" + S.biomeIdx, 0, 0, VW, VH);

  // Home button
  drawImg("home", 50, 50);

  // Dobloni HUD
  ctx.save();
  ctx.font = "38px \"Courier New\", monospace";
  ctx.fillStyle = "#E58115";
  ctx.fillText("Dobloni: " + S.dobloni, 1700, 50);
  ctx.restore();

  // Fishing rod
  drawRod(now);
}

function drawRod(now) {
  // Canna da pesca image
  drawImg("canna", 1800, 390);

  // Player slider (red rect)
  rect(1840, ROD.y, 31, 60, "rgba(255,0,0,0.9)");

  // Fish icon
  drawImg("pesce", 1840, ROD.yPesce, 30, 30);

  // Capture progress bar (below rod)
  if (ROD.inizioCattur && ROD.tempoCattura > 0) {
    const pct = Math.min(1, ROD.tempoCattura / 10000);
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(1835, 785, 36, 8);
    ctx.fillStyle = `hsl(${(1-pct)*120},100%,50%)`;
    ctx.fillRect(1835, 785, 36 * pct, 8);
    ctx.restore();
  }

  // ── CATCH DISPLAY ──
  if (ROD.pesceCatturato) {
    const elapsed = now - ROD.inizioTempoDiAttesa;

    if (!ROD.contatoreIncrementato) {
      // Register catch
      const rp = ROD.randomPesce;
      const bi = S.biomeIdx;
      const bk = S.biomeKey;

      if (rp <= 10) {
        // Register rarity
        if      (rp <= 6) S.comuni++;
        else if (rp <= 9) S.rari++;
        else              S.mitici++;
        // Encyclopedia
        S.enci[bk][rp - 1] = true;
        playCatch(rp === 10);
      } else {
        // VHS
        S.vhs[bi] = true;
        playCatch(true);
      }
      ROD.contatoreIncrementato = true;
      // Save immediately
      Api.saveState(S.toPayload()).catch(() => {});
    }

    if (elapsed <= 4000) {
      // Draw catch notification box
      ctx.save();
      ctx.fillStyle = "rgba(250,242,242,0.8)";
      ctx.fillRect(1590, 125, 330, 100);
      ctx.font = "24px \"Courier New\", monospace";
      ctx.fillStyle = "#000";

      const rp = ROD.randomPesce;
      const bi = S.biomeIdx;
      const bk = S.biomeKey;

      if (rp <= 10) {
        ctx.fillText("FISH CAUGHT!", 1640, 185);
        const fishImg = FISH[bk][rp];
        if (fishImg && fishImg.complete) ctx.drawImage(fishImg, 1590, 130, 100, 90);
      } else {
        ctx.fillText("Mysterious...", 1640, 185);
        drawImg("cassetta", 1590, 130, 100, 90);
      }
      ctx.restore();

      ROD.inizioCattur = false;
    } else {
      // Reset for next fish — THE FIX: clear all state cleanly
      ROD.pesceCatturato        = false;
      ROD.contatoreIncrementato = false;
      ROD.inizioCattur          = false;
      ROD.tempoCattura          = 0;
      ROD.catchProcessed        = false;
      // Spawn new fish
      ROD.spawnFish();
    }
  }
}

function drawShop(now) {
  drawImg("sfondoShop", 0, 0, VW, VH);
  drawImg("home", 50, 50);
  drawImg("zaino", 1780, 80);

  ctx.save();
  ctx.font = "38px \"Courier New\", monospace";
  ctx.fillStyle = "#B70B0B";
  ctx.fillText("Dobloni: " + S.dobloni, 1700, 50);
  ctx.font = "28px \"Courier New\", monospace";
  ctx.fillStyle = "#ffffff";
  ctx.fillText("Comuni: "  + S.comuni,  470,  50);
  ctx.fillText("Rari: "    + S.rari,    890,  50);
  ctx.fillText("Mitici: "  + S.mitici,  1310, 50);
  ctx.fillText("COMMON FISH",  550, 895);
  ctx.fillText("RARE FISH",   1175, 895);
  ctx.fillText("MYTHIC FISH", 1400, 895);
  ctx.restore();

  if (!UI_STATE.inventarioOpen) {
    drawShopPrices();
  } else {
    drawInventario();
  }
}

function drawShopPrices() {
  ctx.save();
  ctx.font = "28px \"Courier New\", monospace";
  ctx.fillStyle = "#ffffff";
  if (hoverV(545, 780, 185, 125)) {
    ctx.fillText(S.comuni >= 1 ? "+1 doblone" : "No common fish", 520, 750);
  }
  if (hoverV(1140, 780, 190, 125)) {
    ctx.fillText(S.rari >= 1 ? "+5 dobloni" : "No rare fish", 1135, 750);
  }
  if (hoverV(1375, 780, 195, 125)) {
    ctx.fillText(S.mitici >= 1 ? "+10 dobloni" : "No mythic fish", 1365, 750);
  }
  ctx.restore();
}

function drawInventario() {
  drawImg("inventario", 0, 0, VW, VH);
  // Encyclopedia panels (same original y regions)
  const rows = [
    { biome: 0, y1: 95,  y2: 315 },
    { biome: 1, y1: 325, y2: 530 },
    { biome: 2, y1: 540, y2: 765 },
    { biome: 3, y1: 770, y2: 975 }
  ];
  rows.forEach(r => {
    if (UI_STATE.enciOpenIdx === r.biome) {
      drawEnciclopedia(r.biome);
    }
  });
}

function drawEnciclopedia(biomeIdx) {
  const bk    = BKEYS[biomeIdx];
  const enci  = S.enci[bk];
  const startX = 565, startY = [115, 345, 555, 785][biomeIdx];
  const slotW = 78, slotH = 78;

  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(560, startY - 20, 800, 90);
  ctx.restore();

  for (let i = 0; i < 10; i++) {
    const x = startX + i * (slotW + 5);
    const y = startY;
    if (enci[i]) {
      const fishImg = FISH[bk][i + 1];
      if (fishImg && fishImg.complete) {
        ctx.drawImage(fishImg, x, y, slotW, slotH);
      }
    } else {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      ctx.fillRect(x, y, slotW, slotH);
      ctx.fillStyle = "#333";
      ctx.font = "28px monospace";
      ctx.textAlign = "center";
      ctx.fillText("?", x + slotW/2, y + slotH/2 + 10);
      ctx.restore();
    }
  }
}

function drawMappa() {
  drawImg("mappa", 0, 0, VW, VH);
  drawImg("home", 50, 50);

  ctx.save();
  ctx.font = "38px \"Courier New\", monospace";
  ctx.fillStyle = "#E58115";
  ctx.fillText("Dobloni: " + S.dobloni, 1700, 50);
  ctx.font = "32px \"Courier New\", monospace";
  ctx.restore();

  // Biome checkpoints (original coords)
  const POINTS = [
    { cx: 135,  cy: 590, cost: 0,  label: "River"  },
    { cx: 648,  cy: 705, cost: 10, label: "Sea"    },
    { cx: 480,  cy: 330, cost: 20, label: "Ocean"  },
    { cx: 1311, cy: 160, cost: 50, label: "Arctic" }
  ];

  POINTS.forEach((p, i) => {
    const unlocked = S.biomaBool[i];
    const selected = S.selezionato[i];
    const hov = hoverCircle(p.cx, p.cy, 30);

    ctx.save();
    ctx.beginPath();
    ctx.arc(p.cx, p.cy, 30, 0, Math.PI*2);
    ctx.fillStyle = selected ? "#ff0000" : (unlocked ? "#E58115" : "#444");
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.font = "28px \"Courier New\", monospace";
    ctx.fillStyle = "#ffffff";
    if (selected) {
      ctx.fillText("You are here!", p.cx - 50, p.cy + 55);
    } else if (hov) {
      if (unlocked) {
        ctx.fillText("Unlocked", p.cx - 40, p.cy - 40);
      } else {
        ctx.fillText("Buy: " + p.cost + " dobloni", p.cx - 70, p.cy - 40);
      }
    }
    ctx.restore();
  });
}

function drawInfo() {
  // Dark overlay over current background
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.82)";
  ctx.fillRect(0, 0, VW, VH);
  ctx.restore();

  drawImg("home", 50, 50);

  text("Settings", VW/2, 150, 48, "#FFD700", "center");
  text("Music volume:", 700, 620, 32, "#ffffff");
  drawImg("volPiu",  800, 640);
  drawImg("volMeno", 930, 640);
  drawImg("muto",   1045, 640);

  // Volume bar
  ctx.save();
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fillRect(700, 680, 400, 10);
  ctx.fillStyle = "#FFD700";
  ctx.fillRect(700, 680, 400 * volume, 10);
  ctx.restore();

  text(muted ? "MUTED" : Math.round(volume * 100) + "%", 1160, 655, 28, "#ffffff");

  // Credits
  text("LSD P-E-S-C-A", VW/2, 400, 36, "#FFD700", "center");
  text("LSD Software — Milan, Italy", VW/2, 450, 26, "#aaa", "center");
  text("Logged in as: " + (Api.user()?.username || "guest"), VW/2, 510, 26, "#aaa", "center");

  // Reset button
  const hov = hoverV(760, 720, 400, 60);
  ctx.save();
  ctx.fillStyle = hov ? "#cc0000" : "#2a0000";
  ctx.strokeStyle = "#cc0000";
  ctx.lineWidth = 2;
  ctx.fillRect(760, 720, 400, 60);
  ctx.strokeRect(760, 720, 400, 60);
  ctx.restore();
  text("⚠ RESET PROGRESS", VW/2, 760, 28, hov ? "#fff" : "#ff4444", "center");
  text("Resets only Pesca data", VW/2, 800, 22, "#666", "center");
}

// ── MOUSE / TOUCH ────────────────────────────────────────────
let mouseVX = 0, mouseVY = 0;

function hoverV(x, y, w, h) {
  return mouseVX >= x && mouseVX <= x+w && mouseVY >= y && mouseVY <= y+h;
}
function hoverCircle(cx, cy, r) {
  const dx = mouseVX - cx, dy = mouseVY - cy;
  return dx*dx + dy*dy <= r*r;
}

canvas.addEventListener("mousemove", e => {
  const v = toV(e.clientX, e.clientY);
  mouseVX = v.x; mouseVY = v.y;
  // Mouse controls slider in game
  if (phase === "game" && !ROD.pesceCatturato && mouseVY >= 400 && mouseVY <= 715) {
    ROD.y = mouseVY;
  }
});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const t = e.touches[0];
  const v = toV(t.clientX, t.clientY);
  mouseVX = v.x; mouseVY = v.y;
  if (phase === "game" && !ROD.pesceCatturato && mouseVY >= 400 && mouseVY <= 715) {
    ROD.y = mouseVY;
  }
}, { passive: false });

// ── RESET CONFIRM STATE ──────────────────────────────────────
let resetConfirmPending = false;
let resetConfirmTime    = 0;

// ── CLICK HANDLER ────────────────────────────────────────────
async function handleClick(vx, vy) {
  playClick();

  // ── GAME phase ──
  if (phase === "game") {
    if (vx > 50 && vx < 100 && vy > 50 && vy < 100) { // home button
      phase = "menu"; ROD.reset(BIOME_SPEEDS[S.biomeIdx]);
    }
    return;
  }

  // ── MENU phase ──
  if (phase === "menu") {
    // Info button
    if (vx > 1825 && vx < 1875 && vy > 45 && vy < 95) {
      infoOpen = true; return;
    }
    // Menu buttons
    if (vx > 10 && vx < 180 && vy > VH-228 && vy < VH-200) { // Play
      phase = "game"; ROD.spawnFish();
    }
    if (vx > 10 && vx < 180 && vy > VH-178 && vy < VH-150) { // Map
      phase = "mappa";
    }
    if (vx > 10 && vx < 180 && vy > VH-128 && vy < VH-100) { // Shop
      phase = "shop"; UI_STATE.inventarioOpen = false; UI_STATE.enciOpenIdx = -1; UI_STATE.statoEnci = false;
    }
    if (vx > 10 && vx < 180 && vy > VH-78 && vy < VH-50) { // Save
      await Api.saveState(S.toPayload());
    }
    return;
  }

  // ── INFO overlay ──
  if (infoOpen) {
    if (vx > 50 && vx < 100 && vy > 50 && vy < 100) { infoOpen = false; return; }
    // Volume buttons (original coords)
    if (vx > 800 && vx < 850  && vy > 650 && vy < 690) { setVolume(+0.1); return; }
    if (vx > 930 && vx < 970  && vy > 650 && vy < 690) { setVolume(-0.1); return; }
    if (vx > 1045&& vx < 1100 && vy > 650 && vy < 690) { toggleMute(); return; }
    // Reset button
    if (vx > 760 && vx < 1160 && vy > 720 && vy < 780) {
      const now = performance.now();
      if (resetConfirmPending && now - resetConfirmTime < 4000) {
        // Second click within 4 seconds = confirm
        try {
          const d = await Api.resetState();
          S.fromServer(d.state);
          resetConfirmPending = false;
          infoOpen = false;
        } catch(e) {}
      } else {
        resetConfirmPending = true;
        resetConfirmTime    = now;
      }
      return;
    }
    return;
  }

  // ── SHOP phase ──
  if (phase === "shop") {
    // Home
    if (vx > 50 && vx < 100 && vy > 50 && vy < 100) {
      phase = "menu"; UI_STATE.inventarioOpen = false; return;
    }
    // Backpack / inventory toggle
    if (vx > 1780 && vx < 1860 && vy > 80 && vy < 160) {
      UI_STATE.inventarioOpen = !UI_STATE.inventarioOpen;
      if (!UI_STATE.inventarioOpen) { UI_STATE.enciOpenIdx = -1; UI_STATE.statoEnci = false; }
      return;
    }
    if (!UI_STATE.inventarioOpen) {
      // Sell fish
      if (vx > 545 && vx < 730  && vy > 780 && vy < 905 && S.comuni >= 1) { S.comuni--;  S.dobloni += 1;  }
      if (vx > 1140&& vx < 1330 && vy > 780 && vy < 905 && S.rari   >= 1) { S.rari--;    S.dobloni += 5;  }
      if (vx > 1375&& vx < 1570 && vy > 780 && vy < 905 && S.mitici >= 1) { S.mitici--;  S.dobloni += 10; }
    } else {
      // Encyclopedia tabs (original regions)
      if (!UI_STATE.statoEnci) {
        const tabs = [[95,315,0],[325,530,1],[540,765,2],[770,975,3]];
        for (const [y1,y2,bi] of tabs) {
          if (vx > 560 && vx < 1360 && vy > y1 && vy < y2) {
            UI_STATE.enciOpenIdx = bi;
            UI_STATE.statoEnci   = true;
            break;
          }
        }
      } else {
        // Click outside closes current enci
        if (!(vx > 560 && vx < 1360)) {
          UI_STATE.enciOpenIdx = -1;
          UI_STATE.statoEnci   = false;
        }
      }
    }
    return;
  }

  // ── MAPPA phase ──
  if (phase === "mappa") {
    if (vx > 50 && vx < 100 && vy > 50 && vy < 100) { phase = "menu"; return; }
    // Biome select / buy (original coords)
    const MPTS = [
      { cx:135, cy:590, bnd:[[110,165,560,618]], cost:0  },
      { cx:648, cy:705, bnd:[[620,676,678,735]], cost:10 },
      { cx:480, cy:330, bnd:[[450,510,300,360]], cost:20 },
      { cx:1311,cy:160, bnd:[[1285,1340,130,185]], cost:50 }
    ];
    MPTS.forEach(({ bnd, cost }, i) => {
      const [x1,x2,y1,y2] = bnd[0];
      if (vx > x1 && vx < x2 && vy > y1 && vy < y2) {
        if (!S.biomaBool[i] && S.dobloni >= cost) {
          S.dobloni -= cost;
          S.biomaBool[i] = true;
          S.selezionato = [false,false,false,false];
          S.selezionato[i] = true;
        } else if (S.biomaBool[i]) {
          S.selezionato = [false,false,false,false];
          S.selezionato[i] = true;
        }
      }
    });
    return;
  }
}

canvas.addEventListener("click", e => {
  const v = toV(e.clientX, e.clientY);
  handleClick(v.x, v.y);
});
canvas.addEventListener("touchend", e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const v = toV(t.clientX, t.clientY);
  handleClick(v.x, v.y);
}, { passive: false });

// ── KEYBOARD ─────────────────────────────────────────────────
const keys = {};
document.addEventListener("keydown", e => {
  keys[e.key] = true;
  if ((e.key === "ArrowUp" || e.key === "w") && phase === "game") e.preventDefault();
  if ((e.key === "ArrowDown" || e.key === "s") && phase === "game") e.preventDefault();
});
document.addEventListener("keyup",   e => { keys[e.key] = false; });

function handleKeys() {
  if (phase !== "game" || ROD.pesceCatturato) return;
  if ((keys["ArrowUp"]   || keys["w"] || keys["W"]) && ROD.y > 400)  ROD.y -= ROD.speed;
  if ((keys["ArrowDown"] || keys["s"] || keys["S"]) && ROD.y < 715)  ROD.y += ROD.speed;
}

// ── MOBILE BUTTONS ───────────────────────────────────────────
const mobUp   = document.getElementById("mobUp");
const mobDown = document.getElementById("mobDown");
let mobUpHeld = false, mobDownHeld = false;

mobUp.addEventListener("touchstart",   e => { e.preventDefault(); mobUpHeld   = true; }, { passive:false });
mobUp.addEventListener("touchend",     ()  => mobUpHeld   = false);
mobDown.addEventListener("touchstart", e => { e.preventDefault(); mobDownHeld = true; }, { passive:false });
mobDown.addEventListener("touchend",   ()  => mobDownHeld = false);
mobUp.addEventListener("mousedown",    ()  => mobUpHeld   = true);
mobUp.addEventListener("mouseup",      ()  => mobUpHeld   = false);
mobDown.addEventListener("mousedown",  ()  => mobDownHeld = true);
mobDown.addEventListener("mouseup",    ()  => mobDownHeld = false);

function handleMobileButtons() {
  if (phase !== "game" || ROD.pesceCatturato) return;
  if (mobUpHeld   && ROD.y > 400) ROD.y -= ROD.speed;
  if (mobDownHeld && ROD.y < 715) ROD.y += ROD.speed;
}

// ── MAIN LOOP ────────────────────────────────────────────────
function loop(now) {
  requestAnimationFrame(loop);
  handleKeys();
  handleMobileButtons();

  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(scale, scale);

  if (phase === "loading") {
    drawLoading(now);
  } else {
    if (phase === "menu")  { drawMenu(now); }
    if (phase === "game")  { drawGame(now); ROD.update(now); }
    if (phase === "shop")  { drawShop(now); }
    if (phase === "mappa") { drawMappa(); }

    // Info overlay renders on top of any phase
    if (infoOpen) drawInfo();

    // Reset confirm flash
    if (resetConfirmPending && performance.now() - resetConfirmTime < 4000) {
      ctx.save();
      ctx.fillStyle = "rgba(204,0,0,0.15)";
      ctx.fillRect(755, 715, 410, 75);
      ctx.font = "20px monospace";
      ctx.fillStyle = "#ff8888";
      ctx.textAlign = "center";
      ctx.fillText("Click again to confirm reset", VW/2, 810);
      ctx.restore();
    } else if (resetConfirmPending) {
      resetConfirmPending = false;
    }
  }

  ctx.restore();
}

// ── BOOT ─────────────────────────────────────────────────────
async function boot() {
  // Auth check
  if (!Api.token()) {
    window.location.href = "/cardGameWeb/auth.html?redirect=" + encodeURIComponent(location.href);
    return;
  }

  // Wait for assets
  const waitAssets = () => new Promise(res => {
    const check = () => allLoaded() ? res() : setTimeout(check, 100);
    check();
  });

  phase = "loading";
  SLIDE.lastChange = performance.now();
  requestAnimationFrame(loop); // start loop immediately so loading screens show

  await waitAssets();

  // Load server state
  try {
    const d = await Api.loadState();
    S.fromServer(d.state);
  } catch(e) { console.warn("State load failed:", e); }

  // Show menu
  phase = "menu";

  // Auto-save every 30s
  saveTimer = setInterval(() => {
    if (phase === "game") Api.saveState(S.toPayload()).catch(() => {});
  }, 30000);
}

boot();
</script>
